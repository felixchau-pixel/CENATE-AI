  <h1 className=\"font-display text-5xl md:text-7xl font-bold tracking-tight leading-[1.1] text-white mb-6\">\n          Noma House\n        </h1>\n        \n        <p className=\"text-lg md:text-xl leading-relaxed text-gray-200 mb-8 max-w-2xl mx-auto\">\n          Where culinary artistry meets timeless elegance. Experience innovative Nordic cuisine \n          crafted with the finest seasonal ingredients in an atmosphere of refined luxury.\n        </p>\n\n        <div className=\"flex flex-col sm:flex-row gap-4 justify-center\">\n          <a \n            href=\"#reservation\"\n            className=\"bg-gold text-dark px-8 py-4 rounded-full font-semibold text-lg hover:bg-gold/90 transition-colors\"\n          >\n            Make Reservation\n          </a>\n          <a \n            href=\"#menu\"\n            className=\"border-2 border-white text-white px-8 py-4 rounded-full font-semibold text-lg hover:bg-white hover:text-dark transition-colors\"\n          >\n            View Menu\n          </a>\n        </div>\n      </div>\n\n      {/* Scroll Indicator */}\n      <div className=\"absolute bottom-8 left-1/2 transform -translate-x-1/2\">\n        <div className=\"animate-bounce\">\n          <svg className=\"w-6 h-6 text-white\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n            <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M19 14l-7 7m0 0l-7-7m7 7V3\" />\n          </svg>\n        </div>\n      </div>\n    </section>\n  )\n}","src/components/MenuHighlights.tsx":"import React from 'react'\n\nexport default function MenuHighlights() {\n  const dishes = [\n    {\n      name: \"Wagyu Beef Tenderloin\",\n      description: \"Dry-aged 28 days, wild mushroom ragù, black truffle, roasted bone marrow\",\n      price: \"78\",\n      image: \"https://images.unsplash.com/photo-1565299624946-b28f40a0ca4b?w=600&h=400&fit=crop&q=80\"\n    },\n    {\n      name: \"Nordic Sea Scallops\",\n      description: \"Pan-seared nt-display text-xl font-semibold text-white\">\n                    {dish.name}\n                  </h3>\n                  <span className=\"text-gold font-semibold text-lg\">\n                    ${dish.price}\n                  </span>\n                </div>\n                <p className=\"text-gray-300 leading-relaxed\">\n                  {dish.description}\n                </p>\n              </div>\n            </div>\n          ))}\n        </div>\n\n        <div className=\"text-center mt-12\">\n          <a \n            href=\"#reservation\"\n            className=\"inline-flex items-center text-gold hover:text-gold/80 transition-colors font-medium\"\n          >\n            View Full Menu\n            <svg className=\"ml-2 w-5 h-5\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n              <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M17 8l4 4m0 0l-4 4m4-4H3\" />\n            </svg>\n          </a>\n        </div>\n      </div>\n    </section>\n  )\n}","src/components/ChefStory.tsx":"import React from 'react'\n\nexport default function ChefStory() {\n  return (\n    <section id=\"chef\" className=\"py-24 bg-dark\">\n      <div className=\"max-w-7xl mx-auto px-4 sm:px-6 lg:px-8\">\n        <div className=\"grid lg:grid-cols-2 gap-16 items-center\">\n          <div className=\"relative\">\n            <img\n              src=\"https://images.unsplash.com/photo-1577219491135-ce391730fb2c?w=800&h=600&fit=crop&q=80\"\n              alt=\"professional chef in kitchen preparing gourmet dish\"\n              className=\"w-full h-[500px] object-cover rounded-2xl\"\n            />\n            <div className=\"absolute inset-0 bg-gradient-to-t from-dark/40 to-transparent rounded-2xl\" />\n          </div>\n\n          <div className=\"space-y-8\">\n            <div>\n              <span className=\"text-gold text-sm uppercase tracking-widest font-medium\">\n                Master Chef\n              </span>\n y-300 text-sm\">Dinner service: 6:00 PM - 10:30 PM</p>\n          </div>\n\n          <div className=\"text-center\">\n            <div className=\"w-16 h-16 bg-gold/20 rounded-full flex items-center justify-center mx-auto mb-4\">\n              <svg className=\"w-8 h-8 text-gold\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n                <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z\" />\n              </svg>\n            </div>\n            <h3 className=\"text-lg font-semibold text-white mb-2\">Intimate Setting</h3>\n            <p className=\"text-gray-300 text-sm\">Only 40 seats for personalized service</p>\n          </div>\n\n          <div className=\"text-center\">\n            <div className=\"w-16 h-16 bg-gold/20 rounded-full flex items-center justify-center mx-auto mb-4\">\n              <svg className=\"w-8 h-8 text-gold\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n                <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z\" />\n              </svg>\n            </div>\n            <h3 className=\"text-lg font-semibold text-white mb-2\">Special Occasions</h3>\n            <p className=\"text-gray-300 text-sm\">Perfect for celebrations & anniversaries</p>\n          </div>\n        </div>\n\n        <div className=\"flex flex-col sm:flex-row gap-4 justify-center\">\n          <a \n            href=\"tel:+1-555-NOMA-HOUSE\"\n            className=\"bg-gold text-dark px-8 py-4 rounded-full font-semibold text-lg hover:bg-gold/90 transition-colors\"\n          >\n            Call to Reserve\n       function showError(message) {
        const error = document.getElementById("cenate-error");

        }
        console.error(message);

      function normalizePath(value) {
        const parts = value.split("/");
        const next = [];
        for (const part of parts) {
          if (part === "..") {
            next.pop();
          } else if (part && part !== ".") {
            next.push(part);
          }
        }
        return next.join("/");
      }

      function resolvePath(importerPath, target) {
        if (target.startsWith("@/")) {
          return normalizePath("src/" + target.slice(2));
        }
        if (target.startsWith("./") || target.startsWith("../")) {
          const baseDir = importerPath.split("/").slice(0, -1).join("/");
          return normalizePath((baseDir ? baseDir + "/" : "") + target);
        }
        return target;
      }

      function tryExtensions(value, fileMap) {
        const candidates = [

          value + ".tsx",
          value + ".ts",
          value + ".jsx",

        ];
        for (const candidate of candidates) {
          if (fileMap[candidate] !== undefined) {

        return null;
      }

      function compile(source, filename) {

            css = css.replace(/@tailwind\s+[^;]+;/g, "");
            css = css.replace(/@apply\s+[^;]+;/g, "");

          moduleCache[found] = moduleObject.exports;
          return moduleObject.exports;

        loadModule("", "src/main.tsx");
      }

      function waitForGlobals(attempt) {
        if (window.React && window.ReactDOM && window.Babel) {
          try {
            run();
          } catch (error) {
            showError(String(error && error.stack ? error.stack : error));
          }
          return;
        }
        if (attempt > 200) {
          showError("Preview runtime failed to initialize within 10 seconds.");
          return;
        }
        setTimeout(function () {
          waitForGlobals(attempt + 1);
        }, 50);
      }

      waitForGlobals(0);
    })();
