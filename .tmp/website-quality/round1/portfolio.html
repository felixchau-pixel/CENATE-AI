'\nimport ContactCTA from './components/ContactCTA'\nimport Footer from './components/Footer'\n\nexport default function App() {\n  return (\n    <div className=\"min-h-screen bg-[#0a0a0a] text-white\">\n      <Navbar />\n      <Hero />\n      <SelectedWork />\n      <About />\n      <Testimonials />\n      <Process />\n      <ContactCTA />\n      <Footer />\n    </div>\n  )\n}","src/components/Navbar.tsx":"import React, { useState, useEffect } from 'react'\n\nexport default function Navbar() {\n  const [isScrolled, setIsScrolled] = useState(false)\n  const [isMobileMenuOpen, setIsMobileMenuOpen] = useState(false)\n\n  useEffect(() => {\n    const handleScroll = () => {\n      setIsScrolled(window.scrollY > 50)\n    }\n    window.addEventListener('scroll', handleScroll)\n    return () => window.removeEventListener('scroll', handleScroll)\n  }, [])\n\n  return (\n    <nav className={`fixed top-0 left-0 right-0 z-50 transition-all duration-300 ${\n      isScrolled ? 'bg-black/80 backdrop-blur-md border-b border-white/10' : 'bg-transparent'\n    }`}>\n      <div className=\"max-w-7xl mx-auto px-6\">\n        <div className=\"flex items-center justify-between h-20\">\n          <a href=\"#hero\" className=\"font-serif text-2xl font-semibold text-gold\">\n            Lina Moreau\n          </a>\n\n          {/* Desktop Navigation */}\n          <div className=\"hidden md:flex items-center space-x-8\">\n            <a href=\"#work\" className=\"text-white/80 hover:text-white transition-colors duration-200\">Work</a>\n            <a href=\"#about\" className=\"text-white/80 hover:text-white transition-colors duration-200\">About</a>\n            <a href=\"#process\" className=\"text-white/80 hover:text-white transition-colors duration-200\">Process</a>\n            <a href=\"#contact\" className=\"bg-gold text-black px-6 py-2 rounded-full font-medium hover:bg-gold/90 transition-colors duration-200\">\n              Get in Touch\n            </a>\n          </div>\n\n          {/* Mobile Menu Button */}\n          <button \n            className=\"md:hidden w-6 h-6 flex flex-col justify-center items-center\"\n            onClick={() => setIsMobileMenuOpen(!isMobileMenuOpen)}\n          >\n            <span className={`w-full h-0.5 bg-white transition-all duration-300 ${isMobileMenuOpen ? 'rotate-45 translate-y-0.5' : ''}`} />\n            <span className={`w-full h-0.5 bg-white transition-all duration-300 mt-1 ${isMobileMenuOpen ? 'opacity-0' : ''}`} />\n            <span className={`w-full h-0.5 bg-white transition-all duration-300 mt-1 ${isMobileMenuOpen ? '-rotate-45 -translate-y-1.5' : ''}`} />\n          </button>\n        </div>\n\n        {/* Mobile Menu */}\n        {isMobileMenuOpen && (\n          <div className=\"md:hidden bg-black/95 backdrop-blur-md border-b border-white/10\">\n            <div className=\"px-6 py-4 space-y-4\">\n              <a href=\"#work\" className=\"block text-white/80 hover:text-white transition-colors duration-200\" onClick={() => setIsMobileMenuOpen(false)}>Work</a>\n              <a href=\"#about\" className=\"block text-white/80 hover:text-white transition-colors duration-200\" onClick={() => setIsMobileMenuOpen(false)}>About</a>\n              <a href=\"#process\" className=\"block text-white/80 hover:text-white transition-colors duration-200\" onClick={() => setIsMobileMenuOpen(false)}>Process</a>\n              <a href=\"#contact\" className=\"block w-full text-center bg-gold text-black px-6 py-3 rounded-full font-medium hover:bg-gold/90 transition-colors duration-200\" onClick={() => setIsMobileMenuOpen(false)}>\n                Get in Touch\n              </a>\n            </div>\n          </div>\n        )}\n      </div>\n    </nav>\n  )\n}","src/components/Hero.tsx":"import React from 'react'\n\nexport default function Hero() {\n  return (\n    <section id=\"hero\" className=\"relative min-h-screen flex items-center justify-center overflow-hidden\">\n      {/* Background Image */}\n      <div className=\"absolute inset-0\">\n        <img \n          src=\"https://images.unsplash.com/photo-1544717297-fa95b6ee9643?w=1920&h=1080&fit=crop&q=80\"\n          alt=\"Artistic workspace with creative tools and dramatic lighting\"\n          className=\"w-full h-full object-cover\"\n        />\n        <div className=\"absolute inset-0 bg-black/60\" />\n      </div>\n\n      {/* Content */}\n      <div className=\"relative z-10 max-w-4xl mx-auto px-6 text-center\">\n        <div className=\"mb-6\">\n          <span className=\"text-xs uppercase tracking-widest font-medium text-gold\">Creative Director & Designer</span>\n        </div>\n        \n        <h1 className=\"font-serif text-5xl md:text-7xl font-bold tracking-tight leading-[1.1] mb-6\">\n          Crafting Visual\n          <br />\n          <span className=\"text-gold\">Stories</span>\n        </h1>\n        \n        <p className=\"text-lg md:text-xl leading-relaxed text-white/80 mb-12 max-w-2xl mx-auto\">\n          Award-winning creative director specializing in luxury branding, editorial design, and immersive visual experiences that captivate and inspire.\n        </p>\n\n        <div className=\"flex flex-col sm:flex-row gap-4 justify-center\">\n          <a href=\"#work\" className=\"bg-gold text-black px-8 py-4 rounded-full font-semibold hover:bg-gold/90 transition-all duration-200\">\n            View Selected Work\n          </a>\n          <a href=\"#about\" className=\"border border-white/30 text-white px-8 py-4 rounded-full font-semibold hover:bg-white/10 transition-all duration-200\">\n            Learn About Me\n          </a>\n        </div>\n      </div>\n\n      {/* Scroll Indicator */}\n      <div className=\"absolute bottom-8 left-1/2 transform -translate-x-1/2\">\n        <div className=\"w-6 h-10 border border-white/30 rounded-full flex justify-center\">\n          <div className=\"w-1 h-3 bg-white/60 rounded-full mt-2 animate-bounce\" />\n        </div>\n      </div>\n    </section>\n  )\n}","src/components/SelectedWork.tsx":"import React from 'react'\n\nexport default function SelectedWork() {\n  const projects = [\n    {\n      id: 1,\n      title: 'Atelier Noir',\n      category: 'Luxury Branding',\n      description: 'Complete brand identity for high-end fashion atelier including logo, packaging, and digital presence.',\n      image: 'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=800&h=1000&fit=crop&q=80',\n      year: '2024'\n    },\n    {\n      id: 2,\n      title: 'Modernist Magazine',\n      category: 'Editorial Design',\n      description: 'Art direction and layout design for quarterly architecture and design publication.',\n      image: 'https://images.unsplash.com/photo-1542744173-8e7e53415bb0?w=800&h=1000&fit=crop&q=80',\n      year: '2024'\n    },\n    {\n      id: 3,\n      title: 'Essence Collection',\n      category: 'Packaging Design',\n      description: 'Premium packaging design for luxury skincare line with sustainable materials focus.',\n      image: 'https://images.unsplash.com/photo-1586953208448-b95a79798f07?w=800&h=1000&fit=crop&q=80',\n      year: '2023'\n    }\n  ]\n\n  return (\n    <section id=\"work\" className=\"py-32 bg-[#111111]\">\n      <div className=\"max-w-7xl mx-auto px-6\">\n        {/* Section Header */}\n        <div className=\"mb-20\">\n          <span className=\"text-xs uppercase tracking-widest font-medium text-gold mb-4 block\">Portfolio</span>\n          <h2 className=\"font-serif text-4xl md:text-6xl font-bold tracking-tight mb-6\">\n            Selected Work\n          </h2>\n          <p className=\"text-lg md:text-xl leading-relaxed text-white/70 max-w-2xl\">\n            A curated collection of projects that showcase my approach to luxury branding, editorial design, and visual storytelling.\n          </p>\n        </div>\n\n        {/* Projects Grid */}\n        <div className=\"space-y-32\">\n          {projects.map((project, index) => (\n            <div key={project.id} className={`lg:grid lg:grid-cols-2 lg:gap-16 items-center ${index % 2 === 1 ? 'lg:flex-row-reverse' : ''}`}>\n              <div className={`${index % 2 === 1 ? 'lg:order-2' : ''} mb-12 lg:mb-0`}>\n                <div className=\"aspect-[4/5] rounded-2xl overflow-hidden\">\n                  <img \n                    src={project.image}\n                    alt={project.description}\n                    className=\"w-full h-full object-cover hover:scale-105 transition-transform duration-700\"\n                  />\n                </div>\n              </div>\n              \n              <div className={`${index % 2 === 1 ? 'lg:order-1' : ''}`}>\n                <div className=\"flex items-center gap-4 mb-4\">\n                  <span className=\"text-xs uppercase tracking-widest font-medium text-gold\">{project.category}</span>\n                  <span className=\"text-xs text-white/40\">{project.year}</span>\n                </div>\n                \n                <h3 className=\"font-serif text-3xl md:text-4xl font-semibold mb-6\">\n                  {project.title}\n                </h3>\n                \n                <p className=\"text-lg leading-relaxed text-white/70 mb-8\">\n                  {project.description}\n                </p>\n                \n                <button className=\"group flex items-center gap-2 text-gold hover:text-gold/80 transition-colors duration-200\">\n                  <span className=\"font-medium\">View Case Study</span>\n                  <svg className=\"w-5 h-5 transform group-hover:translate-x-1 transition-transform duration-200\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\">\n                    <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M17 8l4 4m0 0l-4 4m4-4H3\" />\n                  </svg>\n                </button>\n              </div>\n            </div>\n          ))}\n        </div>\n      </div>\n    </section>\n  )\n}","src/components/About.tsx":"import React from 'react'\n\nexport default function About() {\n  return (\n    <section id=\"about\" className=\"py-32 bg-[#0a0a0a]\">\n      <div className=\"max-w-7xl mx-auto px-6\">\n        <div className=\"lg:grid lg:grid-cols-2 lg:gap-20 items-center\">\n          {/* Image */}\n          <div className=\"mb-16 lg:mb-0\">\n            <div className=\"aspect-[3/4] rounded-2xl overflow-hidden\">\n              <img \n                src=\"https://images.unsplash.com/photo-1494790108755-2616c0763c5e?w=600&h=800&fit=crop&q=80\"\n                alt=\"Professional portrait of Lina Moreau in natural light\"\n                className=\"w-full h-full object-cover\"\n              />\n            </div>\n          </div>\n\n          {/* Content */}\n          <div>\n            <span className=\"text-xs uppercase tracking-widest font-medium text-gold mb-4 block\">About</span>\n            \n            <h2 className=\"font-serif text-4xl md:text-5xl font-bold tracking-tight mb-8\">\n              Passion for Visual\n              <br />\n              Excellence\n            </h2>\n            \n            <div className=\"space-y-6 text-lg leading-relaxed text-white/70 mb-12\">\n              <p>\n                With over a decade of experience in luxury branding and editorial design, I've had the privilege of working with some of the world's most prestigious brands and publications.\n              </p>\n              \n              <p>\n                My approach centers on the belief that great design transcends aesthetics—it tells stories, evokes emotions, and creates lasting connections between brands and their audiences.\n              </p>\n              \n              <p>\n                Based in Paris, I collaborate with clients globally, bringing a European sensibility to luxury branding, editorial layouts, and immersive visual experiences.\n              </p>\n            </div>\n\n            {/* Awards */}\n            <div className=\"space-y-4\">\n              <h3 className=\"font-serif text-xl font-semibold mb-4\">Recognition</h3>\n              <div className=\"space-y-3 text-white/60\">\n                <div className=\"flex justify-between\">\n                  <span>D&AD Pencil Winner</span>\n                  <span>2023</span>\n                </div>\n                <div className=\"flex justify-between\">\n                  <span>Communication Arts Design Annual</span>\n                  <span>2022, 2023</span>\n                </div>\n                <div className=\"flex justify-between\">\n                  <span>Art Directors Club Young Guns</span>\n                  <span>2021</span>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n    </section>\n  )\n}","src/components/Testimonials.tsx":"import React from 'react'\n\nexport default function Testimonials() {\n  const testimonials = [\n    {\n      id: 1,\n      quote: \"Lina's creative vision transformed our brand identity beyond our expectations. Her attention to detail and understanding of luxury aesthetics is unmatched.\",\n      author: \"Sophie Chen\",\n      role: \"Creative Director\",\n      company: \"Maison Éclat\"\n    },\n    {\n      id: 2,\n      quote: \"Working with Lina was a revelation. She doesn't just design—she crafts experiences that resonate deeply with audiences. Exceptional talent.\",\n      author: \"Marcus Williams\",\n      role: \"Editor-in-Chief\",\n      company: \"Architectural Digest\"\n    }\n  ]\n\n  return (\n    <section className=\"py-32 bg-[#111111]\">\n      <div className=\"max-w-6xl mx-auto px-6\">\n        <div className=\"text-center mb-20\">\n          <span className=\"text-xs uppercase tracking-widest font-medium text-gold mb-4 block\">Testimonials</span>\n          <h2 className=\"font-serif text-4xl md:text-5xl font-bold tracking-tight\">\n            Client Voices\n          </h2>\n        </div>\n\n        <div className=\"grid md:grid-cols-2 gap-12\">\n          {testimonials.map((testimonial) => (\n            <div key={testimonial.id} className=\"bg-[#1a1a1a] p-10 rounded-2xl border border-white/5\">\n              {/* Quote Icon */}\n              <div className=\"mb-8\">\n                <svg className=\"w-8 h-8 text-gold\" fill=\"currentColor\" viewBox=\"0 0 32 32\">\n                  <path d=\"M9.352 4C4.456 7.456 1 13.12 1 19.36c0 5.088 3.072 8.064 6.624 8.064 3.36 0 5.856-2.688 5.856-5.856 0-3.168-2.208-5.472-5.088-5.472-.576 0-1.344.096-1.536.192.48-3.264 3.552-7.104 6.624-9.024L9.352 4zm16.512 0c-4.8 3.456-8.256 9.12-8.256 15.36 0 5.088 3.072 8.064 6.624 8.064 3.264 0 5.856-2.688 5.856-5.856 0-3.168-2.304-5.472-5.184-5.472-.576 0-1.248.096-1.44.192.48-3.264 3.456-7.104 6.528-9.024L25.864 4z\" />\n                </svg>\n              </div>\n\n              <blockquote className=\"text-lg md:text-xl leading-relaxed text-white/90 mb-8\">\n                \"{testimonial.quote}\"\n              </blockquote>\n\n              <div>\n                <div className=\"font-semibold text-white mb-1\">\n                  {testimonial.author}\n                </div>\n                <div className=\"text-white/60\">\n                  {testimonial.role}, {testimonial.company}\n                </div>\n              </div>\n            </div>\n          ))}\n        </div>\n      </div>\n    </section>\n  )\n}","src/components/Process.tsx":"import React from 'react'\n\nexport default function Process() {\n  const steps = [\n    {\n      number: '01',\n      title: 'Discovery',\n      description: 'Deep dive into your brand essence, target audience, and competitive landscape to establish a solid foundation.'\n    },\n    {\n      number: '02',\n      title: 'Strategy',\n      description: 'Develop comprehensive creative strategy that aligns visual direction with business objectives and brand values.'\n    },\n    {\n      number: '03',\n      title: 'Creation',\n      description: 'Craft c       function showError(message) {

        if (error) {

      function normalizePath(value) {
        const parts = value.split("/");
        const next = [];
        for (const part of parts) {
          if (part === "..") {
            next.pop();
          } else if (part && part !== ".") {
            next.push(part);
          }
        }
        return next.join("/");
      }

      function resolvePath(importerPath, target) {
        if (target.startsWith("@/")) {
          return normalizePath("src/" + target.slice(2));
        }
        if (target.startsWith("./") || target.startsWith("../")) {
          const baseDir = importerPath.split("/").slice(0, -1).join("/");
          return normalizePath((baseDir ? baseDir + "/" : "") + target);
        }
        return target;
      }

      function tryExtensions(value, fileMap) {
        const candidates = [

          value + ".tsx",
          value + ".ts",
          value + ".jsx",
          value + ".js",
          value + "/index.tsx",
          value + "/index.ts",
          value + "/index.jsx",
          value + "/index.js",

          if (moduleCache[found]) {

            css = css.replace(/@tailwind\s+[^;]+;/g, "");

            const style = document.createElement("style");

          fn(requireFunction, moduleObject, moduleObject.exports, window.React, window.ReactDOM);
