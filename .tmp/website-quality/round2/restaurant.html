      const FILES = {"package.json":"{\n  \"name\": \"noma-house\",\n  \"private\": true,\n  \"version\": \"0.0.0\",\n  \"type\": \"module\",\n  \"scripts\": {\n    \"dev\": \"vite\",\n    \"build\": \"tsc && vite build\",\n    \"preview\": \"vite preview\"\n  },\n  \"dependencies\": {\n    \"react\": \"^18.2.0\",\n    \"react-dom\": \"^18.2.0\"\n  },\n  \"devDependencies\": {\n    \"@types/react\": \"^18.2.43\",\n    \"@types/react-dom\": \"^18.2.17\",\n    \"@vitejs/plugin-react\": \"^4.2.1\",\n    \"autoprefixer\": \"^10.4.16\",\n    \"postcss\": \"^8.4.32\",\n    \"tailwindcss\": \"^3.4.0\",\n    \"typescript\": \"^5.2.2\",\n    \"vite\": \"^5.0.8\"\n  }\n}","index.html":"<!DOCTYPE html>\n<html lang=\"en\">\n  <head>\n    <meta charset=\"UTF-8\" />\n    <link rel=\"icon\" type=\"image/svg+xml\" href=\"/vite.svg\" />\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\" />\n    <title>Noma House - Culinary Excellence</title>\n    <script src=\"https://cdn.tailwindcss.com\"><\/script>\n  </head>\n  <body>\n    <div id=\"root\"></div>\n    <script type=\"module\" src=\"/src/main.tsx\"><\/script>\n  </body>\n</html>","tsconfig.json":"{\n  \"compilerOptions\": {\n    \"target\": \"ES2020\",\n    \"useDefineForClassFields\": true,\n    \"lib\": [\"ES2020\", \"DOM\", \"DOM.Iterable\"],\n    \"module\": \"ESNext\",\n    \"skipLibCheck\": true,\n    \"moduleResolution\": \"bundler\",\n    \"allowImportingTsExtensions\": true,\n    \"resolveJsonModule\": true,\n    \"isolatedModules\": true,\n    \"noEmit\": true,\n    \"jsx\": \"react-jsx\",\n    \"strict\": true,\n    \"noUnusedLocals\": true,\n    \"noUnusedParameters\": true,\n    \"noFallthroughCasesInSwitch\": true,\n    \"baseUrl\": \".\",\n    \"paths\": {\n      \"@/*\": [\"src/*\"]\n    }\n  },\n  \"include\": [\"src\"],\n  \"references\": [{ \"path\": \"./tsconfig.node.json\" }]\n}","vite.config.ts":"import { defineConfig } from 'vite'\nimport react from '@vitejs/plugin-react'\n\nexport lights from \"./components/MenuHighlights\"\nimport ChefStory from \"./components/ChefStory\"\nimport Gallery from \"./components/Gallery\"\nimport ReservationCTA from \"./components/ReservationCTA\"\nimport Testimonials from \"./components/Testimonials\"\nimport Location from \"./components/Location\"\nimport Footer from \"./components/Footer\"\n\nexport default function App() {\n  return (\n    <div className=\"min-h-screen bg-dark text-white\">\n      <Navbar />\n      <Hero />\n      <MenuHighlights />\n      <ChefStory />\n      <Gallery />\n      <ReservationCTA />\n      <Testimonials />\n      <Location />\n      <Footer />\n    </div>\n  )\n}","src/components/Navbar.tsx":"import React, { useState } from \"react\"\n\nexport default function Navbar() {\n  const [isOpen, setIsOpen] = useState(false)\n\n  return (\n    <nav className=\"fixed top-0 left-0 right-0 z-50 bg-dark/80 backdrop-blur-md border-b border-subtle\">\n      <div className=\"max-w-7xl mx-auto px-6 lg:px-8\">\n        <div className=\"flex items-center justify-between h-20\">\n          <div className=\"flex-shrink-0\">\n            <h1 className=\"text-2xl font-display font-bold text-gold\">Noma House</h1>\n          </div>\n          \n          <div className=\"hidden md:block\">\n            <div className=\"ml-10 flex items-baseline space-x-8\">\n              <a href=\"#menu\" className=\"text-white hover:text-gold transition-colors duration-200 font-medium\">Menu</a>\n              <a href=\"#chef\" className=\"text-white hover:text-gold transition-colors duration-200 font-medium\">Chef</a>\n              <a href=\"#gallery\" className=\"text-white hover:text-gold transition-colors duration-200 font-medium\">Gallery</a>\n              <a href=\"#location\" className=\"text-white hover:text-gold transition-colors duration-200 font-medium\">Location</a>\n            </div>\n          </div>\n\n          <div className=\"hidden md:block\">\n            <button className=\"bg-gold text-dark px-6 py-3 rounded-full font-semibold hover:bg-gold/90 transition-all duration-200\">\n              Reserve Table\n            </button>\n          </div>\n\n          <div className=\"md:hidden\">\n            <button\n              onClick={() => setIsOpen(!isOpen)}\n              className=\"text-white hover:text-gold transition-colors duration-200\"\n            >\n              <svg className=\"h-6 w-6\" fill=\"none\" viewBox=\"0 0 24 24\" stroke=\"currentColor\">\n                <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M4 6h16M4 12h16M4 18h16\" />\n              </svg>\n            </button>\n          </div>\n        </div>\n      </div>\n\n      {isOpen && (\n        <div className=\"md:hidden bg-surface border-t border-subtle\">\n          <div className=\"px-2 pt-2 pb-3 space-y-1 sm:px-3\">\n            <a href=\"#menu\" className=\"block px-3 py-2 text-white hover:text-gold transition-colors duration-200\">Menu</a>\n            <a href=\"#chef\" className=\"block px-3 py-2 text-white hover:text-gold transition-colors duration-200\">Chef</a>\n            <a href=\"#gallery\" className=\"block px-3 py-2 text-white hover:text-gold transition-colors duration-200\">Gallery</a>\n            <a href=\"#location\" className=\"block px-3 py-2 text-white hover:text-gold transition-colors duration-200\">Location</a>\n            <div className=\"px-3 py-2\">\n              <button className=\"w-full bg-gold text-dark px-6 py-3 rounded-full font-semibold\">\n                Reserve Table\n              </button>\n            </div>\n          </div>\n        </div>\n      )}\n    </nav>\n  )\n}","src/components/Hero.tsx":"import React from \"react\"\n\nexport default function Hero() {\n  return (\n    <section className=\"relative min-h-screen flex items-center justify-center overflow-hidden\">\n      <div \n        className=\"absolute inset-0 bg-cover bg-center bg-no-repeat\"\n        style={{\n          backgroundImage: `url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1920&h=1080&fit=crop&q=80')`\n        }}\n      >\n        <div className=\"absolute inset-0 bg-gradient-to-r from-dark/90 via-dark/60 to-dark/30\"></div>\n      </div>\n      \n      <div className=\"relative z-10 max-w-7xl mx-auto px-6 lg:px-8 grid lg:grid-cols-2 gap-12 items-center min-h-screen\">\n        <div className=\"space-y-8\">\n          <div className=\"space-y-2\">\n            <p className=\"text-xs uppercase tracking-widest font-medium text-gold\">Michelin Guide Recognition</p>\n            <h1 className=\"text-5xl md:text-7xl font-display font-bold tracking-tight leading-[1.1] text-white\">\n              Culinary\n              <span className=\"block text-gold\">Excellence</span>\n              <span className=\"block text-4xl md:text-5xl font-medium text-muted\">Redefined</span>\n            </h1>\n          </div>\n          \n          <p className=\"text-lg md:text-xl leading-relaxed text-muted max-w-xl\">\n            Where Nordic traditions meet contemporary innovation. Chef Marcus Andersson presents a seven-course journey through the seasons of Scandinavia.\n          </p>\n          \n          <div className=\"flex flex-col sm:flex-row gap-4\">\n            <button className=\"bg-gold text-dark px-8 py-4 rounded-full font-semibold text-lg hover:bg-gold/90 transition-all duration-200\">\n              Reserve Experience\n            </button>\n            <button className=\"border-2 border-white text-white px-8 py-4 rounded-full font-semibold text-lg hover:bg-white hover:text-dark transition-all duration-200\">\n              View Menu\n            </button>\n          </div>\n        </div>\n\n        <div className=\"hidden lg:block relative\">\n          <div className=\"absolute -top-10 -right-10 w-32 h-32 bg-gold/20 rounded-full animate-float\"></div>\n          <div className=\"absolute -bottom-10 -left-10 w-24 h-24 bg-white/10 rounded-full animate-float\" style={{animationDelay: '2s'}}></div>\n        </div>\n      </div>\n\n      <div className=\"absolute bottom-8 left-1/2 transform -translate-x-1/2\">\n        <div className=\"flex flex-col items-center space-y-2 text-muted\">\n          <span className=\"text-xs uppercase tracking-widest\">Scroll to explore</span>\n          <svg className=\"w-5 h-5 animate-bounce\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n            <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M19 14l-7 7m0 0l-7-7m7 7V3\" />\n          </svg>\n        </div>\n      </div>\n    </section>\n  )\n}","src/components/MenuHighlights.tsx":"import React from \"react\"\n\nexport default function MenuHighlights() {\n  const dishes = [\n    {\n      name: \"Forest Floor\",\n      description: \"Wild mushrooms, truffle oil, pine essence, aged parmesan\",\n      price: \"38\",\n      image: \"https://images.unsplash.com/photo-1565299624946-b28f40a0ca4b?w=600&h=600&fit=crop&q=80\"\n    },\n    {\n      name: \"Ocean's Whisper\",\n      description: \"Norwegian salmon, sea buckthorn, dill oil, crispy skin\",\n      price: \"45\",\n      image: \"https://images.unsplash.com/photo-1546833999-b9f581a1996d?w=600&h=600&fit=crop&q=80\"\n    },\n    {\n      name: \"Highland Meditation\",\n      description: \"Grass-fed beef, juniper glaze, roasted root vegetables\",\n      price: \"52\",\n      image: \"https://images.unsplash.com/photo-1567620905732-2d1ec7ab7445?w=600&h=600&fit=crop&q=80\"\n    }\n  ]\n\n  return (\n    <section id=\"menu\" className=\"py-32 bg-surface\">\n      <div className=\"max-w-7xl mx-auto px-6 lg:px-8\">\n        <div className=\"text-center mb-20\">\n          <p className=\"text-xs uppercase tracking-widest font-medium text-gold mb-4\">Seasonal Menu</p>\n          <h2 className=\"text-4xl md:text-6xl font-display font-bold tracking-tight mb-6\">\n            Signature\n            <span className=\"block text-gold\">Creations</span>\n          </h2>\n          <p className=\"text-lg text-muted max-w-2xl mx-auto leading-relaxed\">\n            Each dish tells a story of our land, crafted with ingredients sourced from local farmers and foragers who share our passion for exceptional quality.\n          </p>\n        </div>\n\n        <div className=\"grid md:grid-cols-2 lg:grid-cols-3 gap-8\">\n          {dishes.map((dish, index) => (\n            <div key={index} className=\"group cursor-pointer\">\n              <div className=\"relative mb-6 overflow-hidden rounded-2xl aspect-square\">\n                <img \n                  src={dish.image} \n                  alt={dish.name}\n                  className=\"w-full h-full object-cover transition-transform duration-700 group-hover:scale-110\"\n                />\n                <div className=\"absolute inset-0 bg-gradient-to-t from-dark/80 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500\"></div>\n                <div className=\"absolute bottom-6 left-6 text-gold font-display font-bold text-2xl opacity-0 group-hover:opacity-100 transition-all duration-500 transform translate-y-4 group-hover:translate-y-0\">\n                  ${dish.price}\n                </div>\n              </div>\n              \n              <div className=\"space-y-3\">\n                <h3 className=\"text-2xl font-display font-semibold text-white group-hover:text-gold transition-colors duration-300\">\n                  {dish.name}\n                </h3>\n                <p className=\"text-muted leading-relaxed\">\n                  {dish.description}\n                </p>\n              </div>\n            </div>\n          ))}\n        </div>\n\n        <div className=\"text-center mt-16\">\n          <button className=\"border-2 border-gold text-gold px-8 py-4 rounded-full font-semibold hover:bg-gold hover:text-dark transition-all duration-300\">\n            View Full Menu\n          </button>\n        </div>\n      </div>\n    </section>\n  )\n}","src/components/ChefStory.tsx":"import React from \"react\"\n\nexport default function ChefStory() {\n  return (\n    <section id=\"chef\" className=\"py-32 bg-dark\">\n      <div className=\"max-w-7xl mx-auto px-6 lg:px-8\">\n        <div className=\"grid lg:grid-cols-2 gap-16 items-center\">\n          <div className=\"relative\">\n            <div className=\"aspect-[4/5] rounded-2xl overflow-hidden\">\n              <img \n                src=\"https://images.unsplash.com/photo-1577219491135-ce391730fb2c?w=800&h=1000&fit=crop&q=80\" \n                alt=\"Chef Marcus Andersson\"\n                className=\"w-full h-full object-cover\"\n              />\n            </div>\n            <div className=\"absolute -bottom-8 -right-8 bg-gold text-dark p-8 rounded-2xl max-w-xs\">\n              <div className=\"text-2xl font-display font-bold mb-2\">15+</div>\n              <div className=\"text-sm font-medium\">Years of Culinary Excellence</div>\n            </div>\n          </div>\n\n          <div className=\"space-y-8 lg:pl-8\">\n            <div>\n              <p className=\"text-xs uppercase tracking-widest font-medium text-gold mb-4\">Executive Chef</p>\n              <h2 className=\"text-4xl md:text-5xl font-display font-bold tracking-tight mb-6 leading-tight\">\n                Marcus\n                <span className=\"block text-gold\">Andersson</span>\n              </h2>\n            </div>\n\n            <div className=\"space-y-6 text-lg text-muted leading-relaxed\">\n              <p>\n                Born in the heart of Stockholm, Marcus discovered his passion for cooking in his grandmother's kitchen, where traditional Swedish recipes were passed down through generations.\n              </p>\n              \n              <p>\n                After training at Le Cordon Bleu and working alongside Michelin-starred chefs across Europe, Marcus returned to Scandinavia with a vision: to celebrate Nordic cuisine while pushing its boundaries.\n              </p>\n              \n              <p>\n                His philosophy centers on sustainability, seasonality, and the pure expression of each ingredient's natural character. Every plate is a canvas where tradition meets innovation.\n              </p>\n            </div>\n\n            <div className=\"flex items-center space-x-8 pt-4\">\n              <div className=\"text-center\">\n                <div className=\"text-2xl font-display font-bold text-gold\">3</div>\n                <div className=\"text-sm text-muted font-medium\">Michelin Stars</div>\n              </div>\n              <div className=\"text-center\">\n                <div className=\"text-2xl font-display font-bold text-gold\">12</div>\n                <div className=\"text-sm text-muted font-medium\">International Awards</div>\n              </div>\n              <div className=\"text-center\">\n                <div className=\"text-2xl font-display font-bold text-gold\">1st</div>\n                <div className=\"text-sm text-muted font-medium\">Best Nordic Chef</div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </div>\n    </section>\n  )\n}","src/components/Gallery.tsx":"import React from \"react\"\n\nexport default function Gallery() {\n  const images = [\n    {\n      src: \"https://images.unsplash.com/photo-1550966871-3ed3cdb5ed0c?w=800&h=600&fit=crop&q=80\",\n      alt: \"Elegant dining room\",\n      span: \"col-span-2 row-span-2\"\n    },\n    {\n      src: \"https://images.unsplash.com/photo-1424847651672-bf20a4b0982b?w=600&h=800&fit=crop&q=80\",\n      alt: \"Chef plating\",\n      span: \"col-span-1 row-span-2\"\n    },\n    {\n      src: \"https://images.unsplash.com/photo-1559339352-11d035aa65de?w=600&h=600&fit=crop&q=80\",\n      alt: \"Wine cellar\",\n      span: \"col-span-1 row-span-1\"\n    },\n    {\n      src: \"https://images.unsplash.com/photo-1565299624946-b28f40a0ca4b?w=600&h=600&fit=crop&q=80\",\n      alt: \"       function normalizePath(value) {
        const parts = value.split("/");
        const next = [];
        for (const part of parts) {
          if (part === "..") {
            next.pop();
          } else if (part && part !== ".") {
            next.push(part);
          }
        }
        return next.join("/");
      }

      function resolvePath(importerPath, target) {
        if (target.startsWith("@/")) {
          return normalizePath("src/" + target.slice(2));
        }
        if (target.startsWith("./") || target.startsWith("../")) {
          const baseDir = importerPath.split("/").slice(0, -1).join("/");
          return normalizePath((baseDir ? baseDir + "/" : "") + target);
        }
        return target;
      }

      function tryExtensions(value, fileMap) {
        const candidates = [
          value,
          value + ".tsx",
          value + ".ts",
          value + ".jsx",
          value + ".js",
          value + "/index.tsx",
          value + "/index.ts",
          value + "/index.jsx",
          value + "/index.js",
        ];
        for (const candidate of candidates) {
          if (fileMap[candidate] !== undefined) {
            return candidate;
          }
        }
        return null;

      function compile(source, filename) {
        return window.Babel.transform(source, {
          presets: [
            ["env", { modules: "commonjs", loose: true }],
            "react",
            ["typescript", { allExtensions: true, isTSX: true, onlyRemoveTypeImports: false }],
          ],
          filename,
          sourceType: "module",
          compact: false,
          comments: false,
        }).code;
      }

      function run() {
        const fileMap = FILES;
        const moduleCache = Object.create(null);
        const reactModule = Object.assign({ default: window.React, __esModule: true }, window.React);
        const reactDomClientModule = Object.assign(
          {
            default: window.ReactDOM,
            __esModule: true,
            createRoot: window.ReactDOM.createRoot,
            hydrateRoot: window.ReactDOM.hydrateRoot,
          },
          window.ReactDOM
        );
        const builtins = {
          react: reactModule,
          "react-dom/client": reactDomClientModule,
        };

        function loadModule(importerPath, target) {
          if (builtins[target]) {
            return builtins[target];
          }
          const resolved = resolvePath(importerPath, target);
          const found = tryExtensions(resolved, fileMap);
          if (!found) {
            throw new Error('Cannot resolve "' + target + '" from "' + (importerPath || "<entry>") + '"');
          }
          if (moduleCache[found]) {
            return moduleCache[found];
          }
          if (found.endsWith(".css")) {
            let css = fileMap[found] || "";
            css = css.replace(/@tailwind\s+[^;]+;/g, "");
            css = css.replace(/@apply\s+[^;]+;/g, "");
            const style = document.createElement("style");
            style.setAttribute("data-source", found);
            style.textContent = css;
            document.head.appendChild(style);
            const empty = { __esModule: true, default: {} };
            moduleCache[found] = empty;
            return empty;
          }
          const compiled = compile(fileMap[found], found);
          const moduleObject = { exports: {} };
          moduleCache[found] = moduleObject.exports;
          const requireFunction = function (nextTarget) {
            return loadModule(found, nextTarget);
          };
          const fn = new Function("require", "module", "exports", "React", "ReactDOM", compiled);
          fn(requireFunction, moduleObject, moduleObject.exports, window.React, window.ReactDOM);
          moduleCache[found] = moduleObject.exports;
          return moduleObject.exports;
        }

        loadModule("", "src/main.tsx");
      }

      function waitForGlobals(attempt) {
        if (window.React && window.ReactDOM && window.Babel) {
          try {
            run();
          } catch (error) {
            showError(String(error && error.stack ? error.stack : error));
          }
          return;
        }
        if (attempt > 200) {
          showError("Preview runtime failed to initialize within 10 seconds.");
          return;
        }
        setTimeout(function () {
          waitForGlobals(attempt + 1);
        }, 50);
      }

      waitForGlobals(0);
    })();
  </script>
