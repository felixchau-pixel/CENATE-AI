hat predict and prevent productivity roadblocks.\"\n    }\n  ]\n\n  return (\n    <section id=\"features\" className=\"py-32 relative\">\n      <div className=\"max-w-7xl mx-auto px-6\">\n        {/* Header */}\n        <div className=\"text-center mb-20\">\n          <div className=\"inline-flex items-center space-x-2 bg-gradient-to-r from-blue-500/10 to-purple-500/10 border border-blue-500/20 rounded-full px-4 py-2 mb-6\">\n            <span className=\"text-sm font-medium text-blue-300\">FEATURES</span>\n          </div>\n          <h2 className=\"text-4xl lg:text-5xl font-bold tracking-tight text-white mb-6\">\n            AI That Actually <span className=\"gradient-text\">Works</span>\n          </h2>\n          <p className=\"text-xl text-gray-400 max-w-3xl mx-auto leading-relaxed\">\n            Experience the next generation of productivity tools that understand your unique workflow and adapt to your needs.\n          </p>\n        </div>\n\n        {/* Asymmetric Feature Layout */}\n        <div className=\"grid gap-8\">\n          {/* Top Row - Single Large Feature */}\n          <div className=\"gradient-border\">\n            <div className=\"gradient-border-content p-8 lg:p-12\">\n              <div className=\"grid lg:grid-cols-2 gap-8 items-center\">\n                <div>\n                  <div className=\"inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-blue-500 to-purple-600 rounded-2xl mb-6 text-white\">\n                    {features[0].icon}\n                  </div>\n                  <h3 className=\"text-2xl lg:text-3xl font-bold text-white mb-4\">{features[0].title}</h3>\n                  <p className=\"text-lg text-gray-400 leading-relaxed mb-6\">{features[0].description}</p>\n                  <button className=\"text-blue-400 font-semibold hover:text-blue-300 transition-colors\">\n                    Learn more →\n                  </button>\n                </div>\n                <div className=\"relative\">\n       function showError(message) {
        const error = document.getElementById("cenate-error");
        if (error) {
          error.style.display = "block";
          error.textContent = message;
        }
        console.error(message);
      }

      function normalizePath(value) {
        const parts = value.split("/");
        const next = [];
        for (const part of parts) {
          if (part === "..") {
            next.pop();
          } else if (part && part !== ".") {
            next.push(part);
          }
        }
        return next.join("/");
      }

      function resolvePath(importerPath, target) {
        if (target.startsWith("@/")) {
          return normalizePath("src/" + target.slice(2));
        }
        if (target.startsWith("./") || target.startsWith("../")) {
          const baseDir = importerPath.split("/").slice(0, -1).join("/");
          return normalizePath((baseDir ? baseDir + "/" : "") + target);
        }
        return target;
      }

      function tryExtensions(value, fileMap) {
        const candidates = [
          value,
          value + ".tsx",
          value + ".ts",
          value + ".jsx",
          value + ".js",
          value + "/index.tsx",
          value + "/index.ts",
          value + "/index.jsx",
          value + "/index.js",
        ];
        for (const candidate of candidates) {
          if (fileMap[candidate] !== undefined) {
            return candidate;
          }
        }
        return null;
      }

      function compile(source, filename) {
        return window.Babel.transform(source, {
          presets: [
            ["env", { modules: "commonjs", loose: true }],
            "react",
            ["typescript", { allExtensions: true, isTSX: true, onlyRemoveTypeImports: false }],
          ],
          filename,
          sourceType: "module",
          compact: false,
          comments: false,
        }).code;
      }
