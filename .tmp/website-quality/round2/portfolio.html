seDefineForClassFields\": true,\n    \"lib\": [\"ES2020\", \"DOM\", \"DOM.Iterable\"],\n    \"module\": \"ESNext\",\n    \"skipLibCheck\": true,\n    \"moduleResolution\": \"bundler\",\n    \"allowImportingTsExtensions\": true,\n    \"resolveJsonModule\": true,\n    \"isolatedModules\": true,\n    \"noEmit\": true,\n    \"jsx\": \"react-jsx\",\n    \"strict\": true,\n    \"noUnusedLocals\": true,\n    \"noUnusedParameters\": true,\n    \"noFallthroughCasesInSwitch\": true,\n    \"baseUrl\": \".\",\n    \"paths\": {\n      \"@/*\": [\"src/*\"]\n    }\n  },\n  \"include\": [\"src\"],\n  \"references\": [{ \"path\": \"./tsconfig.node.json\" }]\n}","vite.config.ts":"import { defineConfig } from 'vite'\nimport react from '@vitejs/plugin-react'\n\nexport default defineConfig({\n  plugins: [react()],\n  resolve: {\n    alias: {\n      '@': '/src',\n    },\n  },\n})","postcss.config.js":"export default {\n  plugins: {\n    tailwindcss: {},\n    autoprefixer: {},\n  },\n}","tailwind.config.ts":"import type { Config } from 'tailwindcss'\n\nexport default {\n  content: [\n    \"./index.html\",\n    \"./src/**/*.{js,ts,jsx,tsx}\",\n  ],\n  theme: {\n    extend: {\n      colors: {\n        gold: '#d4af37',\n        'dark-bg': '#0a0a0a',\n        'dark-surface': '#1a1a1a'\n      },\n      fontFamily: {\n        'serif': ['Playfair Display', 'serif'],\n        'sans': ['Inter', 'sans-serif']\n      }\n    },\n  },\n  plugins: [],\n} satisfies Config","src/main.tsx":"import React from 'react'\nimport ReactDOM from 'react-dom/client'\nimport App from './App'\nimport './styles/globals.css'\n\nReactDOM.createRoot(document.getElementById('root')!).render(\n  <React.StrictMode>\n    <App />\n  </React.StrictMode>,\n)","src/styles/globals.css":"@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap');\n\n* {\n  margin: 0;\n  padding: 0;\n  box-sizing: border-box;\n}\n\nhtml {\n  scroll-behavior: smooth;\n}\n\nbody {\n  font-family: 'Inter', sans-serif;\n  background-color: #0a0a0a;\n  color: #f5f5f5;\n  line-height: 1.6;\n}\n\n.font-serif {\n  font-family: 'Playfair Display', serif;\n}\n\n.text-gradient {\n  background: linear-gradient(135deg, #d4af37 0%, #f4d03f 100%);\n  -webkit-background-clip: text;\n  -webkit-text-fill-color: transparent;\n  background-clip: text;\n}\n\n.overlay-gradient {\n  background: linear-gradient(135deg, rgba(10, 10, 10, 0.7) 0%, rgba(26, 26, 26, 0.5) 100%);\n}\n\n@keyframes fadeInUp {\n  from {\n    opacity: 0;\n    transform: translateY(30px);\n  }\n  to {\n    opacity: 1;\n    transform: translateY(0);\n  }\n}\n\n.animate-fade-in-up {\n  animation: fadeInUp 0.8s ease-out forwards;\n}\n\n@keyframes float {\n  0%, 100% {\n    transform: translateY(0px);\n  }\n  50% {\n    transform: translateY(-10px);\n  }\n}\n\n.animate-float {\n  animation: float 3s ease-in-out infinite;\n}","src/App.tsx":"import React from 'react'\nimport Navbar from './components/Navbar'\nimport Hero from './components/Hero'\nimport SelectedWork from './components/SelectedWork'\nimport About from './components/About'\nimport Testimonials from './components/Testimonials'\nimport Process from './components/Process'\nimport ContactCTA from './components/ContactCTA'\nimport Footer from './components/Footer'\n\nfunction App() {\n  return (\n    <div className=\"min-h-screen bg-dark-bg\">\n      <Navbar />\n      <Hero />\n      <SelectedWork />\n      <About />\n      <Testimonials />\n      <Process />\n      <ContactCTA />\n      <Footer />\n    </div>\n  )\n}\n\nexport default App","src/components/Navbar.tsx":"import React, { useState, useEffect } from 'react'\n\nconst Navbar = () => {\n  const [isScrolled, setIsScrolled] = useState(false)\n  const [isMenuOpen, setIsMenuOpen] = useState(false)\n\n  useEffect(() => {\n    const handleScroll = () => {\n      setIsScrolled(window.scrollY > 50)\n    }\n    window.addEventListener('scroll', handleScroll)\n    return () => window.removeEventListener('scroll', handleScroll)\n  }, [])\n\n  return (\n    <nav className={`fixed top-0 w-full z-50 transition-all duration-300 ${\n      isScrolled ? 'backdrop-blur-md bg-dark-bg/80 border-b border-white/10' : 'bg-transparent'\n    }`}>\n      <div className=\"max-w-7xl mx-auto px-6 lg:px-8\">\n        <div className=\"flex justify-between items-center h-20\">\n          <a href=\"#\" className=\"font-serif text-2xl font-bold text-gradient\">\n            Lina Moreau\n          </a>\n\n          {/* Desktop Menu */}\n          <div className=\"hidden md:flex items-center space-x-12\">\n            <a href=\"#work\" className=\"text-white/80 hover:text-gold transition-colors duration-200\">\n              Selected Work\n            </a>\n            <a href=\"#about\" className=\"text-white/80 hover:text-gold transition-colors duration-200\">\n              About\n            </a>\n            <a href=\"#process\" className=\"text-white/80 hover:text-gold transition-colors duration-200\">\n              Process\n            </a>\n            <a href=\"#contact\" className=\"bg-gold text-dark-bg px-6 py-2 rounded-full font-medium hover:bg-gold/90 transition-colors duration-200\">\n              Get in Touch\n            </a>\n          </div>\n\n          {/* Mobile Menu Button */}\n          <button \n            className=\"md:hidden\"\n            onClick={() => setIsMenuOpen(!isMenuOpen)}\n          >\n            <svg className=\"w-6 h-6 text-white\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n              <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M4 6h16M4 12h16M4 18h16\" />\n            </svg>\n          </button>\n        </div>\n\n        {/* Mobile Menu */}\n        {isMenuOpen && (\n          <div className=\"md:hidden absolute top-full left-0 w-full bg-dark-bg/95 backdrop-blur-md border-b border-white/10\">\n            <div className=\"flex flex-col space-y-4 p-6\">\n              <a href=\"#work\" className=\"text-white/80 hover:text-gold transition-colors duration-200\" onClick={() => setIsMenuOpen(false)}>\n                Selected Work\n              </a>\n              <a href=\"#about\" className=\"text-white/80 hover:text-gold transition-colors duration-200\" onClick={() => setIsMenuOpen(false)}>\n                About\n              </a>\n              <a href=\"#process\" className=\"text-white/80 hover:text-gold transition-colors duration-200\" onClick={() => setIsMenuOpen(false)}>\n                Process\n              </a>\n              <a href=\"#contact\" className=\"bg-gold text-dark-bg px-6 py-2 rounded-full font-medium hover:bg-gold/90 transition-colors duration-200 text-center\" onClick={() => setIsMenuOpen(false)}>\n                Get in Touch\n              </a>\n            </div>\n          </div>\n        )}\n      </div>\n    </nav>\n  )\n}\n\nexport default Navbar","src/components/Hero.tsx":"import React from 'react'\n\nconst Hero = () => {\n  return (\n    <section className=\"relative min-h-screen flex items-center overflow-hidden\">\n      {/* Background Image */}\n      <div className=\"absolute inset-0\">\n        <img \n          src=\"https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?w=1920&h=1080&fit=crop&q=80\"\n          alt=\"Elegant creative workspace with soft natural lighting\"\n          className=\"w-full h-full object-cover\"\n        />\n        <div className=\"absolute inset-0 overlay-gradient\"></div>\n      </div>\n\n      {/* Content */}\n      <div className=\"relative z-10 max-w-7xl mx-auto px-6 lg:px-8 grid lg:grid-cols-2 gap-16 items-center\">\n        <div className=\"space-y-8 animate-fade-in-up\">\n          <div className=\"space-y-6\">\n            <p className=\"text-xs uppercase tracking-widest font-medium text-gold\">\n              Creative Director & Designer\n            </p>\n            <h1 className=\"font-serif text-5xl lg:text-7xl font-bold tracking-tight leading-[1.1] text-white\">\n              Crafting Visual\n              <span className=\"block text-gradient\">Stories</span>\n              That Resonate\n            </h1>\n            <p className=\"text-lg lg:text-xl leading-relaxed text-white/70 max-w-xl\">\n              I create distinctive brand identities and editorial designs that capture the essence of luxury and sophistication, working with discerning clients who value exceptional craft.\n            </p>\n          </div>\n\n          <div className=\"flex flex-col sm:flex-row gap-4\">\n            <a \n              href=\"#work\" \n              className=\"bg-gold text-dark-bg px-8 py-4 rounded-full font-medium hover:bg-gold/90 transition-all duration-300 text-center\"\n            >\n              View Selected Work\n            </a>\n            <a \n              href=\"#contact\" \n              className=\"border border-white/20 text-white px-8 py-4 rounded-full font-medium hover:border-gold hover:text-gold transition-all duration-300 text-center\"\n            >\n              Start a Project\n            </a>\n          </div>\n        </div>\n\n        {/* Floating Element */}\n        <div className=\"hidden lg:flex justify-center items-center\">\n          <div className=\"animate-float\">\n            <div className=\"w-64 h-64 bg-gradient-to-br from-gold/20 to-transparent rounded-full blur-xl\"></div>\n          </div>\n        </div>\n      </div>\n\n      {/* Scroll Indicator */}\n      <div className=\"absolute bottom-8 left-1/2 transform -translate-x-1/2 animate-bounce\">\n        <svg className=\"w-6 h-6 text-white/60\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n          <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M19 14l-7 7m0 0l-7-7m7 7V3\" />\n        </svg>\n      </div>\n    </section>\n  )\n}\n\nexport default Hero","src/components/SelectedWork.tsx":"import React from 'react'\n\nconst SelectedWork = () => {\n  const projects = [\n    {\n      title: \"Maison Lumière\",\n      category: \"Brand Identity\",\n      description: \"Complete brand identity for a luxury French perfumery, including logo design, packaging, and retail environments.\",\n      image: \"https://images.unsplash.com/photo-1611224923853-80b023f02d71?w=800&h=1000&fit=crop&q=80\",\n      year: \"2024\"\n    },\n    {\n      title: \"Editorial Quarterly\",\n      category: \"Publication Design\",\n      description: \"Art direction and layout design for a premium lifestyle magazine focused on contemporary culture.\",\n      image: \"https://images.unsplash.com/photo-1586953208448-b95a79798f07?w=800&h=600&fit=crop&q=80\",\n      year: \"2023\"\n    },\n    {\n      title: \"Atelier Collection\",\n      category: \"Packaging Design\",\n      description: \"Luxury packaging system for an artisanal chocolate maker, emphasizing craftsmanship and premium materials.\",\n      image: \"https://images.unsplash.com/photo-1634942537034-2531766767d1?w=800&h=800&fit=crop&q=80\",\n      year: \"2024\"\n    }\n  ]\n\n  return (\n    <section id=\"work\" className=\"py-32 bg-dark-bg\">\n      <div className=\"max-w-7xl mx-auto px-6 lg:px-8\">\n        {/* Header */}\n        <div className=\"mb-24\">\n          <p className=\"text-xs uppercase tracking-widest font-medium text-gold mb-4\">\n            Portfolio\n          </p>\n          <h2 className=\"font-serif text-4xl lg:text-6xl font-bold tracking-tight leading-tight text-white mb-8\">\n            Selected Work\n          </h2>\n          <p className=\"text-lg lg:text-xl leading-relaxed text-white/70 max-w-3xl\">\n            A curated selection of recent projects that showcase my approach to creating memorable and impactful visual experiences.\n          </p>\n        </div>\n\n        {/* Projects Grid */}\n        <div className=\"space-y-32\">\n          {projects.map((project, index) => (\n            <div \n              key={project.title}\n              className={`grid lg:grid-cols-12 gap-12 items-center ${\n                index % 2 === 0 ? '' : 'lg:grid-flow-col-dense'\n              }`}\n            >\n              {/* Project Image */}\n              <div className={`lg:col-span-7 ${index % 2 === 0 ? '' : 'lg:col-start-6'}`}>\n                <div className=\"group cursor-pointer\">\n                  <div className=\"relative overflow-hidden rounded-2xl\">\n                    <img \n                      src={project.image}\n                      alt={project.title}\n                      className=\"w-full h-[600px] object-cover transition-transform duration-700 group-hover:scale-105\"\n                    />\n                    <div className=\"absolute inset-0 bg-dark-bg/0 group-hover:bg-dark-bg/20 transition-all duration-700\"></div>\n                  </div>\n                </div>\n              </div>\n\n              {/* Project Info */}\n              <div className={`lg:col-span-5 space-y-6 ${index % 2 === 0 ? '' : 'lg:col-start-1 lg:row-start-1'}`}>\n                <div className=\"space-y-4\">\n                  <div className=\"flex items-center justify-between\">\n                    <span className=\"text-sm text-gold font-medium\">{project.category}</span>\n                    <span className=\"text-sm text-white/60\">{project.year}</span>\n                  </div>\n                  <h3 className=\"font-serif text-3xl lg:text-4xl font-semibold text-white\">\n                    {project.title}\n                  </h3>\n                  <p className=\"text-lg leading-relaxed text-white/70\">\n                    {project.description}\n                  </p>\n                </div>\n\n                <div className=\"flex items-center space-x-4 pt-4\">\n                  <button className=\"text-gold hover:text-gold/80 transition-colors duration-200 flex items-center space-x-2\">\n                    <span className=\"font-medium\">View Project</span>\n                    <svg className=\"w-4 h-4\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n                      <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M17 8l4 4m0 0l-4 4m4-4H3\" />\n                    </svg>\n                  </button>\n                </div>\n              </div>\n            </div>\n          ))}\n        </div>\n\n        {/* View All Projects */}\n        <div className=\"text-center mt-32\">\n          <a \n            href=\"#contact\" \n            className=\"inline-flex items-center space-x-2 text-gold hover:text-gold/80 transition-colors duration-200 font-medium\"\n          >\n            <span>View All Projects</span>\n            <svg className=\"w-4 h-4\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n              <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M17 8l4 4m0 0l-4 4m4-4H3\" />\n            </svg>\n          </a>\n        </div>\n      </div>\n    </section>\n  )\n}\n\nexport default SelectedWork","src/components/About.tsx":"import React from 'react'\n\nconst About = () => {\n  return (\n    <section id=\"about\" className=\"py-32 bg-dark-surface\">\n      <div className=\"max-w-7xl mx-auto px-6 lg:px-8\">\n        <div className=\"grid lg:grid-cols-12 gap-16 items-start\">\n          {/* Text Content */}\n          <div className=\"lg:col-span-7 space-y-12\">\n            <div className=\"space-y-6\">\n              <p className=\"text-xs uppercase tracking-widest font-medium text-gold\">\n                About\n              </p>\n              <h2 className=\"font-serif text-4xl lg:text-5xl font-bold tracking-tight leading-tight text-white\">\n                Creating with Purpose & Precision\n              </h2>\n            </div>\n\n            <div className=\"space-y-8 text-lg leading-relaxed text-white/70\">\n              <p>\n                With over eight years of experience in creative direction and design, I specialize in developing sophisticated visual identities that tell compelling stories and create lasting connections.\n              </p>\n              <p>\n                My approach combines strategic thinking with meticulous attention to craft. I believe that exceptional design emerges from deep understanding—of the brand, the audience, and the cultural context in which they intersect.\n              </p>\n              <p>\n                Based in Paris, I work with clients across Europe and North America, from emerging luxury brands to established cultural institutions, always with a focus on creating work that stands the test of time.\n              </p>\n            </div>\n\n            {/* Stats */}\n            <div className=\"grid grid-cols-3 gap-8 pt-8 border-t border-white/10\">\n              <div className=\"space-y-2\">\n                <div className=\"font-serif text-3xl font-bold text-white\">50+</div>\n                <div className=\"text-sm text-white/60\">Projects Completed</div>\n              </div>\n              <div className=\"space-y-2\">\n                <div className=\"font-serif text-3xl font-bold text-white\">8</div>\n                <div className=\"text-sm text-white/60\">Years Experience</div>\n              </div>\n              <div className=\"space-y-2\">\n                <div className=\"font-serif text-3xl font-bold text-white\">15</div>\n                <div className=\"text-sm text-white/60\">Awards Won</div>\n              </div>\n            </div>\n          </div>\n\n          {/* Image */}\n          <div className=\"lg:col-span-5\">\n            <div className=\"relative\">\n              <img \n                src=\"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&h=800&fit=crop&q=80\"\n                alt=\"Professional portrait of Lina Moreau\"\n                className=\"w-full h-[700px] object-cover rounded-2xl\"\n              />\n              <div className=\"absolute -bottom-8 -left-8 w-32 h-32 bg-gold/20 rounded-full blur-2xl\"></div>\n       function showError(message) {

      function normalizePath(value) {
        const parts = value.split("/");
        const next = [];
        for (const part of parts) {
          if (part === "..") {
            next.pop();
          } else if (part && part !== ".") {
            next.push(part);
          }

        return next.join("/");

          const baseDir = importerPath.split("/").slice(0, -1).join("/");
          return normalizePath((baseDir ? baseDir + "/" : "") + target);
        }
        return target;

          value + ".tsx",

          value + "/index.jsx",
          value + "/index.js",

            return candidate;

        return null;

      function compile(source, filename) {
