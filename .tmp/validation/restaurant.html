] = useState(false);\n\n  useEffect(() => {\n    const media = window.matchMedia(`(max-width: ${breakpoint - 1}px)`);\n    const update = () => setIsMobile(media.matches);\n    update();\n    media.addEventListener(\"change\", update);\n    return () => media.removeEventListener(\"change\", update);\n  }, [breakpoint]);\n\n  return isMobile;\n}","src/pages/Home.tsx":"import App from \"../App\";\n\nexport default function HomePage() {\n  return <App />;\n}","src/test/setup.ts":"import \"@testing-library/jest-dom\";","src/test/App.test.tsx":"import { render, screen } from \"@testing-library/react\";\nimport App from \"../App\";\n\ndescribe(\"App\", () => {\n  it(\"renders without crashing\", () => {\n    render(<App />);\n    expect(screen.getByRole(\"main\")).toBeInTheDocument();\n  });\n});","src/lib/utils.ts":"import { clsx, type ClassValue } from \"clsx\";\n\nexport function cn(...inputs: ClassValue[]) {\n  return clsx(inputs);\n}","src/components/ui/button.tsx":"import React from \"react\";\nimport { Slot } from \"@radix-ui/react-slot\";\nimport { cva, type VariantProps } from \"class-variance-authority\";\nimport { cn } from \"@/lib/utils\";\n\nconst buttonVariants = cva(\n  \"inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0\",\n  {\n    variants: {\n      variant: {\n        default: \"bg-primary text-primary-foreground hover:bg-primary/90\",\n        destructive: \"bg-destructive text-destructive-foreground hover:bg-destructive/90\",\n        outline: \"border border-input bg-background hover:bg-accent hover:text-accent-foreground\",\n        secondary: \"bg-secondary text-secondary-foreground hover:bg-secondary/80\",\n        ghost: \"hover:bg-accent hover:text-accent-foreground\",\n        link: \"text-primary underline-offset-4 hover:underline\",\n      },\n      size: {\n        default: \"h-10 px-4 py-2\",\n        sm: \"h-9 rounded-md px-3\",\n        lg: \"h-11 rounded-md px-8\",\n        icon: \"h-10 w-10\",\n      },\n    },\n    defaultVariants: {\n      variant: \"default\",\n      size: \"default\",\n    },\n  }\n);\n\ntype ButtonProps = React.ButtonHTMLAttributes<HTMLButtonElement> &\n  VariantProps<typeof buttonVariants> & {\n    asChild?: boolean;\n  };\n\nconst Button = React.forwardRef<HTMLButtonElement, ButtonProps>(\n  ({ className, variant, size, asChild = false, ...props }, ref) => {\n    const Comp = asChild ? Slot : \"button\";\n    return (\n      <Comp\n        className={cn(buttonVariants({ variant, size, className }))}\n        ref={ref}\n        {...props}\n      />\n    );\n  }\n);\nButton.displayName = \"Button\";\n\nexport { Button, buttonVariants };\nexport default Button;","src/components/ui/accordion.tsx":"import React from \"react\";\nimport * as AccordionPrimitive from \"@radix-ui/react-accordion\";\nimport { cn } from \"@/lib/utils\";\n\nconst Accordion = AccordionPrimitive.Root;\n\nconst AccordionItem = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement> & { value: string }>(\n  ({ className, ...props }, ref) => (\n    <AccordionPrimitive.Item ref={ref} className={cn(\"border-b\", className)} {...props} />\n  )\n);\nAccordionItem.displayName = \"AccordionItem\";\n\nconst AccordionTrigger = React.forwardRef<HTMLButtonElement, React.ButtonHTMLAttributes<HTMLButtonElement>>(\n  ({ className, children, ...props }, ref) => (\n    <AccordionPrimitive.Header className=\"flex\">\n      <AccordionPrimitive.Trigger\n        ref={ref}\n        className={cn(\n          \"flex flex-1 items-center justify-between py-4 font-medium transition-all [&[data-state=open]>svg]:rotate-180\",\n          className\n        )}\n        {...props}\n      >\n        {children}\n        <svg xmlns=\"htt alogPortal>\n  )\n);\nDialogContent.displayName = \"DialogContent\";\n\nconst DialogTitle = React.forwardRef<HTMLHeadingElement, React.HTMLAttributes<HTMLHeadingElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Title ref={ref} className={cn(\"text-lg font-semibold\", className)} {...props} />\n  )\n);\nDialogTitle.displayName = \"DialogTitle\";\n\nconst DialogDescription = React.forwardRef<HTMLParagraphElement, React.HTMLAttributes<HTMLParagraphElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Description ref={ref} className={cn(\"text-sm text-zinc-500\", className)} {...props} />\n  )\n);\nDialogDescription.displayName = \"DialogDescription\";\n\nexport { Dialog, DialogTrigger, DialogContent, DialogClose, DialogOverlay, DialogTitle, DialogDescription };","src/components/ui/sheet.tsx":"import React from \"react\";\nimport * as DialogPrimitive from \"@radix-ui/react-dialog\";\nimport { cn } from \"@/lib/utils\";\n\nconst Sheet = DialogPrimitive.Root;\nconst SheetTrigger = DialogPrimitive.Trigger;\nconst SheetClose = DialogPrimitive.Close;\n\nconst SheetOverlay = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Overlay\n      ref={ref}\n      className={cn(\"fixed inset-0 z-50 bg-black/60 backdrop-blur-sm\", className)}\n      {...props}\n    />\n  )\n);\nSheetOverlay.displayName = \"SheetOverlay\";\n\ntype SheetContentProps = React.HTMLAttributes<HTMLDivElement> & {\n  side?: \"left\" | \"right\" | \"top\" | \"bottom\";\n};\n\nconst sideStyles: Record<string, string> = {\n  right: \"inset-y-0 right-0 h-full w-3/4 max-w-sm border-l translate-x-0\",\n  left: \"inset-y-0 left-0 h-full w-3/4 max-w-sm border-r translate-x-0\",\n  top: \"inset-x-0 top-0 border-b\",\n  bottom: \"inset-x-0 bottom-0 border-t\",\n};\n\nconst SheetContent = React.forwardRef<HTMLDivElement, SheetContentProps>(\n  ({ side = \"right\", className, children, ...props }, ref) => (\n    <DialogPrimitive.Portal>\n      <SheetOverlay />\n      <DialogPrimitive.Content\n        ref={ref}\n        className={cn(\n          \"fixed z-50 bg-white p-6 shadow-xl transition-transform duration-300\",\n          sideStyles[side],\n          className\n        )}\n        {...props}\n      >\n        {children}\n      </DialogPrimitive.Content>\n    </DialogPrimitive.Portal>\n  )\n);\nSheetContent.displayName = \"SheetContent\";\n\nexport { Sheet, SheetTrigger, SheetContent, SheetClose };","src/components/ui/input.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype InputProps = React.InputHTMLAttributes<HTMLInputElement> & {\n  label?: string;\n  error?: string;\n};\n\nexport default function Input({ label, error, className, id, ...props }: InputProps) {\n  const inputId = id || (label ? label.toLowerCase().replace(/\\s+/g, \"-\") : undefined);\n  return (\n    <div>\n      {label && (\n        <label htmlFor={inputId} className=\"block text-sm font-medium mb-1.5\">\n          {label}\n        </label>\n      )}\n      <input\n        id={inputId}\n        className={cn(\n          \"flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50\",\n          error && \"border-destructive focus-visible:ring-destructive\",\n          className\n        )}\n        {...props}\n      />\n      {error && <p className=\"mt-1 text-sm text-destructive\">{error}</p>}\n    </div>\n  );\n}","src/components/ui/textarea.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype TextareaProps = React.TextareaHTMLAttributes<HTMLTextAreaElement> & {\n  label?: string;\n};\n\nexport default function Textarea({ label, className, id, ...props }: TextareaProps) {\n  const inputId = id || (label ? label.toLowerCase().replace(/\\s+/g, \"-\") : undefined);\n  return (\n    <div>\n      {label && (\n        <label htmlFor={inputId} className=\"block text-sm font-medium mb-1.5\">\n          {label}\n        </label>\n      )}\n      <textarea\n        id={inputId}\n        rows={4}\n        className={cn(\n          \"w-full rounded-lg border px-4 py-2.5 text-base outline-none transition-colors resize-none\",\n          className\n        )}\n        {...props}\n      />\n    </div>\n  );\n}","src/components/ui/badge.tsx":"import React from \"react\";\nimport { cva, type VariantProps } from \"class-variance-authority\";\nimport { cn } from \"@/lib/utils\";\n\nconst badgeVariants = cva(\n  \"inline-flex items-center rounded-full font-medium\",\n  {\n    variants: {\n      size: {\n        sm: \"px-2 py-0.5 text-[10px]\",\n        md: \"px-2.5 py-0.5 text-xs\",\n        lg: \"px-3 py-1 text-sm\",\n      },\n    },\n    defaultVariants: {\n      size: \"md\",\n    },\n  }\n);\n\ntype BadgeProps = React.HTMLAttributes<HTMLSpanElement> &\n  VariantProps<typeof badgeVariants>;\n\nexport default function Badge({ className, size, ...props }: BadgeProps) {\n  return (\n    <span className={cn(badgeVariants({ size }), className)} {...props} />\n  );\n}\n\nexport { badgeVariants };","src/components/ui/card.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype CardProps = {\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Card({ className, children }: CardProps) {\n  return (\n    <div className={cn(\"surface-card rounded-[calc(var(--radius)+6px)] border bg-card text-card-foreground shadow-sm p-6\", className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/section.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SectionProps = {\n  id?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Section({ id, className, children }: SectionProps) {\n  return (\n    <section id={id} className={cn(\"py-16 md:py-24\", className)}>\n      {children}\n    </section>\n  );\n}","src/components/ui/container.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype ContainerProps = {\n  size?: \"sm\" | \"md\" | \"lg\" | \"xl\" | \"full\";\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst maxWidths: Record<string, string> = {\n  sm: \"max-w-3xl\",\n  md: \"max-w-5xl\",\n  lg: \"max-w-6xl\",\n  xl: \"max-w-7xl\",\n  full: \"max-w-full\",\n};\n\nexport default function Container({ size = \"xl\", className, children }: ContainerProps) {\n  return (\n    <div className={cn(\"mx-auto px-4 sm:px-6 lg:px-8\", maxWidths[size], className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/heading.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype HeadingProps = {\n  as?: \"h1\" | \"h2\" | \"h3\" | \"h4\";\n  size?: \"display\" | \"h1\" | \"h2\" | \"h3\";\n  eyebrow?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst sizeStyles: Record<string, string> = {\n  display: \"text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight leading-[1.1]\",\n  h1: \"text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight leading-tight\",\n  h2: \"text-3xl md:text-4xl font-semibold tracking-tight\",\n  h3: \"text-xl md:text-2xl font-semibold\",\n};\n\nexport default function Heading({\n  as: Tag = \"h2\",\n  size = \"h2\",\n  eyebrow,\n  className,\n  children,\n}: HeadingProps) {\n  return (\n    <div>\n      {eyebrow && (\n        <span className=\"block text-xs uppercase tracking-widest font-medium mb-3 opacity-60\">\n          {eyebrow}\n        </span>\n      )}\n      <Tag className={cn(sizeStyles[size], className)}>{children}</Tag>\n    </div>\n  );\n}","src/components/ui/separator.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SeparatorProps = {\n  orientation?: \"horizontal\" | \"vertical\";\n  cla rc/components/Navbar.tsx":"import React from 'react';\nimport { Button } from '@/components/ui/button';\nimport MobileNav from '@/components/ui/mobile-nav';\n\nconst navLinks = [\n  { label: 'Menu', href: '#menu' },\n  { label: 'Chef', href: '#chef' },\n  { label: 'Gallery', href: '#gallery' },\n  { label: 'Location', href: '#location' }\n];\n\nexport default function Navbar() {\n  return (\n    <nav className=\"fixed top-0 w-full z-50 bg-zinc-950/90 backdrop-blur-md border-b border-zinc-800\">\n      <div className=\"max-w-7xl mx-auto px-6 h-20 flex items-center justify-between\">\n        <div className=\"font-serif text-2xl font-bold text-amber-400\">\n          Maison Noir\n        </div>\n        \n        {/* Desktop Navigation */}\n        <div className=\"hidden md:flex items-center space-x-8\">\n          {navLinks.map((link) => (\n            <a\n              key={link.href}\n              href={link.href}\n              className=\"text-zinc-300 hover:text-amber-400 transition-colors text-sm tracking-wide\"\n            >\n              {link.label}\n            </a>\n          ))}\n        </div>\n\n        <div className=\"hidden md:block\">\n          <Button className=\"bg-amber-600 text-zinc-950 hover:bg-amber-500 font-medium\">\n            Reserve Table\n          </Button>\n        </div>\n\n        {/* Mobile Navigation */}\n        <div className=\"md:hidden\">\n          <MobileNav \n            links={navLinks}\n            brandName=\"Maison Noir\"\n            ctaLabel=\"Reserve Table\"\n            ctaHref=\"#reservation\"\n            className=\"bg-zinc-950 border-zinc-800\"\n          />\n        </div>\n      </div>\n    </nav>\n  );\n}","src/components/Hero.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Button } from '@/components/ui/button';\nimport { Badge } from '@/components/ui/badge';\nimport projectImages from '@/assets/generated-images';\n\nexport default function Hero() {\n  return (\n    <Section className=\"min-h-screen flex items-center bg-zinc-950 text-zinc-50 relative overflow-hidden\">\n      <Container className=\"relative z-10\">\n        <div className=\"grid lg:grid-cols-12 gap-8 items-center min-h-[80vh]\">\n          {/* Left Content Panel */}\n          <div className=\"lg:col-span-5 max-w-xl\">\n            <div className=\"mb-6\">\n              <Badge className=\"bg-zinc-800 text-amber-400 border-amber-400/30 mb-4\">\n                Est. 2018\n              </Badge>\n              <div className=\"flex items-center gap-4 mb-4\">\n                <div className=\"text-xs uppercase tracking-[0.3em] text-zinc-400\">\n                  ★ Michelin Star\n                </div>\n                <div className=\"text-xs uppercase tracking-[0.3em] text-zinc-400\">\n                  James Beard Semifinalist\n                </div>\n              </div>\n            </div>\n            \n            <Heading as=\"h1\" size=\"display\" className=\"font-serif text-5xl md:text-7xl leading-[0.9] mb-6\">\n              Maison Noir\n            </Heading>\n            \n            <p className=\"text-xl text-zinc-400 mb-2\">Modern French Cuisine</p>\n            <p className=\"text-lg text-zinc-300 leading-relaxed max-w-lg mb-8\">\n              An intimate culinary journey where tradition meets innovation. Chef Laurent Dubois crafts each dish with precision and passion in our award-winning kitchen.\n            </p>\n\n            <div className=\"flex flex-wrap gap-4\">\n              <Button size=\"lg\" className=\"bg-amber-600 text-zinc-950 hover:bg-amber-500\">\n                Reserve Your Table\n              </Button>\n              <Button size=\"lg\" variant=\"outline\" className=\"border-zinc-600 text-zinc-300 hover:bg-zinc-800\">\n                View Menu\n              </Button>\n            </div>\n\n            {/* Awards Rail */}\n            <div className=\"mt-12 pt-8 border-t border-zinc-800\">\n              <div className=\"grid grid-cols-3 gap-6 text-center\">\n                <div>\n                  <div className=\"text-2xl font-serif font-bold text-amber-400 mb-1\">★</div>\n                  <div className=\"text-xs uppercase tracking-wide text-zinc-500\">Michelin</div>\n                </div>\n                <div>\n                  <div className=\"text-2xl font-serif font-bold text-amber-400 mb-1\">95</div>\n                  <div className=\"text-xs uppercase tracking-wide text-zinc-500\">Wine Spectator</div>\n                </div>\n                <div>\n                  <div className=\"text-2xl font-serif font-bold text-amber-400 mb-1\">4.9</div>\n                  <div className=\"text-xs uppercase tracking-wide text-zinc-500\">OpenTable</div>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          {/* Right Image Panel */}\n          <div className=\"lg:col-span-7 relative\">\n            <div className=\"relative\">\n              <img \n                src={projectImages.hero} \n                alt=\"Elegant dining room at Maison Noir with warm atmospheric lighting\"\n                className=\"rounded-2xl object-cover w-full aspect-[4/3] shadow-2xl\"\n              />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-950/20 to-transparent rounded-2xl\"></div>\n            </div>\n          </div>\n        </div>\n      \n      <div className=\"mt-8 grid max-w-2xl grid-cols-1 gap-3 sm:grid-cols-3 sm:gap-4\">\n        <div className=\"surface-card rounded-[calc(var(--radius)+4px)] border px-4 py-3\">\n          <p className=\"text-lg font-semibold\">Local</p>\n          <p className=\"mt-1 text-xs uppercase tracking-[0.18em] text-muted-foreground\">Ingredient sourcing</p>\n        </div>\n<div className=\"surface-card rounded-[calc(var(--radius)+4px)] border px-4 py-3\">\n          <p className=\"text-lg font-semibold\">Handmade</p>\n          <p className=\"mt-1 text-xs uppercase tracking-[0.18em] text-muted-foreground\">Craft standard</p>\n        </div>\n<div className=\"surface-card rounded-[calc(var(--radius)+4px)] border px-4 py-3\">\n          <p className=\"text-lg font-semibold\">Seasonal</p>\n          <p className=\"mt-1 text-xs uppercase tracking-[0.18em] text-muted-foreground\">Small-batch rhythm</p>\n        </div>\n      </div>\n      <div className=\"family-divider mt-6 max-w-2xl\"></div>\n      <p className=\"mt-4 max-w-xl text-sm text-muted-foreground\">Buttons feel inviting and crafted, with warm contrast and soft but confident structure.</p>\n      </Container>\n    </Section>\n  );\n}","src/components/ChefStory.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport projectImages from '@/assets/generated-images';\n\nexport default function ChefStory() {\n  return (\n    <Section className=\"bg-zinc-900 py-24\">\n      <Container>\n        <div className=\"grid lg:grid-cols-1 lg:grid-cols-1 sm:grid-cols-2 gap-16 items-start\">\n          {/* Chef Portrait */}\n          <div className=\"\">\n            <div className=\"relative\">\n              <img \n                src={projectImages.support} \n                alt=\"Chef Laurent Dubois working in the kitchen with warm lighting\"\n                className=\"rounded-2xl object-cover w-full min-h-[260px] shadow-xl\"\n              />\n              <div className=\"mt-6 text-center\">\n                <div className=\"text-sm uppercase tracking-[0.2em] text-zinc-400 mb-1\">Executive Chef</div>\n                <div className=\"text-xl font-serif text-amber-400\">Laurent Dubois</div>\n              </div>\n            </div>\n          </div>\n\n          {/* Chef Story Content */}\n          <div className=\"\">\n            <Heading as=\"h2\" size=\"h1\" className=\"font-serif text-4xl md:text-5xl mb-8 text-zinc-100\">\n              A Philosophy of <em className=\"text-amber-400\">Terroir</em>\n            </Heading>\n\n            <div className=\"prose prose-lg prose-invert max-w-none\">\n              <p className=\"text-lg leading-relaxed text-zinc-300 mb-6\">\n                \"I believe that great cuisine begins with understanding the land, the seasons, and the stories that connect us to our ingredients. Each dish at Maison Noir is a conversation between tradition and innovation, where classical French techniques meet the vibrant flavors of our local terroir.\"\n              </p>\n\n              {/* Pull Quote */}\n              <blockquote className=\"border-l-4 border-amber-400 pl-8 my-8\">\n                <p className=\"text-2xl font-serif italic text-amber-400 leading-relaxed\">\n                  \"Cooking is not just about feeding the body—it's about nourishing the soul and creating memories that last a lifetime.\"\n                </p>\n              </blockquote>\n\n              <p className=\"text-lg leading-relaxed text-zinc-300 mb-8\">\n                Born in Lyon and trained in the kitchens of Le Bernardin and Eleven Madison Park, I've spent over two decades perfecting my craft. At Maison Noir, we source from local farms within 50 miles, change our menu with the seasons, and never compromise on the integrity of our ingredients.\n              </p>\n\n              {/* Signature */}\n              <div className=\"mt-12\">\n                <div className=\"font-serif text-3xl text-amber-400 mb-2\">Laurent Dubois</div>\n                <div className=\"text-sm uppercase tracking-[0.2em] text-zinc-500\">Executive Chef & Owner</div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/MenuHighlights.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Separator } from '@/components/ui/separator';\nimport projectImages from '@/assets/generated-images';\n\nconst menuSections = [\n  {\n    title: \"Amuse-Bouche\",\n    items: [\n      {\n        name: \"Oyster Foam\",\n        description: \"Kumamoto oyster, champagne foam, micro herbs\",\n        price: \"18\"\n      },\n      {\n        name: \"Foie Gras Macaron\",\n        description: \"Duck liver mousse, cherry gastrique, brioche crumb\",\n        price: \"24\"\n      }\n    ]\n  },\n  {\n    title: \"Entrées\",\n    items: [\n      {\n        name: \"Diver Scallops\",\n        description: \"Pan-seared Maine scallops, cauliflower purée, pancetta, brown butter\",\n        price: \"42\"\n      },\n      {\n        name: \"Duck Breast\",\n        description: \"Muscovy duck, cherry reduction, roasted root vegetables, jus\",\n        price: \"48\",\n        featured: true\n      },\n      {\n        name: \"Lobster Thermidor\",\n        description: \"Atlantic lobster, cognac cream, gruyère, herb crust\",\n        price: \"65\"\n      }\n    ]\n  },\n  {\n    title: \"Desserts\",\n    items: [\n      {\n        name: \"Chocolate Soufflé\",\n        description: \"Valrhona dark chocolate, vanilla bean ice cream\",\n        price: \"16\"\n      },\n      {\n        name: \"Tarte Tatin\",\n        description: \"Caramelized apple, puff pastry, Calvados crème fraîche\",\n        price: \"14\"\n      }\n    ]\n  }\n];\n\nexport default function MenuHighlights() {\n  return (\n    <Section id=\"menu\" className=\"bg-zinc-950 py-24\">\n      <Container>\n        <div className=\"max-w-4xl mx-auto\">\n          <div className=\"text-center mb-16\">\n            <Heading as=\"h2\" size=\"h1\" className=\"font-serif text-4xl md:text-5xl mb-6 text-zinc-100\">\n              Seasonal Menu\n            </Heading>\n            <p className=\"text-lg text-zinc-400 max-w-2xl mx-auto\">\n              Our menu changes with the seasons, featuring the finest local ingredients and time-honored French techniques.\n            </p>\n          </div>\n\n          <div className=\"space-y-16\">\n            {menuSections.map((section, sectionIndex) => (\n              <div key={section.title}>\n                <div className=\"mb-8\">\n                  <h3 className=\"text-2xl font-serif text-amber-400 text-center mb-4\">\n                    {section.title}\n                  </h3>\n                  <Separator className=\"bg-zinc-800 max-w-32 mx-auto\" />\n                </div>\n\n                <div className=\"space-y-6\">\n                  {section.items.map((item, itemIndex) => {\n                    if (item.featured) {\n                      return (\n                        <div key={item.name} className=\"bg-zinc-900 rounded-2xl p-8 border border-amber-400/20 relative overflow-hidden\">\n                          <div className=\"grid lg:grid-cols-2 gap-8 items-center\">\n                            <div>\n                              <div className=\"inline-block px-3 py-1 bg-amber-400/10 border border-amber-400/30 rounded-full text-xs uppercase tracking-wide text-amber-400 mb-4\">\n                                Signature Dish\n                              </div>\n                              <h4 className=\"text-2xl font-serif text-zinc-100 mb-3\">{item.name}</h4>\n                              <p className=\"text-zinc-300 leading-relaxed mb-4\">{item.description}</p>\n                              <p className=\"text-xl font-semibold text-amber-400\">${item.price}</p>\n                              <p className=\"text-sm text-zinc-400 mt-4 italic\">\n                                \"This dish represents everything we stand for at Maison Noir—tradition, innovation, and an unwavering commitment to excellence.\" — Chef Laurent\n                              </p>\n                            </div>\n                            <div>\n                              <img \n                                src={projectImages.detail1} \n                                alt={`${item.name} - signature dish at Maison Noir`}\n                                className=\"rounded-xl object-cover w-full aspect-square shadow-lg\"\n                              />\n                            </div>\n                          </div>\n                        </div>\n                      );\n                    }\n\n                    return (\n                      <div key={item.name} className=\"flex items-start justify-between border-b border-zinc-800 pb-6\">\n                        <div className=\"flex-1\">\n                          <h4 className=\"text-xl font-serif text-zinc-100 mb-2\">{item.name}</h4>\n                          <p className=\"text-zinc-400 leading-relaxed\">{item.description}</p>\n                        </div>\n                        <div className=\"ml-8 text-right\">\n                          <p className=\"text-lg font-semibold text-amber-400\">${item.price}</p>\n                        </div>\n                      </div>\n                    );\n                  })}\n                </div>\n              </div>\n            ))}\n          </div>\n\n          <div className=\"mt-16 text-center\">\n            <p className=\"text-zinc-400 mb-6\">Wine pairings available for each course</p>\n            <div className=\"inline-flex items-center space-x-2 text-sm text-zinc-500\">\n              <span>Menu updated seasonally</span>\n              <span>•</span>\n              <span>Dietary accommodations available</span>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/Gallery.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport projectImages from '@/assets/generated-images';\n\nexport default function Gallery() {\n  return (\n    <Section id=\"gallery\" className=\"bg-zinc-900 py-24\">\n      <Container>\n        <div className=\"text-center mb-16\">\n          <Heading as=\"h2\" size=\"h1\" className=\"font-serif text-4xl md:text-5xl mb-6 text-zinc-100\">\n            Experience\n          </Heading>\n          <p className=\"text-lg text-zinc-400 max-w-2xl mx-auto\">\n            Step into our world of culinary artistry and intimate hospitality.\n          </p>\n        </div>\n\n        {/* Asymmetric Gallery Layout */}\n        <div className=\"grid grid-cols-4 gap-6 h-[600px]\">\n          {/* Large Feature Image */}\n          <div className=\"col-span-4  row-span-2\">\n            <div className=\"relative h-full group\">\n              <img \n                src={projectImages.gallery1} \n                alt=\"Elegant dining room interior at Maison Noir\"\n                className=\"rounded-2xl object-cover w-full h-full shadow-xl transition-transform duration-500 group-hover:scale-[1.02]\"\n              />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-950/40 via-transparent to-transparent rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300\"></div>\n              <div className=\"absolute bottom-6 left-6 text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300\">\n                <h3 className=\"text-xl font-serif mb-1\">Main Dining Room</h3>\n                <p className=\"text-sm text-zinc-300\">Intimate seating for 32 guests</p>\n              </div>\n            </div>\n          </div>\n\n          {/* Top Right Image */}\n          <div className=\"col-span-4  h-[285px]\">\n            <div className=\"relative h-full group\">\n              <img \n                src={projectImages.gallery2} \n                alt=\"Artfully plated signature dish\"\n                className=\"rounded-2xl object-cover w-full h-full shadow-xl transition-transform duration-500 group-hover:scale-[1.02]\"\n              />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-950/40 via-transparent to-transparent rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300\"></div>\n              <div className=\"absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300\">\n                <h3 className=\"text-lg font-serif mb-1\">Culinary Artistry</h3>\n                <p className=\"text-xs text-zinc-300\">Every plate tells a story</p>\n              </div>\n            </div>\n          </div>\n\n          {/* Bottom Right Image */}\n          <div className=\"col-span-4  h-[285px]\">\n            <div className=\"relative h-full group\">\n              <img \n                src={projectImages.gallery3} \n                alt=\"Wine service and bar area\"\n                className=\"rounded-2xl object-cover w-full h-full shadow-xl transition-transform duration-500 group-hover:scale-[1.02]\"\n              />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-950/40 via-transparent to-transparent rounded-2xl opacity-0 group-hover:opacity-100 transition-opacity duration-300\"></div>\n              <div className=\"absolute bottom-4 left-4 text-white opacity-0 group-hover:opacity-100 transition-opacity duration-300\">\n                <h3 className=\"text-lg font-serif mb-1\">Wine Program</h3>\n                <p className=\"text-xs text-zinc-300\">400+ carefully curated bottles</p>\n              </div>\n            </div>\n          </div>\n        </div>\n\n        <div className=\"mt-12 text-center\">\n          <p className=\"text-zinc-400 text-sm\">\n            Private dining room available for special occasions and corporate events\n          </p>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/PressProof.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\n\nexport default function PressProof() {\n  return (\n    <Section className=\"bg-zinc-950 py-24 border-t border-zinc-800\">\n      <Container>\n        <div className=\"max-w-5xl mx-auto\">\n          {/* Main Quote */}\n          <div className=\"text-center mb-16\">\n            <blockquote className=\"text-3xl md:text-4xl font-serif italic text-amber-400 leading-relaxed mb-8\">\n              \"Maison Noir delivers an extraordinary culinary experience that rivals the finest establishments in Paris. Chef Dubois has created something truly special—a restaurant where every detail serves the greater symphony of flavor and hospitality.\"\n            </blockquote>\n            <div className=\"flex items-start justify-center space-x-4\">\n              <div className=\"text-lg font-medium text-zinc-200\">James Mitchell</div>\n              <div className=\"w-px h-6 bg-zinc-600\"></div>\n              <div className=\"text-sm uppercase tracking-[0.2em] text-zinc-400\">The New York Times</div>\n            </div>\n          </div>\n\n          {/* Secondary Quotes */}\n          <div className=\"grid grid-cols-1 gap-12\">\n            <div className=\"text-center\">\n              <p className=\"text-xl text-zinc-300 italic mb-4 leading-relaxed\">\n                \"A masterclass in French cuisine with impeccable service. The duck breast alone is worth the journey.\"\n              </p>\n              <div className=\"text-sm\">\n                <div className=\"text-zinc-200 font-medium\">Sarah Chen</div>\n                <div className=\"text-zinc-500 uppercase tracking-wide\">Food & Wine Magazine</div>\n              </div>\n            </div>\n\n            <div className=\"text-center\">\n              <p className=\"text-xl text-zinc-300 italic mb-4 leading-relaxed\">\n                \"Dubois has achieved that rare balance of innovation and tradition that defines truly great restaurants.\"\n              </p>\n              <div className=\"text-sm\">\n                <div className=\"text-zinc-200 font-medium\">Marcus Williams</div>\n                <div className=\"text-zinc-500 uppercase tracking-wide\">Bon Appétit</div>\n              </div>\n            </div>\n          </div>\n\n          {/* Awards Strip */}\n          <div className=\"mt-16 pt-12 border-t border-zinc-800\">\n            <div className=\"flex flex-wrap items-start justify-center gap-8 opacity-60\">\n              <div className=\"text-center\">\n                <div className=\"text-2xl font-serif text-amber-400 mb-1\">★</div>\n                <div className=\"text-xs uppercase tracking-wide text-zinc-500\">Michelin Guide</div>\n              </div>\n              <div className=\"text-center\">\n                <div className=\"text-sm font-medium text-zinc-400 mb-1\">James Beard</div>\n                <div className=\"text-xs uppercase tracking-wide text-zinc-500\">Semifinalist</div>\n              </div>\n              <div className=\"text-center\">\n                <div className=\"text-sm font-medium text-zinc-400 mb-1\">Wine Spectator</div>\n                <div className=\"text-xs uppercase tracking-wide text-zinc-500\">Award of Excellence</div>\n              </div>\n              <div className=\"text-center\">\n                <div className=\"text-sm font-medium text-zinc-400 mb-1\">AAA</div>\n                <div className=\"text-xs uppercase tracking-wide text-zinc-500\">Four Diamond</div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/Reservation.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Button } from '@/components/ui/button';\nimport { Input } from '@/components/ui/input';\nimport { Textarea } from '@/components/ui/textarea';\nimport { Card } from '@/components/ui/card';\n\nexport default function Reservation() {\n  return (\n    <Section id=\"reservation\" className=\"bg-zinc-900 py-24\">\n      <Container>\n        <div className=\"max-w-6xl mx-auto\">\n          <div className=\"text-center mb-16\">\n            <Heading as=\"h2\" size=\"h1\" className=\"font-serif text-4xl md:text-5xl mb-6 text-zinc-100\">\n              Make a Reservation\n            </Heading>\n            <p className=\"text-lg text-zinc-400 max-w-2xl mx-auto\">\n              Join us for an unforgettable culinary experience. Reservations are highly recommended.\n            </p>\n          </div>\n\n          <div className=\"grid grid-cols-1 gap-16 items-start\">\n            {/* Booking Details */}\n            <div>\n              <div className=\"mb-8\">\n                <h3 className=\"text-2xl font-serif text-amber-400 mb-6\">Dining Hours</h3>\n                \n                <div className=\"space-y-4 mb-8\">\n                  <div className=\"flex justify-between items-start py-3 border-b border-zinc-800\">\n                    <span className=\"text-zinc-300 font-medium\">Dinner Service</span>\n                    <span className=\"text-zinc-400\">5:30 PM - 10:00 PM</span>\n                  </div>\n                  <div className=\"flex justify-between items-start py-3 border-b border-zinc-800\">\n                    <span className=\"text-zinc-300 font-medium\">Weekend Lunch</span>\n                    <span className=\"text-zinc-400\">12:00 PM - 3:00 PM</span>\n                  </div>\n                  <div className=\"flex justify-between items-start py-3\">\n                    <span className=\"text-zinc-300 font-medium\">Closed</span>\n                    <span className=\"text-zinc-400\">Mondays</span>\n                  </div>\n                </div>\n\n                <div className=\"bg-zinc-950 rounded-xl p-6 border border-zinc-800\">\n                  <h4 className=\"text-lg font-serif text-amber-400 mb-4\">Private Dining</h4>\n                  <p className=\"text-zinc-300 text-sm leading-relaxed mb-4\">\n                    Our intimate private dining room accommodates up to 12 guests for special occasions, business dinners, and celebrations.\n                  </p>\n                  <Button variant=\"outline\" className=\"border-amber-400 text-amber-400 hover:bg-amber-400 hover:text-zinc-950\">\n                    Inquire About Private Events\n                  </Button>\n                </div>\n\n                <div className=\"mt-6 text-sm text-zinc-400\">\n                  <p className=\"mb-2\">\n                    <strong className=\"text-zinc-300\">Dress Code:</strong> Business casual or cocktail attire preferred\n                  </p>\n                  <p>\n                    <strong className=\"text-zinc-300\">Cancellation:</strong> 24-hour notice required\n                  </p>\n                </div>\n              </div>\n            </div>\n\n            {/* Reservation Form */}\n            <Card className=\"bg-zinc-950 border-zinc-800 p-8\">\n              <form className=\"space-y-6\" onSubmit={(e) => e.preventDefault()}>\n                <div className=\"grid grid-cols-1 gap-4\">\n                  <Input \n                    label=\"Date\" \n                    type=\"date\" \n                    className=\"bg-zinc-900 border-zinc-700 text-zinc-100\"\n                  />\n                  <Input \n                    label=\"Time\" \n                    type=\"time\" \n                    className=\"bg-zinc-900 border-zinc-700 text-zinc-100\"\n                  />\n                </div>\n                \n                <div className=\"grid grid-cols-1 gap-4\">\n                  <Input \n                    label=\"Party Size\" \n                    type=\"number\" \n                    min=\"1\" \n                    max=\"8\"\n                    placeholder=\"2\"\n                    className=\"bg-zinc-900 border-zinc-700 text-zinc-100\"\n                  />\n                  <div>\n                    <label className=\"block text-sm font-medium text-zinc-300 mb-2\">Occasion</label>\n                    <select className=\"w-full px-3 py-2 bg-zinc-900 border border-zinc-700 rounded-lg text-zinc-100 focus:ring-2 focus:ring-amber-400 focus:border-transparent\">\n                      <option value=\"\">Select an occasion</option>\n                      <option value=\"dinner\">Regular Dinner</option>\n                      <option value=\"anniversary\">Anniversary</option>\n                      <option value=\"birthday\">Birthday</option>\n                      <option value=\"business\">Business Dinner</option>\n                      <option value=\"other\">Other</option>\n                    </select>\n                  </div>\n                </div>\n\n                <Input \n                  label=\"Name\" \n                  placeholder=\"Full name\"\n                  className=\"bg-zinc-900 border-zinc-700 text-zinc-100\"\n                />\n                \n                <Input \n                  label=\"Phone\" \n                  type=\"tel\" \n                  placeholder=\"(555) 123-4567\"\n                  className=\"bg-zinc-900 border-zinc-700 text-zinc-100\"\n                />\n                \n                <Input \n                  label=\"Email\" \n                  type=\"email\" \n                  placeholder=\"your.email@example.com\"\n                  className=\"bg-zinc-900 border-zinc-700 text-zinc-100\"\n                />\n\n                <Textarea \n                  label=\"Special Requests\" \n                  placeholder=\"Dietary restrictions, allergies, seating preferences...\"\n                  className=\"bg-zinc-900 border-zinc-700 text-zinc-100\"\n                />\n\n                <Button size=\"lg\" className=\"w-full bg-amber-600 text-zinc-950 hover:bg-amber-500 font-medium\">\n                  Request Reservation\n                </Button>\n\n                <p className=\"text-xs text-zinc-500 text-center\">\n                  Reservations will be confirmed within 24 hours. For immediate assistance, call (555) 123-4567.\n                </p>\n              </form>\n            </Card>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/Location.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\n\nexport default function Location() {\n  return (\n    <Section id=\"location\" className=\"bg-zinc-950 py-24\">\n      <Container>\n        <div className=\"max-w-4xl mx-auto text-center\">\n          <Heading as=\"h2\" size=\"h1\" className=\"font-serif text-4xl md:text-5xl mb-6 text-zinc-100\">\n            Visit Us\n          </Heading>\n          \n          <div className=\"mb-12\">\n            <div className=\"text-2xl font-serif text-amber-400 mb-4\">Maison Noir</div>\n            <div className=\"text-lg text-zinc-300 space-y-2\">\n              <p>425 Park Avenue South</p>\n              <p>New York, NY 10016</p>\n              <p className=\"text-zinc-400\">Between 29th & 30th Street</p>\n            </div>\n          </div>\n\n          <div className=\"grid md:grid-cols-3 gap-8 mb-12\">\n            <div>\n              <h3 className=\"text-lg font-serif text-amber-400 mb-3\">Reservations</h3>\n              <p className=\"text-zinc-300\">(212) 555-0123</p>\n              <p className=\"text-sm text-zinc-400\">Daily 10 AM - 6 PM</p>\n            </div>\n            \n            <div>\n              <h3 className=\"text-lg font-serif text-amber-400 mb-3\">Getting Here</h3>\n              <p className=\"text-zinc-300 text-sm\">\n                Subway: 6 train to 28th Street<br/>\n                Bus: M101, M102, M103<br/>\n                Parking:
