 size, asChild = false, ...props }, ref) => {\n    const Comp = asChild ? Slot : \"button\";\n    return (\n      <Comp\n        className={cn(buttonVariants({ variant, size, className }))}\n        ref={ref}\n        {...props}\n      />\n    );\n  }\n);\nButton.displayName = \"Button\";\n\nexport { Button, buttonVariants };\nexport default Button;","src/components/ui/accordion.tsx":"import React from \"react\";\nimport * as AccordionPrimitive from \"@radix-ui/react-accordion\";\nimport { cn } from \"@/lib/utils\";\n\nconst Accordion = AccordionPrimitive.Root;\n\nconst AccordionItem = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement> & { value: string }>(\n  ({ className, ...props }, ref) => (\n    <AccordionPrimitive.Item ref={ref} className={cn(\"border-b\", className)} {...props} />\n  )\n);\nAccordionItem.displayName = \"AccordionItem\";\n\nconst AccordionTrigger = React.forwardRef<HTMLButtonElement, React.ButtonHTMLAttributes<HTMLButtonElement>>(\n  ({ className, children, ...props }, ref) => (\n    <AccordionPrimitive.Header className=\"flex\">\n      <AccordionPrimitive.Trigger\n        ref={ref}\n        className={cn(\n          \"flex flex-1 items-center justify-between py-4 font-medium transition-all [&[data-state=open]>svg]:rotate-180\",\n          className\n        )}\n        {...props}\n      >\n        {children}\n        <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className=\"shrink-0 transition-transform duration-200\"><path d=\"m6 9 6 6 6-6\" /></svg>\n      </AccordionPrimitive.Trigger>\n    </AccordionPrimitive.Header>\n  )\n);\nAccordionTrigger.displayName = \"AccordionTrigger\";\n\nconst AccordionContent = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, children, ...props }, ref) => (\n    <AccordionPrimitive.Content ref={ref} class ildren }: ContainerProps) {\n  return (\n    <div className={cn(\"mx-auto px-4 sm:px-6 lg:px-8\", maxWidths[size], className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/heading.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype HeadingProps = {\n  as?: \"h1\" | \"h2\" | \"h3\" | \"h4\";\n  size?: \"display\" | \"h1\" | \"h2\" | \"h3\";\n  eyebrow?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst sizeStyles: Record<string, string> = {\n  display: \"text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight leading-[1.1]\",\n  h1: \"text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight leading-tight\",\n  h2: \"text-3xl md:text-4xl font-semibold tracking-tight\",\n  h3: \"text-xl md:text-2xl font-semibold\",\n};\n\nexport default function Heading({\n  as: Tag = \"h2\",\n  size = \"h2\",\n  eyebrow,\n  className,\n  children,\n}: HeadingProps) {\n  return (\n    <div>\n      {eyebrow && (\n        <span className=\"block text-xs uppercase tracking-widest font-medium mb-3 opacity-60\">\n          {eyebrow}\n        </span>\n      )}\n      <Tag className={cn(sizeStyles[size], className)}>{children}</Tag>\n    </div>\n  );\n}","src/components/ui/separator.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SeparatorProps = {\n  orientation?: \"horizontal\" | \"vertical\";\n  className?: string;\n};\n\nexport default function Separator({ orientation = \"horizontal\", className }: SeparatorProps) {\n  return (\n    <div\n      role=\"separator\"\n      className={cn(\n        \"shrink-0 bg-current opacity-10\",\n        orientation === \"horizontal\" ? \"h-px w-full\" : \"h-full w-px\",\n        className\n      )}\n    />\n  );\n}","src/components/ui/aspect-ratio.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype AspectRatioProps = {\n  ratio?: number;\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Aspect ">\n            <Button className=\"bg-primary text-primary-foreground hover:bg-primary/90 font-semibold\">\n              Start Project\n            </Button>\n          </div>\n\n          {/* Mobile Navigation */}\n          <div className=\"md:hidden\">\n            <MobileNav \n              links={navLinks}\n              brandName=\"LUXE STUDIO\"\n              ctaLabel=\"Start Project\"\n              ctaHref=\"#invitation\"\n            />\n          </div>\n        </div>\n      </div>\n    </nav>\n  );\n};\n\nexport default Navbar;","src/components/Hero.tsx":"import React from 'react';\nimport Section from '@/components/ui/section';\nimport Container from '@/components/ui/container';\nimport Heading from '@/components/ui/heading';\nimport { Button } from '@/components/ui/button';\nimport Badge from '@/components/ui/badge';\nimport projectImages from '@/assets/generated-images';\n\nconst Hero = () => {\n  return (\n    <Section className=\"min-h-[85vh] flex items-center bg-zinc-950 text-white py-28\">\n      <Container>\n        <div className=\"grid lg:grid-cols-12 gap-12 items-center\">\n          {/* Content Column */}\n          <div className=\"lg:col-span-7 max-w-2xl\">\n            <p className=\"text-xs uppercase tracking-[0.24em] text-primary font-medium mb-4\">\n              PREMIUM DESIGN STUDIO\n            </p>\n            <Heading as=\"h1\" size=\"display\" className=\"font-heading text-white font-bold leading-none tracking-wide\">\n              Crafting Bold Experiences That Drive Results\n            </Heading>\n            <p className=\"mt-6 text-lg font-body leading-relaxed text-zinc-300 max-w-xl\">\n              We transform ambitious brands through strategic design and commercial excellence. Every project delivers measurable impact and lasting competitive advantage.\n            </p>\n            \n            {/* CTA Buttons */}\n            <div className=\"mt-8 flex flex-wrap gap-4\">\n              <Button size=\"lg\" className=\"bg-primary text-primary-foreground hover:bg-primary/90 font-semibold px-8\">\n                View Our Work\n              </Button>\n              <Button size=\"lg\" variant=\"outline\" className=\"border-zinc-600 text-zinc-300 hover:bg-zinc-800 font-semibold px-8\">\n                Get Quote\n              </Button>\n            </div>\n\n            {/* Support Rail */}\n            <div className=\"mt-12 grid grid-cols-3 gap-8\">\n              <div>\n                <p className=\"text-2xl font-heading font-bold text-primary\">150+</p>\n                <p className=\"text-xs uppercase tracking-wide text-zinc-400 mt-1\">Projects Delivered</p>\n              </div>\n              <div>\n                <p className=\"text-2xl font-heading font-bold text-primary\">98%</p>\n                <p className=\"text-xs uppercase tracking-wide text-zinc-400 mt-1\">Client Retention</p>\n              </div>\n              <div>\n                <Badge className=\"bg-primary/10 text-primary border-primary/20 font-medium\">\n                  Award Winning\n                </Badge>\n              </div>\n            </div>\n          </div>\n\n          {/* Media Column */}\n          <div className=\"lg:col-span-5\">\n            <div className=\"relative\">\n              <img \n                src={projectImages.hero} \n                alt=\"Bold commercial design showcase\"\n                className=\"rounded-2xl object-cover w-full aspect-[4/3] shadow-2xl\"\n              />\n              <div className=\"absolute -bottom-6 -right-6 bg-primary text-primary-foreground rounded-xl px-4 py-2\">\n                <p className=\"text-sm font-heading font-bold\">Since 2019</p>\n              </div>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Hero;","src/components/Story.tsx":"import React from 'react';\nimport Section from '@/components/ui/section';\nimport Container from '@/components/ui/container';\nimport Heading from '@/components/ui/heading';\nimport projectImages from '@/assets/generated-images';\n\nconst Story = () => {\n  return (\n    <Section className=\"bg-card py-20\">\n      <Container>\n        <div className=\"grid lg:grid-cols-2 gap-16 items-start\">\n          {/* Narrative Text */}\n          <div>\n            <Heading size=\"h2\" eyebrow=\"OUR APPROACH\" className=\"font-heading text-foreground\">\n              Built for Impact, Designed for Success\n            </Heading>\n            <div className=\"mt-8 space-y-6 font-body text-muted-foreground leading-relaxed max-w-xl\">\n              <p>\n                We don't just create beautiful designs—we engineer commercial advantage. Every decision is backed by strategic thinking, market research, and measurable outcomes.\n              </p>\n              <p>\n                Our process combines creative excellence with business intelligence. We understand that great design must drive growth, convert audiences, and deliver tangible value to your bottom line.\n              </p>\n              <p>\n                From Fortune 500 companies to disruptive startups, we've helped brands achieve breakthrough results through bold, purposeful design that commands attention and compels action.\n              </p>\n            </div>\n\n            {/* Metrics Rail */}\n            <div className=\"mt-10 pt-8 border-t border-border\">\n              <div className=\"grid grid-cols-1 sm:grid-cols-2 gap-8\">\n                <div>\n                  <p className=\"text-3xl font-heading font-bold text-primary\">285%</p>\n                  <p className=\"text-sm text-muted-foreground mt-1\">Average Conversion Lift</p>\n                </div>\n                <div>\n                  <p className=\"text-3xl font-heading font-bold text-primary\">$12M+</p>\n                  <p className=\"text-sm text-muted-foreground mt-1\">Client Revenue Generated</p>\n                </div>\n              </div>\n left-4\">\n                  <Badge className=\"bg-primary/90 text-primary-foreground border-0 font-medium\">Featured Project</Badge>\n                </div>\n              </div>\n              <div className=\"mt-6\">\n                <h3 className=\"text-2xl font-heading font-bold mb-2\">TechForward Rebrand</h3>\n                <p className=\"text-muted-foreground font-body mb-4\">Complete identity overhaul driving 340% lead increase</p>\n                <div className=\"grid grid-cols-1 sm:grid-cols-2 gap-4\">\n                  <div>\n                    <p className=\"text-xl font-heading font-bold text-primary\">340%</p>\n                    <p className=\"text-xs text-muted-foreground\">Lead Increase</p>\n                  </div>\n                  <div>\n                    <p className=\"text-xl font-heading font-bold text-primary\">$2.1M</p>\n                    <p className=\"text-xs text-muted-foreground\">Revenue Impact</p>\n                  </div>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          {/* Stacked Cards */}\n          <div className=\"space-y-6\">\n            <div className=\"relative overflow-hidden rounded-xl border border-border bg-card p-4\">\n              <img \n                src={projectImages.gallery2} \n                alt=\"Secondary showcase maintaining commercial visual grammar\"\n                className=\"w-full h-48 object-cover rounded-lg\"\n              />\n              <div className=\"mt-4\">\n                <h3 className=\"text-lg font-heading font-bold mb-2\">RetailMax Platform</h3>\n                <p className=\"text-sm text-muted-foreground mb-3\">E-commerce transformation with 180% conversion boost</p>\n                <div className=\"flex items-center justify-between text-xs\">\n                  <div>\n                    <p className=\"font-heading font-bold text-primary\">180% CVR</p>\n                    <p className=\"text-muted-foreground\">Conversion</p>\n                  </div>\n                  <div>\n                    <p className=\"font-heading font-bold text-primary\">12 Weeks</p>\n                    <p className=\"text-muted-foreground\">Timeline</p>\n                  </div>\n                </div>\n              </div>\n            </div>\n\n            <div className=\"relative overflow-hidden rounded-xl border border-border bg-card p-4\">\n              <img \n                src={projectImages.gallery3} \n                alt=\"Tertiary gallery proof with varied composition\"\n                className=\"w-full h-48 object-cover rounded-lg\"\n              />\n              <div className=\"mt-4\">\n                <h3 className=\"text-lg font-heading font-bold mb-2\">FinanceFirst App</h3>\n                <p className=\"text-sm text-muted-foreground mb-3\">Mobile-first design increasing user engagement 250%</p>\n                <div className=\"flex items-center justify-between text-xs\">\n                  <div>\n                    <p className=\"font-heading font-bold text-primary\">250%</p>\n                    <p className=\"text-muted-foreground\">Engagement</p>\n                  </div>\n                  <div>\n                    <p className=\"font-heading font-bold text-primary\">16 Weeks</p>\n                    <p className=\"text-muted-foreground\">Development</p>\n                  </div>\n                </div>\n              </div>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Showcase;","src/components/Proof.tsx":"import React from 'react';\nimport Section from '@/components/ui/section';\nimport Container from '@/components/ui/container';\nimport Testimonial from '@/components/ui/testimonial';\nimport projectImages from \"@/assets/generated-images\";\n\nconst Proof = () => {\n  return (\n    <Section className=\"bg-muted py-20\">\n      <Container>\n        {/* Single Long-Form Quote Layout - Different from S font-bold text-sm\">TECHFORWARD</div>\n              <div className=\"font-heading font-bold text-sm\">RETAILMAX</div>\n              <div className=\"font-heading font-bold text-sm\">FINANCEFIRST</div>\n              <div className=\"font-heading font-bold text-sm\">GROWTHCO</div>\n              <div className=\"font-heading font-bold text-sm\">INNOVATE LABS</div>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Proof;","src/components/Invitation.tsx":"import React from 'react';\nimport Section from '@/components/ui/section';\nimport Container from '@/components/ui/container';\nimport Heading from '@/components/ui/heading';\nimport { Button } from '@/components/ui/button';\nimport Input from '@/components/ui/input';\nimport Textarea from '@/components/ui/textarea';\nimport Card from '@/components/ui/card';\nimport { projectImages } from \"@/assets/generated-images\";\n\nconst Invitation = () => {\n  const handleSubmit = (e: React.FormEvent) => {\n    e.preventDefault();\n    // Form handling would go here\n  };\n\n  return (\n    <Section className=\"bg-zinc-950 text-white py-24\">\n      <Container>\n        {/* Split Layout - Different from Other Sections */}\n        <div className=\"grid lg:grid-cols-2 gap-16 items-start\">\n          {/* Value Proposition */}\n          <div>\n            <Heading size=\"h2\" className=\"font-heading text-white\">\n              Ready to Drive Real Results?\n            </Heading>\n            <p className=\"mt-6 text-lg font-body text-zinc-300 leading-relaxed max-w-lg\">\n              Let's discuss how strategic design can transform your business. Every project begins with understanding your goals and measuring success.\n            </p>\n            \n            <div className=\"mt-10 space-y-6\">\n              <div className=\"flex items-center space-x-4\">\n                <div className=\"w-2 h-2 bg-primary rounded-full\"></div>\n                <p className=\"text-zinc-300 font-body\">Free strategic consultation</p>\n              </div>\n              <div className=\"flex items-center space-x-4\">\n                <div className=\"w-2 h-2 bg-primary rounded-full\"></div>\n                <p className=\"text-zinc-300 font-body\">Custom project proposal</p>\n              </div>\n              <div className=\"flex items-center space-x-4\">\n                <div className=\"w-2 h-2 bg-primary rounded-full\"></div>\n                <p className=\"text-zinc-300 font-body\">ROI-focused approach</p>\n              </div>\n            </div>\n\n            {/* Contact Information */}\n            <div className=\"mt-12 pt-8 border-t border-zinc-800\">\n              <div className=\"space-y-4\">\n                <div>\n                  <p className=\"text-sm text-zinc-400 font-body\">Email us directly:</p>\n                  <p className=\"text-white font-medium\">hello@luxestudio.com</p>\n                </div>\n                <div>\n                  <p className=\"text-sm text-zinc-400 font-body\">Call us now:</p>\n                  <p className=\"text-white font-medium\">+1 (555) 123-4567</p>\n                </div>\n                <div>\n                  <p className=\"text-sm text-zinc-400 font-body\">Average Response Time:</p>\n                  <p className=\"text-white font-medium\">4 hours</p>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          {/* Contact Form */}\n          <Card className=\"bg-card border border-zinc-800 p-8\">\n            <form onSubmit={handleSubmit} className=\"space-y-6\">\n              <div className=\"grid sm:grid-cols-2 gap-4\">\n                <Input \n                  label=\"First Name\" \n                  placeholder=\"John\" \n                  className=\"bg-background border-border\"\n                />\n                <Input \n                  label=\"Last Name\" \n                  placeholder=\"Smith\" \n
