t DialogClose = DialogPrimitive.Close;\nconst DialogPortal = DialogPrimitive.Portal;\n\nconst DialogOverlay = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Overlay\n      ref={ref}\n      className={cn(\n        \"fixed inset-0 z-50 bg-black/60 backdrop-blur-sm data-[state=open]:animate-in data-[state=closed]:animate-out data-[state=closed]:fade-out-0 data-[state=open]:fade-in-0\",\n        className\n      )}\n      {...props}\n    />\n  )\n);\nDialogOverlay.displayName = \"DialogOverlay\";\n\nconst DialogContent = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, children, ...props }, ref) => (\n    <DialogPortal>\n      <DialogOverlay />\n      <DialogPrimitive.Content\n        ref={ref}\n        className={cn(\n          \"fixed left-[50%] top-[50%] z-50 w-full max-w-lg translate-x-[-50%] translate-y-[-50%] rounded-xl border bg-white p-6 shadow-xl duration-200 data-[state=open]:animate-in data-[state=closed]:animate-out data-[state=closed]:fade-out-0 data-[state=open]:fade-in-0 data-[state=closed]:zoom-out-95 data-[state=open]:zoom-in-95\",\n          className\n        )}\n        {...props}\n      >\n        {children}\n      </DialogPrimitive.Content>\n    </DialogPortal>\n  )\n);\nDialogContent.displayName = \"DialogContent\";\n\nconst DialogTitle = React.forwardRef<HTMLHeadingElement, React.HTMLAttributes<HTMLHeadingElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Title ref={ref} className={cn(\"text-lg font-semibold\", className)} {...props} />\n  )\n);\nDialogTitle.displayName = \"DialogTitle\";\n\nconst DialogDescription = React.forwardRef<HTMLParagraphElement, React.HTMLAttributes<HTMLParagraphElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Description ref={ref} className={cn(\"text-sm text-zinc-500\", className)} {...props} />\n  )\n);\nDialogDescription.displayName = \"DialogDescription\";\n\nexport { Dialog, DialogTrigger, DialogContent, DialogClose, DialogOverlay, DialogTitle, DialogDescription };","src/components/ui/sheet.tsx":"import React from \"react\";\nimport * as DialogPrimitive from \"@radix-ui/react-dialog\";\nimport { cn } from \"@/lib/utils\";\n\nconst Sheet = DialogPrimitive.Root;\nconst SheetTrigger = DialogPrimitive.Trigger;\nconst SheetClose = DialogPrimitive.Close;\n\nconst SheetOverlay = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Overlay\n      ref={ref}\n      className={cn(\"fixed inset-0 z-50 bg-black/60 backdrop-blur-sm\", className)}\n      {...props}\n    />\n  )\n);\nSheetOverlay.displayName = \"SheetOverlay\";\n\ntype SheetContentProps = React.HTMLAttributes<HTMLDivElement> & {\n  side?: \"left\" | \"right\" | \"top\" | \"bottom\";\n};\n\nconst sideStyles: Record<string, string> = {\n  right: \"inset-y-0 right-0 h-full w-3/4 max-w-sm border-l translate-x-0\",\n  left: \"inset-y-0 left-0 h-full w-3/4 max-w-sm border-r translate-x-0\",\n  top: \"inset-x-0 top-0 border-b\",\n  bottom: \"inset-x-0 bottom-0 border-t\",\n};\n\nconst SheetContent = React.forwardRef<HTMLDivElement, SheetContentProps>(\n  ({ side = \"right\", className, children, ...props }, ref) => (\n    <DialogPrimitive.Portal>\n      <SheetOverlay />\n      <DialogPrimitive.Content\n        ref={ref}\n        className={cn(\n          \"fixed z-50 bg-white p-6 shadow-xl transition-transform duration-300\",\n          sideStyles[side],\n          className\n        )}\n        {...props}\n      >\n        {children}\n      </DialogPrimitive.Content>\n    </DialogPrimitive.Portal>\n  )\n);\nSheetContent.displayName = \"SheetContent\";\n\nexport { Sheet, SheetTrigger, SheetContent, SheetClose };","src/components/ui/input.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype InputProps = React.InputHTMLAttributes<HTMLInputElement> & {\n  label?: string;\n  error?: string;\n};\n\nexport default function Input({ label, error, className, id, ...props }: InputProps) {\n  const inputId = id || (label ? label.toLowerCase().replace(/\\s+/g, \"-\") : undefined);\n  return (\n    <div>\n      {label && (\n        <label htmlFor={inputId} className=\"block text-sm font-medium mb-1.5\">\n          {label}\n        </label>\n      )}\n      <input\n        id={inputId}\n        className={cn(\n          \"w-full rounded-lg border px-4 py-2.5 text-base outline-none transition-colors\",\n          error ? \"border-red-500 focus:ring-1 focus:ring-red-500\" : \"focus:ring-1\",\n          className\n        )}\n        {...props}\n      />\n      {error && <p className=\"mt-1 text-sm text-red-500\">{error}</p>}\n    </div>\n  );\n}","src/components/ui/textarea.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype TextareaProps = React.TextareaHTMLAttributes<HTMLTextAreaElement> & {\n  label?: string;\n};\n\nexport default function Textarea({ label, className, id, ...props }: TextareaProps) {\n  const inputId = id || (label ? label.toLowerCase().replace(/\\s+/g, \"-\") : undefined);\n  return (\n    <div>\n      {label && (\n        <label htmlFor={inputId} className=\"block text-sm font-medium mb-1.5\">\n          {label}\n        </label>\n      )}\n      <textarea\n        id={inputId}\n        rows={4}\n        className={cn(\n          \"w-full rounded-lg border px-4 py-2.5 text-base outline-none transition-colors resize-none\",\n          className\n        )}\n        {...props}\n      />\n    </div>\n  );\n}","src/components/ui/badge.tsx":"import React from \"react\";\nimport { cva, type VariantProps } from \"class-variance-authority\";\nimport { cn } from \"@/lib/utils\";\n\nconst badgeVariants = cva(\n  \"inline-flex items-center rounded-full font-medium\",\n  {\n    variants: {\n      size: {\n        sm: \"px-2 py-0.5 text-[10px]\",\n        md: \"px-2.5 py-0.5 text-xs\",\n        lg: \"px-3 py-1 text-sm\",\n      },\n    },\n    defaultVariants: {\n      size: \"md\",\n    },\n  }\n);\n\ntype BadgeProps = React.HTMLAttributes<HTMLSpanElement> &\n  VariantProps<typeof badgeVariants>;\n\nexport default function Badge({ className, size, ...props }: BadgeProps) {\n  return (\n    <span className={cn(badgeVariants({ size }), className)} {...props} />\n  );\n}\n\nexport { badgeVariants };","src/components/ui/card.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype CardProps = {\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Card({ className, children }: CardProps) {\n  return (\n    <div className={cn(\"rounded-xl p-6\", className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/section.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SectionProps = {\n  id?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Section({ id, className, children }: SectionProps) {\n  return (\n    <section id={id} className={cn(\"py-16 md:py-24\", className)}>\n      {children}\n    </section>\n  );\n}","src/components/ui/container.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype ContainerProps = {\n  size?: \"sm\" | \"md\" | \"lg\" | \"xl\" | \"full\";\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst maxWidths: Record<string, string> = {\n  sm: \"max-w-3xl\",\n  md: \"max-w-5xl\",\n  lg: \"max-w-6xl\",\n  xl: \"max-w-7xl\",\n  full: \"max-w-full\",\n};\n\nexport default function Container({ size = \"xl\", className, children }: ContainerProps) {\n  return (\n    <div className={cn(\"mx-auto px-4 sm:px-6 lg:px-8\", maxWidths[size], className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/heading.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype HeadingProps = {\n  as?: \"h1\" | \"h2\" | \"h3\" | \"h4\";\n  size?: \"display\" | \"h1\" | \"h2\" | \"h3\";\n  eyebrow?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst sizeStyles: Record<string, string> = {\n  display: \"text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight leading-[1.1]\",\n  h1: \"text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight leading-tight\",\n  h2: \"text-3xl md:text-4xl font-semibold tracking-tight\",\n  h3: \"text-xl md:text-2xl font-semibold\",\n};\n\nexport default function Heading({\n  as: Tag = \"h2\",\n  size = \"h2\",\n  eyebrow,\n  className,\n  children,\n}: HeadingProps) {\n  return (\n    <div>\n      {eyebrow && (\n        <span className=\"block text-xs uppercase tracking-widest font-medium mb-3 opacity-60\">\n          {eyebrow}\n        </span>\n      )}\n      <Tag className={cn(sizeStyles[size], className)}>{children}</Tag>\n    </div>\n  );\n}","src/components/ui/separator.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SeparatorProps = {\n  orientation?: \"horizontal\" | \"vertical\";\n  className?: string;\n};\n\nexport default function Separator({ orientation = \"horizontal\", className }: SeparatorProps) {\n  return (\n    <div\n      role=\"separator\"\n      className={cn(\n        \"shrink-0 bg-current opacity-10\",\n        orientation === \"horizontal\" ? \"h-px w-full\" : \"h-full w-px\",\n        className\n      )}\n    />\n  );\n}","src/components/ui/aspect-ratio.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype AspectRatioProps = {\n  ratio?: number;\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function AspectRatio({ ratio = 16 / 9, className, children }: AspectRatioProps) {\n  return (\n    <div className={cn(\"relative w-full overflow-hidden\", className)} style={{ paddingBottom: (1 / ratio) * 100 + \"%\" }}>\n      <div className=\"absolute inset-0\">{children}</div>\n    </div>\n  );\n}","src/components/ui/testimonial.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype TestimonialProps = {\n  quote: string;\n  author: string;\n  role?: string;\n  avatar?: string;\n  className?: string;\n};\n\nexport default function Testimonial({ quote, author, role, avatar, className }: TestimonialProps) {\n  return (\n    <figure className={cn(\"space-y-4\", className)}>\n      <blockquote className=\"text-lg md:text-xl leading-relaxed italic\">\n        &ldquo;{quote}&rdquo;\n      </blockquote>\n      <figcaption className=\"flex items-center gap-3\">\n        {avatar && (\n          <img src={avatar} alt={author} className=\"w-10 h-10 rounded-full object-cover\" />\n        )}\n        <div>\n          <p className=\"font-medium text-sm\">{author}</p>\n          {role && <p className=\"text-xs opacity-60\">{role}</p>}\n        </div>\n      </figcaption>\n    </figure>\n  );\n}","src/components/ui/stats-band.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport { cn } from \"@/lib/utils\";\n\ntype Stat = {\n  value: string;\n  label: string;\n};\n\ntype StatsBandProps = {\n  stats: Stat[];\n  className?: string;\n};\n\nexport default function StatsBand({ stats, className }: StatsBandProps) {\n  return (\n    <Section className={cn(\"py-12\", className)}>\n      <Container>\n        <div className=\"grid grid-cols-2 md:grid-cols-4 gap-8 text-center\">\n          {stats.map((s) => (\n            <div key={s.label}>\n              <p className=\"text-3xl md:text-5xl font-bold\">{s.value}</p>\n              <p className=\"text-sm mt-1 opacity-60\">{s.label}</p>\n            </div>\n          ))}\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/ui/gallery.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype GalleryImage = {\n  src: string;\n  alt: string;\n  span?: \"normal\" | \"wide\" | \"tall\";\n};\n\ntype GalleryProps = {\n  images: GalleryImage[];\n  className?: string;\n};\n\nconst spanClasses: Record<string, string> = {\n  normal: \"\",\n  wide: \"md:col-span-2\",\n  tall: \"md:row-span-2\",\n};\n\nexport default function Gallery({ images, className }: GalleryProps) {\n  return (\n    <div className={cn(\"grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-4\", className)}>\n      {images.map((img, i) => (\n        <div key={i} className={cn(\"overflow-hidden rounded-lg\", spanClasses[img.span || \"normal\"])}>\n          <img\n            src={img.src}\n            alt={img.alt}\n            className=\"w-full h-full object-cover transition-transform duration-500 hover:scale-105\"\n          />\n        </div>\n      ))}\n    </div>\n  );\n}","src/components/ui/mobile-nav.tsx":"import React from \"react\";\nimport { Sheet, SheetTrigger, SheetContent, SheetClose } from \"@/components/ui/sheet\";\nimport Button from \"@/components/ui/button\";\nimport { cn } from \"@/lib/utils\";\n\ntype MobileNavProps = {\n  links: { label: string; href: string }[];\n  brandName: string;\n  ctaLabel?: string;\n  ctaHref?: string;\n  className?: string;\n};\n\nexport default function MobileNav({ links, brandName, ctaLabel, ctaHref, className }: MobileNavProps) {\n  return (\n    <Sheet>\n      <SheetTrigger asChild>\n        <button className={cn(\"md:hidden p-2\", className)} aria-label=\"Open menu\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\">\n            <line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\" /><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\" /><line x1=\"3\" y1=\"18\" x2=\"21\" y2=\"18\" />\n          </svg>\n        </button>\n      </SheetTrigger>\n      <SheetContent side=\"right\" className=\"flex flex-col pt-16\">\n        <p className=\"text-lg font-semibold mb-8\">{brandName}</p>\n        <nav className=\"flex flex-col gap-4\">\n          {links.map((link) => (\n            <SheetClose key={link.href} asChild>\n              <a href={link.href} className=\"text-lg py-2 border-b border-zinc-100 hover:text-zinc-600 transition-colors\">\n                {link.label}\n              </a>\n            </SheetClose>\n          ))}\n        </nav>\n        {ctaLabel && ctaHref && (\n          <div className=\"mt-auto pt-8\">\n            <SheetClose asChild>\n              <Button asChild size=\"lg\" className=\"w-full\">\n                <a href={ctaHref}>{ctaLabel}</a>\n              </Button>\n            </SheetClose>\n          </div>\n        )}\n      </SheetContent>\n    </Sheet>\n  );\n}","src/App.tsx":"import React from 'react';\nimport Hero from './components/Hero';\nimport SelectedWork from './components/SelectedWork';\nimport Capabilities from './components/Capabilities';\nimport StudioPerspective from './components/StudioPerspective';\nimport ClientLogos from './components/ClientLogos';\nimport Contact from './components/Contact';\nimport Footer from './components/Footer';\n\nexport default function App() {\n  return (\n    <div className=\"min-h-screen bg-zinc-950\">\n      <Hero />\n      <SelectedWork />\n      <Capabilities />\n      <StudioPerspective />\n      <ClientLogos />\n      <Contact />\n      <Footer />\n    </div>\n  );\n}","src/components/Hero.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport Heading from \"@/components/ui/heading\";\nimport Button from \"@/components/ui/button\";\n\nexport default function Hero() {\n  return (\n    <Section className=\"min-h-screen flex items-center bg-zinc-950 text-white relative overflow-hidden\">\n      <div className=\"absolute top-6 left-0 right-0 z-10\">\n        <Container>\n          <div className=\"flex items-center justify-between\">\n            <a href=\"#\" className=\"text-xl font-serif text-white\">\n              Kinetic Studio\n            </a>\n            <nav className=\"hidden md:flex items-center gap-8 text-sm\">\n              <a href=\"#work\" className=\"text-zinc-400 hover:text-lime-400 transition-colors\">Work</a>\n              <a href=\"#studio\" className=\"text-zinc-400 hover:text-lime-400 transition-colors\">Studio</a>\n              <a href=\"#contact\" className=\"text-zinc-400 hover:text-lime-400 transition-colors\">Contact</a>\n            </nav>\n            <Button size=\"sm\" className=\"bg-lime-400 text-zinc-950 hover:bg-lime-300 font-medium md:block hidden\">\n              Start a Project\n            </Button>\n          </div>\n        </Container>\n      </div>\n      \n      <Container>\n        <div className=\"max-w-5xl pt-20\">\n          <p className=\"text-xs uppercase tracking-[0.3em] text-zinc-500 font-medium mb-8\">\n            Brand &middot; Digital &middot; Campaign &middot; Est. 2019 &middot; NYC + London\n          </p>\n          <Heading as=\"h1\" size=\"display\" className=\"text-white font-serif leading-[0.95] mb-8\">\n            We design brands that demand attention and reward it.\n          </Heading>\n          <p className=\"text-xl text-zinc-400 max-w-3xl leading-relaxed mb-12\">\n            A creative studio for companies that refuse to blend in. We build visual identities \n            that cut through the noise and create lasting connections.\n          </p>\n          <div className=\"flex items-center gap-6\">\n            <Button size=\"lg\" className=\"bg-lime-400 text-zinc-950 hover:bg-lime-300 font-semibold\">\n              View Our Work\n            </Button>\n            <a href=\"#contact\" className=\"text-zinc-400 hover:text-white transition-colors underline underline-offset-4\">\n              Let's talk\n            </a>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/SelectedWork.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport Heading from \"@/components/ui/heading\";\n\nconst projects = [\n  { \n    title: \"Meridian Capital\", \n    client: \"Meridian Group\", \n    year: \"2024\", \n    discipline: \"Brand Identity\", \n    img: \"https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=1200&h=800&fit=crop&q=80\",\n    description: \"Complete visual transformation for a fintech disruptor\"\n  },\n  { \n    title: \"Volta Architecture\", \n    client: \"Volta Studio\", \n    year: \"2024\", \n    discipline: \"Digital Experience\", \n    img: \"https://images.unsplash.com/photo-1586281380349-632531db7ed4?w=800&h=1000&fit=crop&q=80\",\n    description: \"Editorial portfolio celebrating architectural vision\"\n  },\n  { \n    title: \"Aura Beauty\", \n    client: \"Aura Collective\", \n    year: \"2023\", \n    discipline: \"Brand & Packaging\", \n    img: \"https://images.unsplash.com/photo-1607827448387-a67db1383b59?w=800&h=1000&fit=crop&q=80\",\n    description: \"Luxury skincare brand with sustainable ethos\"\n  },\n];\n\nexport default function SelectedWork() {\n  return (\n    <Section id=\"work\" className=\"bg-zinc-950 text-white py-32\">\n      <Container>\n        <Heading as=\"h2\" size=\"h2\" eyebrow=\"Selected Work\" className=\"text-white font-serif mb-20 text-center\">\n          Recent Projects\n        </Heading>\n        \n        <div className=\"space-y-24\">\n          {/* Featured Project */}\n          <div className=\"group cursor-pointer\">\n            <div className=\"overflow-hidden rounded-3xl\">\n              <img \n                src={projects[0].img} \n                alt={projects[0].title} \n                className=\"w-full aspect-[16/9] object-cover group-hover:scale-105 transition-transform duration-700\" \n              />\n            </div>\n            <div className=\"mt-8 flex flex-col md:flex-row md:items-baseline justify-between gap-4\">\n              <div className=\"max-w-xl\">\n                <h3 className=\"text-3xl font-serif text-white mb-2\">{projects[0].title}</h3>\n                <p className=\"text-zinc-400 mb-3\">{projects[0].description}</p>\n                <p className=\"text-sm text-zinc-500\">{projects[0].client} &middot; {projects[0].discipline}</p>\n              </div>\n              <div className=\"text-right\">\n                <p className=\"text-sm text-zinc-600\">{projects[0].year}</p>\n                <p className=\"text-lime-400 text-sm mt-1\">Case Study →</p>\n              </div>\n            </div>\n          </div>\n          \n          {/* Secondary Projects */}\n          <div className=\"grid md:grid-cols-2 gap-16\">\n            {projects.slice(1).map((project, index) => (\n              <div key={project.title} className=\"group cursor-pointer\">\n                <div className=\"overflow-hidden rounded-2xl\">\n                  <img \n                    src={project.img} \n                    alt={project.title} \n                    className=\"w-full aspect-[4/5] object-cover group-hover:scale-105 transition-transform duration-700\" \n                  />\n                </div>\n                <div className=\"mt-6\">\n                  <h4 className=\"text-xl font-serif text-white mb-2\">{project.title}</h4>\n                  <p className=\"text-zinc-400 text-sm mb-2\">{project.description}</p>\n                  <p className=\"text-sm text-zinc-500\">{project.client} &middot; {project.discipline}</p>\n                </div>\n              </div>\n            ))}\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/Capabilities.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport Heading from \"@/components/ui/heading\";\nimport Separator from \"@/components/ui/separator\";\n\nconst capabilities = [\n  { \n    name: \"Brand Identity\", \n    scope: \"Strategy, visual identity, brand guidelines, naming, positioning\" \n  },\n  { \n    name: \"Digital Experience\", \n    scope: \"Web design, product design, design systems, prototyping, development\" \n  },\n  { \n    name: \"Campaign & Content\", \n    scope: \"Art direction, photography, motion design, social systems, copywriting\" \n  },\n  { \n    name: \"Brand Strategy\", \n    scope: \"Market research, competitive analysis, brand audits, messaging frameworks\" \n  },\n];\n\nexport default function Capabilities() {\n  return (\n    <Section className=\"bg-zinc-900 text-white py-32\">\n      <Container size=\"lg\">\n        <div className=\"max-w-4xl\">\n          <Heading as=\"h2\" size=\"h2\" eyebrow=\"Capabilities\" className=\"text-white font-serif mb-20\">\n            What We Do\n          </Heading>\n          <div className=\"space-y-0\">\n            {capabilities.map((cap, i) => (\n              <div key={cap.name}>\n                <div className=\"flex flex-col lg:flex-row lg:items-baseline justify-between py-10 gap-6 group hover:bg-zinc-800/20 -mx-8 px-8 rounded-xl transition-all duration-300\">\n                  <h3 className=\"text-2xl md:text-3xl font-serif text-white group-hover:text-lime-400 transition-colors\">\n                    {cap.name}\n                  </h3>\n                  <p className=\"text-zinc-400 lg:text-right max-w-md text-sm leading-relaxed\">\n                    {cap.scope}\n                  </p>\n                </div>\n                {i < capabilities.length - 1 && (\n                  <Separator className=\"opacity-10\" />\n                )}\n              </div>\n            ))}\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/StudioPerspective.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport Heading from \"@/components/ui/heading\";\n\nexport default function StudioPerspective() {\n  return (\n    <Section id=\"studio\" className=\"bg-zinc-950 text-white py-32\">\n      <Container>\n        <div className=\"grid lg:grid-cols-12 gap-16 items-start\">\n          <div className=\"lg:col-span-8\">\n            <Heading as=\"h2\" size=\"h2\" eyebrow=\"Studio\" className=\"text-white font-serif mb-12\">\n              Our Perspective\n            </Heading>\n            <div className=\"max-w-3xl space-y-8\">\n              <p className=\"text-lg text-zinc-300 leading-relaxed\">\n                We start every engagement by understanding what you cannot say yet. \n                The gap between where a brand is and where it needs to be is not a \n                brief — it is creative territory waiting to be explored.\n              </p>\n              <blockquote className=\"border-l-2 border-lime-400 pl-8 text-2xl font-serif italic text-zinc-200 max-w-2xl\">\n                \"Strategy without craft is a slide deck. Craft without strategy is decoration.\"\n              </blockquote>\n              <p className=\"text-lg text-zinc-300 leading-relaxed\">\n                Our team of 14 works across brand identity, digital product, and campaign \n                — always with the constraint that nothing leaves the studio unless it would \n                survive on a billboard, in a browser tab, and on a business card.\n              </p>\n              <p className=\"text-base text-zinc-400 leading-relaxed\">\n                Founded in 2019, we've had the privilege of working with everyone from \n                pre-launch startups to Fortune 500 companies. What they all share is a \n                refusal to accept ordinary as an option.\n              </p>\n            </div>\n          </div>\n          \n          <div className=\"lg:col-span-4\">\n            <div className=\"sticky top-24\">\n              <img \n                src=\"https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&h=800&fit=crop&q=80\" \n                alt=\"Creative Director in studio workspace\" \n                classNam
