 size, asChild = false, ...props }, ref) => {\n    const Comp = asChild ? Slot : \"button\";\n    return (\n      <Comp\n        className={cn(buttonVariants({ variant, size, className }))}\n        ref={ref}\n        {...props}\n      />\n    );\n  }\n);\nButton.displayName = \"Button\";\n\nexport { Button, buttonVariants };\nexport default Button;","src/components/ui/accordion.tsx":"import React from \"react\";\nimport * as AccordionPrimitive from \"@radix-ui/react-accordion\";\nimport { cn } from \"@/lib/utils\";\n\nconst Accordion = AccordionPrimitive.Root;\n\nconst AccordionItem = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement> & { value: string }>(\n  ({ className, ...props }, ref) => (\n    <AccordionPrimitive.Item ref={ref} className={cn(\"border-b\", className)} {...props} />\n  )\n);\nAccordionItem.displayName = \"AccordionItem\";\n\nconst AccordionTrigger = React.forwardRef<HTMLButtonElement, React.ButtonHTMLAttributes<HTMLButtonElement>>(\n  ({ className, children, ...props }, ref) => (\n    <AccordionPrimitive.Header className=\"flex\">\n      <AccordionPrimitive.Trigger\n        ref={ref}\n        className={cn(\n          \"flex flex-1 items-center justify-between py-4 font-medium transition-all [&[data-state=open]>svg]:rotate-180\",\n          className\n        )}\n        {...props}\n      >\n        {children}\n        <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className=\"shrink-0 transition-transform duration-200\"><path d=\"m6 9 6 6 6-6\" /></svg>\n      </AccordionPrimitive.Trigger>\n    </AccordionPrimitive.Header>\n  )\n);\nAccordionTrigger.displayName = \"AccordionTrigger\";\n\nconst AccordionContent = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, children, ...props }, ref) => (\n    <AccordionPrimitive.Content ref={ref} class ildren }: ContainerProps) {\n  return (\n    <div className={cn(\"mx-auto px-4 sm:px-6 lg:px-8\", maxWidths[size], className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/heading.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype HeadingProps = {\n  as?: \"h1\" | \"h2\" | \"h3\" | \"h4\";\n  size?: \"display\" | \"h1\" | \"h2\" | \"h3\";\n  eyebrow?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst sizeStyles: Record<string, string> = {\n  display: \"text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight leading-[1.1]\",\n  h1: \"text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight leading-tight\",\n  h2: \"text-3xl md:text-4xl font-semibold tracking-tight\",\n  h3: \"text-xl md:text-2xl font-semibold\",\n};\n\nexport default function Heading({\n  as: Tag = \"h2\",\n  size = \"h2\",\n  eyebrow,\n  className,\n  children,\n}: HeadingProps) {\n  return (\n    <div>\n      {eyebrow && (\n        <span className=\"block text-xs uppercase tracking-widest font-medium mb-3 opacity-60\">\n          {eyebrow}\n        </span>\n      )}\n      <Tag className={cn(sizeStyles[size], className)}>{children}</Tag>\n    </div>\n  );\n}","src/components/ui/separator.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SeparatorProps = {\n  orientation?: \"horizontal\" | \"vertical\";\n  className?: string;\n};\n\nexport default function Separator({ orientation = \"horizontal\", className }: SeparatorProps) {\n  return (\n    <div\n      role=\"separator\"\n      className={cn(\n        \"shrink-0 bg-current opacity-10\",\n        orientation === \"horizontal\" ? \"h-px w-full\" : \"h-full w-px\",\n        className\n      )}\n    />\n  );\n}","src/components/ui/aspect-ratio.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype AspectRatioProps = {\n  ratio?: number;\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Aspect /components/Hero';\nimport Services from './components/Services';\nimport ProjectGallery from './components/ProjectGallery';\nimport ProcessTimeline from './components/ProcessTimeline';\nimport Credentials from './components/Credentials';\nimport Testimonial from './components/Testimonial';\nimport Footer from './components/Footer';\n\nfunction App() {\n  return (\n    <main role=\"main\" className=\"min-h-screen bg-background text-foreground\">\n      <Navbar />\n      <Hero />\n      <Services />\n      <ProjectGallery />\n      <ProcessTimeline />\n      <Credentials />\n      <Testimonial />\n<Footer />\n    </main>\n  );\n}\n\nexport default App;","src/components/Navbar.tsx":"import React from 'react';\nimport { Container } from '@/components/ui/container';\nimport { Button } from '@/components/ui/button';\nimport MobileNav from '@/components/ui/mobile-nav';\n\nconst Navbar = () => {\n  const links = [\n    { label: 'Services', href: '#services' },\n    { label: 'Projects', href: '#projects' },\n    { label: 'Process', href: '#process' },\n    { label: 'About', href: '#credentials' }\n  ];\n\n  return (\n    <nav className=\"sticky top-0 z-50 bg-zinc-950/90 backdrop-blur-md border-b border-zinc-800\">\n      <Container>\n        <div className=\"flex items-center justify-between h-16\">\n          <div className=\"font-heading font-bold text-xl text-white\">\n            PREMIER\n            <span className=\"text-orange-500 ml-1\">BUILD</span>\n          </div>\n          \n          <div className=\"hidden md:flex items-center space-x-8\">\n            {links.map((link) => (\n              <a\n                key={link.href}\n                href={link.href}\n                className=\"text-zinc-300 hover:text-orange-500 transition-colors duration-200 font-medium\"\n              >\n                {link.label}\n              </a>\n            ))}\n          </div>\n\n          <div className=\"hidden md:block\">\n            <Button className=\"bg-orange-500 hover:bg-orange-600 text-white font-semibold\">\n              Free Estimate\n            </Button>\n          </div>\n\n          <MobileNav\n            links={links}\n            brandName=\"PREMIER BUILD\"\n            ctaLabel=\"Free Estimate\"\n            ctaHref=\"#estimate\"\n            className=\"md:hidden\"\n          />\n        </div>\n      </Container>\n    </nav>\n  );\n};\n\nexport default Navbar;","src/components/Hero.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Button } from '@/components/ui/button';\nimport { Badge } from '@/components/ui/badge';\nimport { projectImages } from '@/assets/generated-images';\n\nconst Hero = () => {\n  return (\n    <Section className=\"relative min-h-[85vh] flex items-center\">\n      <div \n        className=\"absolute inset-0 bg-cover bg-center\"\n        style={{ backgroundImage: `url(${projectImages.hero})` }}\n      />\n      <div className=\"absolute inset-0 bg-gradient-to-b from-zinc-900/60 via-zinc-900/70 to-zinc-900/90\" />\n      \n      <Container className=\"relative z-10\">\n        <div className=\"max-w-2xl\">\n          <p className=\"text-xs uppercase tracking-[0.24em] text-orange-500 font-medium mb-6\">\n            Licensed • Bonded • Insured\n          </p>\n          \n          <Heading \n            as=\"h1\" \n            size=\"display\" \n            className=\"font-heading text-white font-bold tracking-wide leading-none mb-6\"\n          >\n            BUILDING EXCELLENCE\n            <br />\n            <span className=\"text-orange-500\">SINCE 1997</span>\n          </Heading>\n          \n          <p className=\"text-lg text-zinc-300 leading-relaxed max-w-xl mb-8\">\n            Premier commercial and residential construction serving the Greater Metro area. \n            From ground-breaking to final inspection, we deliver projects on time and on budget.\n          </p>\n          \n          <div className=\"flex flex-wrap gap-4 mb-12\">\n            <Button size=\"lg\" className=\"bg-orange-500 hover:bg-orange-600 text-white font-semibold px-8\">\n              Request Estimate\n            </Button>\n            <Button \n              size=\"lg\" \n              variant=\"outline\" \n              className=\"border-zinc-400 text-zinc-300 hover:bg-zinc-800 hover:border-orange-500\"\n            >\n              View Projects\n            </Button>\n          </div>\n        </div>\n      \n      <div className=\"mt-8 grid max-w-2xl grid-cols-1 gap-3 sm:grid-cols-3 sm:gap-4\">\n        <div className=\"surface-card rounded-[calc(var(--radius)+4px)] border px-4 py-3\">\n          <p className=\"text-lg font-semibold\">25+</p>\n          <p className=\"mt-1 text-xs uppercase tracking-[0.18em] text-muted-foreground\">Years delivered</p>\n        </div>\n<div className=\"surface-card rounded-[calc(var(--radius)+4px)] border px-4 py-3\">\n          <p className=\"text-lg font-semibold\">500+</p>\n          <p className=\"mt-1 text-xs uppercase tracking-[0.18em] text-muted-foreground\">Projects built</p>\n        </div>\n<div className=\"surface-card rounded-[calc(var(--radius)+4px)] border px-4 py-3\">\n          <p className=\"text-lg font-semibold\">24/7</p>\n          <p className=\"mt-1 text-xs uppercase tracking-[0.18em] text-muted-foreground\">Crew response</p>\n        </div>\n      </div>\n      <div className=\"family-divider mt-6 max-w-2xl\"></div>\n      <p className=\"mt-4 max-w-xl text-sm text-muted-foreground\">Buttons are aggressive and direct. Labels are short. Action surfaces feel sales-ready, not ornamental.</p>\n      </Container>\n      \n      {/* Credential bar overlapping hero/services boundary */}\n      <div className=\"absolute bottom-0 left-0 right-0 transform translate-y-1/2 z-20\">\n        <Container>\n          <div className=\"bg-zinc-800 border-2 border-orange-500 rounded-xl p-6\">\n            <div className=\"grid grid-cols-2 md:grid-cols-4 gap-6 text-center\">\n              <div>\n                <p className=\"text-2xl font-heading font-bold text-orange-500\">#LC-789456</p>\n                <p className=\"text-xs text-zinc-400 mt-1\">Licensed Contractor</p>\n              </div>\n              <div>\n                <p className=\"text-2xl font-heading font-bold text-white\">27+ Years</p>\n                <p className=\"text-xs text-zinc-400 mt-1\">In Business</p>\n              </div>\n              <div>\n                <p className=\"text-2xl font-heading font-bold text-white\">Fully Insured</p>\n                <p className=\"text-xs text-zinc-400 mt-1\">Liability & Workers</p>\n              </div>\n              <div>\n                <p className=\"text-2xl font-heading font-bold text-orange-500\">A+ Rating</p>\n                <p className=\"text-xs text-zinc-400 mt-1\">Better Business</p>\n              </div>\n            </div>\n          </div>\n        </Container>\n      </div>\n    </Section>\n  );\n};\n\nexport default Hero;","src/components/Services.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Card } from '@/components/ui/card';\nimport { Badge } from '@/components/ui/badge';\nimport { projectImages } from '@/assets/generated-images';\n\nconst Services = () => {\n  return (\n    <Section id=\"services\" className=\"py-20 bg-zinc-900\">\n      <Container>\n        <div className=\"pt-12 mb-16\">\n          <Heading \n            as=\"h2\" \n            size=\"h2\" \n            eyebrow=\"Our Services\"\n            className=\"font-heading text-white text-left\"\n          >\n            CONSTRUCTION SOLUTIONS\n            <br />\n            FOR EVERY PROJECT\n          </Heading>\n        </div>\n\n        {/* Asymmetric layout: one featured lane + two secondary */}\n        <div className=\"grid lg:grid-cols-5 gap-8\">\n          {/* Featured Commercial Lane */}\n          <Card className=\"lg:col-span-3 bg-zinc-800 border-orange-500/20 p-8\">\n            <div className=\"grid md:grid-cols-2 gap-6 h-full\">\n              <div>\n                <Badge className=\"bg-orange-500/10 text-orange-500 border border-orange-500/20 mb-4\">\n                  COMMERCIAL\n                </Badge>\n                <h3 className=\"text-2xl font-heading font-bold text-white mb-4\">\n                  Large-Scale Commercial Projects\n                </h3>\n                <ul className=\"space-y-2 mb-6\">\n                  <li className=\"text-zinc-300 flex items-center\">\n                    <span className=\"w-2 h-2 bg-orange-500 rounded-full mr-3\"></span>\n                    Office buildings & retail centers\n                  </li>\n                  <li className=\"text-zinc-300 flex items-center\">\n                    <span className=\"w-2 h-2 bg-orange-500 rounded-full mr-3\"></span>\n                    Warehouse & industrial facilities\n                  </li>\n                  <li className=\"text-zinc-300 flex items-center\">\n                    <span className=\"w-2 h-2 bg-orange-500 rounded-full mr-3\"></span>\n                    Multi-tenant developments\n                  </li>\n                </ul>\n                <p className=\"text-orange-500 font-semibold\">Starting at $500K</p>\n              </div>\n              <div className=\"hidden md:block\">\n                <img \n                  src={projectImages.support} \n                  alt=\"Commercial construction project\" \n                  className=\"w-full h-48 object-cover rounded-lg\"\n                />\n              </div>\n            </div>\n          </Card>\n\n          {/* Two secondary lanes stacked */}\n          <div className=\"lg:col-span-2 space-y-6\">\n            <Card className=\"bg-zinc-800 border-zinc-700 p-6\">\n              <Badge className=\"bg-zinc-700 text-zinc-300 mb-3\">\n                RESIDENTIAL\n              </Badge>\n              <h3 className=\"text-xl font-heading font-bold text-white mb-3\">\n                Custom Homes & Additions\n              </h3>\n              <ul className=\"space-y-1 mb-4 text-sm\">\n                <li className=\"text-zinc-300\">• New home construction</li>\n                <li className=\"text-zinc-300\">• Home additions & renovations</li>\n                <li className=\"text-zinc-300\">• Luxury custom builds</li>\n              </ul>\n              <p className=\"text-zinc-400 font-medium\">Starting at $150K</p>\n            </Card>\n\n            <Card className=\"bg-zinc-800 border-zinc-700 p-6\">\n              <Badge className=\"bg-zinc-700 text-zinc-300 mb-3\">\n                RENOVATION\n              </Badge>\n              <h3 className=\"text-xl font-heading font-bold text-white mb-3\">\n                Restoration & Remodeling\n              </h3>\n              <ul className=\"space-y-1 mb-4 text-sm\">\n                <li className=\"text-zinc-300\">• Historic building restoration</li>\n                <li className=\"text-zinc-300\">• Interior remodeling</li>\n                <li className=\"text-zinc-300\">• Code compliance upgrades</li>\n              </ul>\n              <p className=\"text-zinc-400 font-medium\">Starting at $50K</p>\n            </Card>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Services;","src/components/ProjectGallery.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { projectImages } from '@/assets/generated-images';\n\nconst ProjectGallery = () => {\n  const projects = [\n    {\n      image: projectImages.gallery1,\n      title: \"Metro Office Complex\",\n      location: \"Downtown District\",\n      year: \"2024\",\n      scope: \"125,000 sq ft\"\n    },\n    {\n      image: projectImages.gallery2,\n      title: \"Residential Development\",\n      location: \"Westside\",\n      year: \"2023\",\n      scope: \"$2.8M Project\"\n    },\n    {\n      image: projectImages.gallery3,\n      title: \"Industrial Warehouse\",\n      location: \"Commerce Park\",\n      year: \"2023\",\n      scope: \"85,000 sq ft\"\n    },\n    {\n      image: projectImages.detail1,\n      title: \"Historic Renovation\",\n      location: \"Arts District\",\n      year: \"2022\",\n      scope: \"$1.2M Restoration\"\n    }\n  ];\n\n  return (\n    <Section id=\"projects\" className=\"py-16 bg-background\">\n      <Container>\n        <div className=\"mb-12\">\n          <Heading \n            as=\"h2\" \n            size=\"h2\" \n            eyebrow=\"Recent Projects\"\n            className=\"font-heading text-left\"\n          >\n            PROVEN TRACK RECORD\n          </Heading>\n        </div>\n\n        {/* Asymmetric grid: one large + 3 smaller thumbnails */}\n        <div className=\"grid md:grid-cols-4 lg:grid-cols-6 gap-6\">\n          {/* Large featured project */}\n          <div className=\"md:col-span-2 lg:col-span-4 md:row-span-2 group cursor-pointer\">\n            <div className=\"relative overflow-hidden rounded-xl bg-zinc-800 h-full min-h-[400px]\">\n              <img \n                src={projects[0].image} \n                alt={projects[0].title}\n                className=\"w-full h-full object-cover transition-transform duration-300 group-hover:scale-105\"\n              />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-900/80 via-transparent to-transparent\" />\n              <div className=\"absolute bottom-6 left-6 right-6 text-white transform translate-y-4 group-hover:translate-y-0 transition-transform duration-300\">\n                <h3 className=\"text-2xl font-heading font-bold mb-2\">{projects[0].title}</h3>\n                <div className=\"flex flex-wrap gap-4 text-sm text-zinc-300\">\n                  <span className=\"flex items-center\">\n                    <svg className=\"w-4 h-4 mr-1 text-orange-500\" fill=\"currentColor\" viewBox=\"0 0 20 20\">\n                      <path fillRule=\"evenodd\" d=\"M5.05 4.05a7 7 0 119.9 9.9L10 18.9l-4.95-4.95a7 7 0 010-9.9zM10 11a2 2 0 100-4 2 2 0 000 4z\" clipRule=\"evenodd\" />\n                    </svg>\n                    {projects[0].location}\n                  </span>\n                  <span>{projects[0].year}</span>\n                  <span className=\"text-orange-500 font-semibold\">{projects[0].scope}</span>\n                </div>\n              </div>\n            </div>\n          </div>\n\n          {/* Three smaller project cards */}\n          {projects.slice(1).map((project, index) => (\n            <div key={index} className=\"md:col-span-2 lg:col-span-2 group cursor-pointer\">\n              <div className=\"relative overflow-hidden rounded-xl bg-zinc-800 aspect-[4/3]\">\n                <img \n                  src={project.image} \n                  alt={project.title}\n                  className=\"w-full h-full object-cover transition-transform duration-300 group-hover:scale-105\"\n                />\n                <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-900/70 to-transparent\" />\n                <div className=\"absolute bottom-4 left-4 right-4 text-white transform translate-y-2 group-hover:translate-y-0 transition-transform duration-300\">\n                  <h4 className=\"font-heading font-semibold mb-1 text-sm\">{project.title}</h4>\n                  <div className=\"text-xs text-zinc-300 space-x-2\">\n                    <span>{project.location}</span>\n                    <span>•</span>\n                    <span>{project.year}</span>\n                  </div>\n                  <p className=\"text-xs text-orange-500 font-medium mt-1\">{project.scope}</p>\n                </div>\n              </div>\n            </div>\n          ))}\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default ProjectGallery;","src/components/ProcessTimeline.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { projectImages } from '@/assets/generated-images';\n\nconst ProcessTimeline = () => {\n  const stages = [\n    {\n      number: \"01\",\n      title: \"Initial Consultation\",\n      description: \"Site assessment and project planning\",\n      image: projectImages.support\n    },\n    {\n      number: \"02\", \n      title: \"Permits & Planning\",\n      description: \"Documentation and approvals\",\n      image: projectImages.detail1\n    },\n    {\n      number: \"03\",\n      title: \"Construction Phase\",\n      description: \"Building with precision and care\",\n      image: projectImages.gallery2\n    },\n    {\n      number: \"04\",\n      title: \"Final Inspection\",\n      description: \"Quality assurance and handover\",\n      image: projectImages.gallery3\n    }\n  ];\n\n  return (\n    <Section id=\"process\" className=\"py-20 bg-zinc-950\">\n      <Container>\n        <div className=\"mb-16\">\n          <Heading \n            as=\"h2\" \n            size=\"h2\" \n            eyebrow=\"Our Process\"\n            className=\"font-heading text-white text-center\"\n          >\n            FROM CONCEPT TO COMPLETION\n          </Heading>\n        </div>\n\n        {/* Horizontal timeline with alternating images */}\n        <div className=\"relative\">\n          {/* Timeline line */}\n          <div className=\"absolute top-1/2 left-0 right-0 h-0.5 bg-gradient-to-r from-orange-500 via-orange-500 to-zinc-700 transform -translate-y-1/2 z-0\" />\n          \n          <div className=\"grid md:grid-cols-4 gap-8 relative z-10\">\n            {stages.map((stage, index) => (\n              <div key={index} className=\"text-center\">\n                {/* Image positioned alternating above/below timeline */}\n                <div className={`mb-8 ${index % 2 === 0 ? 'order-1' : 'order-3 mt-16'}`}>\n                  <div className=\"relative mx-auto w-24 h-24 rounded-full overflow-hidden border-4 border-orange-500 bg-zinc-800\">\n                    <img \n                      src={stage.image} \n                      alt={stage.title}\n                      className=\"w-full h-full object-cover\"\n                    />\n                  </div>\n                </div>\n                \n                {/* Timeline dot */}\n                <div className=\"relative mx-auto w-6 h-6 bg-orange-500 rounded-full border-4 border-zinc-950 z-20 order-2\" />\n                \n                {/* Content */}\n                <div className={`mt-8 ${index % 2 === 0 ? 'order-3' : 'order-1 mb-16'}`}>\n                  <div className=\"bg-zinc-900 rounded-xl p-6 border border-zinc-800\">\n                    <span className=\"inline-block text-xs font-mono text-orange-500 bg-orange-500/10 px-2 py-1 rounded mb-3\">\n                      {stage.number}\n                    </span>\n                    <h3 className=\"text-lg font-heading font-bold text-white mb-2\">\n                      {stage.title}\n                    </h3>\n                    <p className=\"text-sm text-zinc-400\">\n                      {stage.description}\n                    </p>\n                  </div>\n                </div>\n              </div>\n            ))}\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default ProcessTimeline;","src/components/Credentials.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\n\nconst Credentials = () => {\n  const credentials = [\n    {\n      number: \"27+\",\n      label: \"Years Experience\",\n      description: \"Building Excellence\"\n    },\n    {\n      number: \"500+\",\n      label: \"Projects Completed\",\n      description: \"On Time & Budget\"\n    },\n    {\n      number: \"$50M+\",\n      label: \"Total Project Value\",\n      description: \"Successfully Built\"\n    },\n    {\n      number: \"100%\",\n      label: \"Licensed & Insured\",\n      description: \"Full Compliance\"\n    }\n  ];\n\n  return (\n    <Section id=\"credentials\" className=\"py-14 bg-gradient-to-r from-orange-600 to-orange-500\">\n      <Container>\n        <div className=\"grid grid-cols-2 lg:grid-cols-2 gap-8 text-center\">\n          {credentials.map((credential, index) => (\n            <div key={index} className=\"text-white\">\n              <div className=\"mb-3\">\n                <span className=\"text-4xl md:text-6xl font-heading font-bold leading-none tracking-tight\">\n                  {credential.number}\n                </span>\n              </div>\n              <h3 className=\"text-lg md:text-xl font-heading font-bold mb-1\">\n                {credential.label}\n              </h3>\n              <p className=\"text-sm text-orange-100 font-medium\">\n                {credential.description}\n              </p>\n            </div>\n          ))}\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Credentials;","src/components/Testimonial.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { projectImages } from '@/assets/generated-images';\n\nconst Testimonial = () => {\n  return (\n    <Section className=\"py-20 bg-card\">\n      <Container>\n        <div className=\"grid lg:grid-cols-1 sm:grid-cols-2 gap-16 items-center\">\n          <div>\n            <img \n              src={projectImages.gallery1} \n              alt=\"Completed Metro Office Complex project\"\n              className=\"w-full min-h-[260px] object-cover rounded-2xl\"\n            />\n          </div>\n          \n          <div>\n            <div className=\"mb-8\">\n              <svg className=\"w-16 h-16 text-orange-500 mb-6\" fill=\"currentColor\" viewBox=\"0 0 24 24\">\n                <path d=\"M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h4v10h-10z\"/>\n              </svg>\n              \n              <blockquote className=\"text-xl md:text-2xl font-heading leading-relaxed text-foreground mb-6\">\n                \"Premier Build transformed our vision into reality. Their attention to detail and \n                commitment to quality is unmatched. The Metro Office Complex project was completed \n                on schedule and exceeded our expectations.\"\n              </blockquote>\n            </div>\n            \n            <div className=\"border-l-4 border-orange-500 pl-6\">\n              <cite className=\"not-italic\">\n                <p className=\"font-heading font-bold text-lg text-foreground\">Sarah Mitchell</p>\n                <p className=\"text-muted-foreground\">Development Director</p>\n                <p className=\"text-sm text-orange-600 font-semibold mt-1\">\n                  Metro Office Complex • $3.2M Project\n                </p>\n              </cite>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Testimonial;","src/components/EstimateForm.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Card } from '@/components/ui/card';\nimport { Input } from '@/components/ui/input';\nimport { Textarea } from '@/components/ui/textarea';\nimport { Button } from '@/components/ui/button';\nimport { projectImages } from \"@/assets/generated-images\";\n\nconst EstimateForm = () => {\n  const projectTypes = [\n    \"Commercial Construction\",\n    \"Residential Construction\", \n    \"Renovation/Remodeling\",\n    \"Industrial/Warehouse\",\n    \"Multi-Family Development\"\n  ];\n\n  const timelines = [\n    \"Less than 3 months\",\n    \"3-6 months\",\n    \"6-12 months\", \n    \"12+ months\",\n    \"Planning phase\"\n  ];\n\n  return (\n    <Section id=\"estimate\" className=\"py-24 bg-zinc-950\">\n      <Container>\n        <div className=\"grid lg:grid-cols-2 gap-16 items-start\">\n          {/* Contact Info Panel */}\n          <div>\n            <Heading \n              as=\"h2\" \n              size=\"h2\" \n              eyebrow=\"Get Started\"\n              className=\"font-heading text-white mb-8\"\n            >\n              REQUEST YOUR FREE\n              <br />\n              <span className=\"text-orange-500\">PROJECT ESTIMATE</span>\n            </Heading>\n            \n            <div className=\"grid gap-6 md:grid-cols-3\">\n              <div className=\"flex items-center space-x-4\">\n                <div className=\"w-12 h-12 bg-orange-500 rounded-full flex items-center justify-center\">\n                  <svg className=\"w-6 h-6 text-white\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\">\n                    <path strokeLinecap=\"round\" strokeLinejoin=\"round\" strokeWidth={2} d=\"M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z\" />\n                  </svg>\n                </div>\n                <div>\n                  <p className=\"text-2xl font-heading font-bold text-white\">(555) 123-4567</p>\n                  <p className=\"text-zinc-400\">Call for immediate assistance</p>\n                </div>\n              </div>\n              \n              <div className=\"bg-zinc-900 rounded-xl p-6 border border-zinc-800\">\n                <h3 className=\"font-heading font-bold text-white mb-4\">Business Hours</h3>\n                <div className=\"space-y-2 text-zinc-300\">\n                  <div className=\"flex justify-between\">\n                    <span>Monday - Friday:</span>\n                    <span>7:00 AM - 6:00 PM</span>\n                  </div>\n                  <div className=\"flex justify-between\">\n                    <span>Saturday:</span>\n                    <span>8:00 AM - 4:00 PM</span>\n                  </div>\n                  <div className=\"flex justify-between\">\n                    <span>Sunday:</span>\n                    <span>Emergency Only</span>\n                  </div>\n                </div>\n              </div>\n              \n              <div>\n                <h3 className=\"font-heading font-bold text-white mb-2\">Service Area</h3>\n                <p className=\"text-zinc-400\">\n                  Greater Metro Area and surrounding counties. We travel up to 50 miles \n                  for qualified commercial projects.\n                </p>\n              </div>\n            </div>\n          </div>\n\n          {/* Estimate Form */}\n          <Card className=\"bg-zinc-900 border-2 border-orange-500/20 p-8\">\n            <form className=\"space-y-6\" onSubmit={(e) => e.preventDefault()}>\n              <div>\n                <label className=\"block text-sm font-medium text-white mb-2\">\n                  Project Type *\n                </label>\n                <select className=\"w-full h-11 px-3 py-2 bg-zinc-800 border border-zinc-700 rounded-lg text-white focus:ring-2 focus:ring-orange-500 focus:border-transparent\">\n                  <option value=\"\">Select project type...</option>\n                  {projectTypes.map((type) => (\n                    <option key={type} value={type}>{type}</option>\n
