..props} />\n  )\n);\nDialogDescription.displayName = \"DialogDescription\";\n\nexport { Dialog, DialogTrigger, DialogContent, DialogClose, DialogOverlay, DialogTitle, DialogDescription };","src/components/ui/sheet.tsx":"import React from \"react\";\nimport * as DialogPrimitive from \"@radix-ui/react-dialog\";\nimport { cn } from \"@/lib/utils\";\n\nconst Sheet = DialogPrimitive.Root;\nconst SheetTrigger = DialogPrimitive.Trigger;\nconst SheetClose = DialogPrimitive.Close;\n\nconst SheetOverlay = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Overlay\n      ref={ref}\n      className={cn(\"fixed inset-0 z-50 bg-black/60 backdrop-blur-sm\", className)}\n      {...props}\n    />\n  )\n);\nSheetOverlay.displayName = \"SheetOverlay\";\n\ntype SheetContentProps = React.HTMLAttributes<HTMLDivElement> & {\n  side?: \"left\" | \"right\" | \"top\" | \"bottom\";\n};\n\nconst sideStyles: Record<string, string> = {\n  right: \"inset-y-0 right-0 h-full w-3/4 max-w-sm border-l translate-x-0\",\n  left: \"inset-y-0 left-0 h-full w-3/4 max-w-sm border-r translate-x-0\",\n  top: \"inset-x-0 top-0 border-b\",\n  bottom: \"inset-x-0 bottom-0 border-t\",\n};\n\nconst SheetContent = React.forwardRef<HTMLDivElement, SheetContentProps>(\n  ({ side = \"right\", className, children, ...props }, ref) => (\n    <DialogPrimitive.Portal>\n      <SheetOverlay />\n      <DialogPrimitive.Content\n        ref={ref}\n        className={cn(\n          \"fixed z-50 bg-white p-6 shadow-xl transition-transform duration-300\",\n          sideStyles[side],\n          className\n        )}\n        {...props}\n      >\n        {children}\n      </DialogPrimitive.Content>\n    </DialogPrimitive.Portal>\n  )\n);\nSheetContent.displayName = \"SheetContent\";\n\nexport { Sheet, SheetTrigger, SheetContent, SheetClose };","src/components/ui/input.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype InputProps = React.InputHTMLAttributes<HTMLInputElement> & {\n  label?: string;\n  error?: string;\n};\n\nexport default function Input({ label, error, className, id, ...props }: InputProps) {\n  const inputId = id || (label ? label.toLowerCase().replace(/\\s+/g, \"-\") : undefined);\n  return (\n    <div>\n      {label && (\n        <label htmlFor={inputId} className=\"block text-sm font-medium mb-1.5\">\n          {label}\n        </label>\n      )}\n      <input\n        id={inputId}\n        className={cn(\n          \"flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50\",\n          error && \"border-destructive focus-visible:ring-destructive\",\n          className\n        )}\n        {...props}\n      />\n      {error && <p className=\"mt-1 text-sm text-destructive\">{error}</p>}\n    </div>\n  );\n}","src/components/ui/textarea.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype TextareaProps = React.TextareaHTMLAttributes<HTMLTextAreaElement> & {\n  label?: string;\n};\n\nexport default function Textarea({ label, className, id, ...props }: TextareaProps) {\n  const inputId = id || (label ? label.toLowerCase().replace(/\\s+/g, \"-\") : undefined);\n  return (\n    <div>\n      {label && (\n        <label htmlFor={inputId} className=\"block text-sm font-medium mb-1.5\">\n          {label}\n        </label>\n      )}\n      <textarea\n        id={inputId}\n        rows={4}\n        className={cn(\n          \"w-full rounded-lg border px-4 py-2.5 text-base outline-none transition-colors resize-none\",\n          className\n        )}\n        {...props}\n      />\n    </div>\n  );\n}","src/components/ui/badge.tsx":"import React from \"react\";\nimport { cva, type VariantProps } from \"class-variance-authority\";\nimport { cn } from \"@/lib/utils\";\n\nconst badgeVariants = cva(\n  \"inline-flex items-center rounded-full font-medium\",\n  {\n    variants: {\n      size: {\n        sm: \"px-2 py-0.5 text-[10px]\",\n        md: \"px-2.5 py-0.5 text-xs\",\n        lg: \"px-3 py-1 text-sm\",\n      },\n    },\n    defaultVariants: {\n      size: \"md\",\n    },\n  }\n);\n\ntype BadgeProps = React.HTMLAttributes<HTMLSpanElement> &\n  VariantProps<typeof badgeVariants>;\n\nexport default function Badge({ className, size, ...props }: BadgeProps) {\n  return (\n    <span className={cn(badgeVariants({ size }), className)} {...props} />\n  );\n}\n\nexport { badgeVariants };","src/components/ui/card.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype CardProps = {\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Card({ className, children }: CardProps) {\n  return (\n    <div className={cn(\"surface-card rounded-[calc(var(--radius)+6px)] border bg-card text-card-foreground shadow-sm p-6\", className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/section.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SectionProps = {\n  id?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Section({ id, className, children }: SectionProps) {\n  return (\n    <section id={id} className={cn(\"py-16 md:py-24\", className)}>\n      {children}\n    </section>\n  );\n}","src/components/ui/container.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype ContainerProps = {\n  size?: \"sm\" | \"md\" | \"lg\" | \"xl\" | \"full\";\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst maxWidths: Record<string, string> = {\n  sm: \"max-w-3xl\",\n  md: \"max-w-5xl\",\n  lg: \"max-w-6xl\",\n  xl: \"max-w-7xl\",\n  full: \"max-w-full\",\n};\n\nexport default function Container({ size = \"xl\", className, children }: ContainerProps) {\n  return (\n    <div className={cn(\"mx-auto px-4 sm:px-6 lg:px-8\", maxWidths[size], className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/heading.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype HeadingProps = {\n  as?: \"h1\" | \"h2\" | \"h3\" | \"h4\";\n  size?: \"display\" | \"h1\" | \"h2\" | \"h3\";\n  eyebrow?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst sizeStyles: Record<string, string> = {\n  display: \"text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight leading-[1.1]\",\n  h1: \"text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight leading-tight\",\n  h2: \"text-3xl md:text-4xl font-semibold tracking-tight\",\n  h3: \"text-xl md:text-2xl font-semibold\",\n};\n\nexport default function Heading({\n  as: Tag = \"h2\",\n  size = \"h2\",\n  eyebrow,\n  className,\n  children,\n}: HeadingProps) {\n  return (\n    <div>\n      {eyebrow && (\n        <span className=\"block text-xs uppercase tracking-widest font-medium mb-3 opacity-60\">\n          {eyebrow}\n        </span>\n      )}\n      <Tag className={cn(sizeStyles[size], className)}>{children}</Tag>\n    </div>\n  );\n}","src/components/ui/separator.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SeparatorProps = {\n  orientation?: \"horizontal\" | \"vertical\";\n  className?: string;\n};\n\nexport default function Separator({ orientation = \"horizontal\", className }: SeparatorProps) {\n  return (\n    <div\n      role=\"separator\"\n      className={cn(\n        \"shrink-0 bg-current opacity-10\",\n        orientation === \"horizontal\" ? \"h-px w-full\" : \"h-full w-px\",\n        className\n      )}\n    />\n  );\n}","src/components/ui/aspect-ratio.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype AspectRatioProps = {\n  ratio?: number;\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function AspectRatio({ ratio = 16 / 9, className, children }: AspectRatioProps) {\n  return (\n    <div className={cn(\"relative w-full overflow-hidden\", className)} style={{ paddingBottom: (1 / ratio) * 100 + \"%\" }}>\n      <div className=\"absolute inset-0\">{children}</div>\n    </div>\n  );\n}","src/components/ui/testimonial.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype TestimonialProps = {\n  quote: string;\n  author: string;\n  role?: string;\n  avatar?: string;\n  className?: string;\n};\n\nexport default function Testimonial({ quote, author, role, avatar, className }: TestimonialProps) {\n  return (\n    <figure className={cn(\"space-y-4\", className)}>\n      <blockquote className=\"text-lg md:text-xl leading-relaxed italic\">\n        &ldquo;{quote}&rdquo;\n      </blockquote>\n      <figcaption className=\"flex items-center gap-3\">\n        {avatar && (\n          <img src={avatar} alt={author} className=\"w-10 h-10 rounded-full object-cover\" />\n        )}\n        <div>\n          <p className=\"font-medium text-sm\">{author}</p>\n          {role && <p className=\"text-xs opacity-60\">{role}</p>}\n        </div>\n      </figcaption>\n    </figure>\n  );\n}","src/components/ui/stats-band.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport { cn } from \"@/lib/utils\";\n\ntype Stat = {\n  value: string;\n  label: string;\n};\n\ntype StatsBandProps = {\n  stats: Stat[];\n  className?: string;\n};\n\nexport default function StatsBand({ stats, className }: StatsBandProps) {\n  return (\n    <Section className={cn(\"py-12\", className)}>\n      <Container>\n        <div className=\"grid grid-cols-2 md:grid-cols-4 gap-8 text-center\">\n          {stats.map((s) => (\n            <div key={s.label}>\n              <p className=\"text-3xl md:text-5xl font-bold\">{s.value}</p>\n              <p className=\"text-sm mt-1 opacity-60\">{s.label}</p>\n            </div>\n          ))}\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/ui/gallery.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype GalleryImage = {\n  src: string;\n  alt: string;\n  span?: \"normal\" | \"wide\" | \"tall\";\n};\n\ntype GalleryProps = {\n  images: GalleryImage[];\n  className?: string;\n};\n\nconst spanClasses: Record<string, string> = {\n  normal: \"\",\n  wide: \"md:col-span-2\",\n  tall: \"md:row-span-2\",\n};\n\nexport default function Gallery({ images, className }: GalleryProps) {\n  return (\n    <div className={cn(\"grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-4\", className)}>\n      {images.map((img, i) => (\n        <div key={i} className={cn(\"overflow-hidden rounded-lg\", spanClasses[img.span || \"normal\"])}>\n          <img\n            src={img.src}\n            alt={img.alt}\n            className=\"w-full h-full object-cover transition-transform duration-500 hover:scale-105\"\n          />\n        </div>\n      ))}\n    </div>\n  );\n}","src/components/ui/mobile-nav.tsx":"import React from \"react\";\nimport { Sheet, SheetTrigger, SheetContent, SheetClose } from \"@/components/ui/sheet\";\nimport Button from \"@/components/ui/button\";\nimport { cn } from \"@/lib/utils\";\n\ntype MobileNavProps = {\n  links: { label: string; href: string }[];\n  brandName: string;\n  ctaLabel?: string;\n  ctaHref?: string;\n  className?: string;\n};\n\nexport default function MobileNav({ links, brandName, ctaLabel, ctaHref, className }: MobileNavProps) {\n  return (\n    <Sheet>\n      <SheetTrigger asChild>\n        <button className={cn(\"md:hidden p-2\", className)} aria-label=\"Open menu\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\">\n            <line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\" /><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\" /><line x1=\"3\" y1=\"18\" x2=\"21 r\"\n        />\n        <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-950/90 via-zinc-950/60 to-zinc-950/30\"></div>\n      </div>\n\n      <Container className=\"relative z-10\">\n        <div className=\"max-w-4xl\">\n          <div className=\"mb-6\">\n            <Badge className=\"bg-orange-500/20 text-orange-400 border-orange-500/30\">\n              Licensed • Bonded • Insured\n            </Badge>\n          </div>\n          \n          <Heading \n            as=\"h1\" \n            size=\"display\" \n            className=\"font-heading text-5xl md:text-6xl font-bold tracking-wide leading-none mb-6\"\n          >\n            BUILDING EXCELLENCE\n            <span className=\"block text-orange-500\">SINCE 1997</span>\n          </Heading>\n          \n          <p className=\"text-xl text-zinc-300 max-w-2xl mb-8 leading-relaxed\">\n            Premier construction services for residential, commercial, and renovation projects across the greater metropolitan area.\n          </p>\n          \n          <div className=\"flex flex-wrap gap-4 mb-12\">\n            <Button size=\"lg\" className=\"bg-orange-500 hover:bg-orange-600 text-white px-8 py-4\">\n              Request Free Estimate\n            </Button>\n            <Button size=\"lg\" variant=\"outline\" className=\"border-zinc-600 text-zinc-300 hover:bg-zinc-800 px-8 py-4\">\n              View Portfolio\n            </Button>\n          </div>\n        </div>\n      \n      <div className=\"mt-8 grid max-w-2xl grid-cols-1 gap-3 sm:grid-cols-3 sm:gap-4\">\n        <div className=\"surface-card rounded-[calc(var(--radius)+4px)] border px-4 py-3\">\n          <p className=\"text-lg font-semibold\">25+</p>\n          <p className=\"mt-1 text-xs uppercase tracking-[0.18em] text-muted-foreground\">Years delivered</p>\n        </div>\n<div className=\"surface-card rounded-[calc(var(--radius)+4px)] border px-4 py-3\">\n          <p className=\"text-lg font-semibold\">500+</p>\n          <p className=\"mt-1 text-xs uppercase tracking-[0.18em] text-muted-foreground\">Projects built</p>\n        </div>\n<div className=\"surface-card rounded-[calc(var(--radius)+4px)] border px-4 py-3\">\n          <p className=\"text-lg font-semibold\">24/7</p>\n          <p className=\"mt-1 text-xs uppercase tracking-[0.18em] text-muted-foreground\">Crew response</p>\n        </div>\n      </div>\n      <div className=\"family-divider mt-6 max-w-2xl\"></div>\n      <p className=\"mt-4 max-w-xl text-sm text-muted-foreground\">Buttons are aggressive and direct. Labels are short. Action surfaces feel sales-ready, not ornamental.</p>\n      </Container>\n\n      {/* Overlapping Credential Bar */}\n      <div className=\"absolute bottom-0 left-0 right-0 transform translate-y-1/2 z-20\">\n        <Container>\n          <div className=\"bg-zinc-900 border border-orange-500/30 rounded-2xl p-6 shadow-2xl\">\n            <div className=\"grid grid-cols-2 md:grid-cols-4 gap-6 text-center\">\n              <div>\n                <p className=\"text-2xl font-bold text-orange-500 font-heading\">License #47291</p>\n                <p className=\"text-sm text-zinc-400 mt-1\">State Certified</p>\n              </div>\n              <div>\n                <p className=\"text-2xl font-bold text-orange-500 font-heading\">27+ Years</p>\n                <p className=\"text-sm text-zinc-400 mt-1\">Experience</p>\n              </div>\n              <div>\n                <p className=\"text-2xl font-bold text-orange-500 font-heading\">Fully Insured</p>\n                <p className=\"text-sm text-zinc-400 mt-1\">$2M Coverage</p>\n              </div>\n              <div>\n                <p className=\"text-2xl font-bold text-orange-500 font-heading\">A+ Rating</p>\n                <p className=\"text-sm text-zinc-400 mt-1\">Better Business Bureau</p>\n              </div>\n            </div>\n          </div>\n        </Container>\n      </div>\n    </Section>\n  );\n}","src/components/Services.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Card } from '@/components/ui/card';\nimport { Button } from '@/components/ui/button';\nimport projectImages from '@/assets/generated-images';\n\nexport default function Services() {\n  return (\n    <Section className=\"py-24 bg-zinc-900 text-white\">\n      <Container>\n        <div className=\"text-left mb-16\">\n          <p className=\"text-xs uppercase tracking-[0.2em] text-orange-500 font-semibold mb-4\">\n            Our Services\n          </p>\n          <Heading size=\"h2\" className=\"font-heading text-4xl font-bold max-w-2xl\">\n            SPECIALIZED CONSTRUCTION SOLUTIONS\n          </Heading>\n        </div>\n\n        {/* Asymmetric Service Layout */}\n        <div className=\"grid lg:grid-cols-2 gap-8\">\n          {/* Featured Service - Spans 2 Columns */}\n          <div className=\"lg:col-span-2\">\n            <Card className=\"bg-zinc-800 border border-orange-500/20 p-8 h-full\">\n              <div className=\"grid md:grid-cols-2 gap-8 h-full\">\n                <div>\n                  <div className=\"mb-6\">\n                    <Heading size=\"h3\" className=\"font-heading text-2xl font-bold text-orange-500 mb-4\">\n                      COMMERCIAL CONSTRUCTION\n                    </Heading>\n                    <p className=\"text-zinc-300 mb-6\">\n                      Full-scale commercial projects from ground-up construction to tenant improvements. \n                      We handle office buildings, retail spaces, warehouses, and industrial facilities.\n                    </p>\n                    <ul className=\"space-y-2 text-zinc-400\">\n                      <li className=\"flex items-center\">\n                        <span className=\"w-2 h-2 bg-orange-500 rounded-full mr-3\"></span>\n                        Ground-up construction\n                      </li>\n                      <li className=\"flex items-center\">\n                        <span className=\"w-2 h-2 bg-orange-500 rounded-full mr-3\"></span>\n                        Tenant improvements\n                      </li>\n                      <li className=\"flex items-center\">\n                        <span className=\"w-2 h-2 bg-orange-500 rounded-full mr-3\"></span>\n                        Industrial facilities\n                      </li>\n                    </ul>\n                    <p className=\"text-orange-500 font-semibold mt-6\">\n                      Starting at $250k\n                    </p>\n                  </div>\n                </div>\n                <div className=\"relative\">\n                  <img\n                    src={projectImages.gallery1}\n                    alt=\"Commercial construction project\"\n                    className=\"w-full h-64 object-cover rounded-lg\"\n                  />\n                </div>\n              </div>\n            </Card>\n          </div>\n\n          {/* Secondary Services - Stacked */}\n          <div className=\"space-y-6\">\n            <Card className=\"bg-zinc-800 border border-zinc-700 p-6\">\n              <Heading size=\"h3\" className=\"font-heading text-xl font-bold text-orange-500 mb-3\">\n                RESIDENTIAL\n              </Heading>\n              <p className=\"text-zinc-300 text-sm mb-4\">\n                Custom homes, additions, and major renovations with attention to detail and craftsmanship.\n              </p>\n              <div className=\"flex items-center justify-between\">\n                <p className=\"text-orange-500 font-semibold\">Starting at $75k</p>\n                <img\n                  src={projectImages.gallery2}\n                  alt=\"Residential project\"\n                  className=\"w-16 h-16 object-cover rounded\"\n                />\n              </div>\n            </Card>\n\n            <Card className=\"bg-zinc-800 border border-zinc-700 p-6\">\n              <Heading size=\"h3\" className=\"font-heading text-xl font-bold text-orange-500 mb-3\">\n                RENOVATION\n              </Heading>\n              <p className=\"text-zinc-300 text-sm mb-4\">\n                Transform existing spaces with modern upgrades, structural modifications, and interior buildouts.\n              </p>\n              <div className=\"flex items-center justify-between\">\n                <p className=\"text-orange-500 font-semibold\">Starting at $25k</p>\n                <img\n                  src={projectImages.gallery3}\n                  alt=\"Renovation project\"\n                  className=\"w-16 h-16 object-cover rounded\"\n                />\n              </div>\n            </Card>\n\n            <Button variant=\"outline\" className=\"w-full border-orange-500 text-orange-500 hover:bg-orange-500/10\">\n              View All Services\n            </Button>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/ProjectGallery.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Badge } from '@/components/ui/badge';\nimport projectImages from '@/assets/generated-images';\n\nexport default function ProjectGallery() {\n  return (\n    <Section className=\"py-20 bg-background\">\n      <Container>\n        <div className=\"text-left mb-16\">\n          <p className=\"text-xs uppercase tracking-[0.2em] text-orange-500 font-semibold mb-4\">\n            Recent Work\n          </p>\n          <Heading size=\"h2\" className=\"font-heading text-4xl font-bold max-w-2xl\">\n            PROVEN RESULTS ACROSS ALL PROJECT TYPES\n          </Heading>\n        </div>\n\n        {/* Asymmetric Gallery Grid */}\n        <div className=\"grid grid-cols-1 lg:grid-cols-4 gap-6\">\n          {/*               className=\"w-full h-full object-cover transition-transform duration-500 group-hover:scale-105\"\n              />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-900/80 to-transparent\" />\n              <div className=\"absolute bottom-4 left-4 right-4\">\n                <Badge className=\"bg-blue-500/20 text-blue-400 border-blue-500/30 mb-2 text-xs\">\n                  Renovation\n                </Badge>\n                <h4 className=\"font-heading font-bold text-white text-sm\">TECH OFFICE BUILDOUT</h4>\n                <p className=\"text-xs text-zinc-400\">Bellevue • $850K</p>\n              </div>\n            </div>\n          </div>\n\n          <div className=\"group cursor-pointer\">\n            <div className=\"relative overflow-hidden rounded-xl bg-zinc-900 h-48\">\n              <img\n                src={projectImages.gallery2}\n                alt=\"Residential construction\"\n                className=\"w-full h-full object-cover transition-transform duration-500 group-hover:scale-105\"\n              />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-zinc-900/80 to-transparent\" />\n              <div className=\"absolute bottom-4 left-4 right-4\">\n                <Badge className=\"bg-green-500/20 text-green-400 border-green-500/30 mb-2 text-xs\">\n                  Residential\n                </Badge>\n                <h4 className=\"font-heading font-bold text-white text-sm\">MODERN FAMILY HOME</h4>\n                <p className=\"text-xs text-zinc-400\">Kirkland • $1.2M</p>\n              </div>\n            </div>\n          </div>\n\n          <div className=\"group cursor-pointer\">\n            <div className=\"relative overflow-hidden rounded-xl bg-zinc-900 h-48\">\n              <img\n                src={projectImages.gallery3}\n                alt=\"Industrial construction\"\n                className=\"w-full h-full object-cover transition-transform duration-500 gr       function showError(msg) {
        var el = document.getElementById('cenate-error');
        if (el) {
          el.style.display = 'block';
          el.textContent = (el.textContent ? el.textContent + '\n\n' : '') + msg;
        }
        try { console.error(msg); } catch (_) {}
        try {
          document.body.innerHTML = '<pre style="margin:0;padding:16px;color:#b91c1c;background:#fff5f5;font:12px/1.5 ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;white-space:pre-wrap;">' + String(msg) + '</pre>';
        } catch (_) {}
      }

      // Global error handlers — catch errors React's render cycle throws
      // outside the try/catch in run() (async render errors, event handlers)
      window.onerror = function (msg, source, line, col, error) {

        return true;
      };
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason;
        showError('Unhandled promise rejection: ' + (reason && reason.message ? reason.message : String(reason)));
      });

      function waitForGlobals(cb, attempts) {
        attempts = attempts || 0;
        if (typeof window.React !== 'undefined' && typeof window.ReactDOM !== 'undefined' && typeof window.Babel !== 'undefined') {
          cb();
          return;
        }
        if (attempts > 200) {
          showError('Preview runtime failed to load (React/Babel did not initialize within 10s).');

        }
