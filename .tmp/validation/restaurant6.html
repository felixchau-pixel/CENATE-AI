imary) / 0.72));\n  }\n\n  .surface-card {\n    background-image: linear-gradient(180deg, hsl(var(--card) / 0.98), hsl(var(--card) / 0.92));\n    box-shadow: var(--shadow-card);\n  }\n\n  .surface-panel {\n    background: hsl(var(--card) / 0.82);\n    backdrop-filter: blur(14px);\n    border: 1px solid hsl(var(--border) / 0.7);\n    box-shadow: var(--shadow-soft);\n  }\n\n  .section-shell {\n    position: relative;\n  }\n\n  .section-shell::before {\n    content: \"\";\n    position: absolute;\n    inset: 0;\n    pointer-events: none;\n    background: linear-gradient(180deg, hsl(var(--background) / 0), hsl(var(--primary) / 0.03));\n    opacity: 0.8;\n  }\n\n  .eyebrow {\n    display: inline-flex;\n    align-items: center;\n    gap: 0.5rem;\n    font-size: 0.75rem;\n    font-weight: 700;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: hsl(var(--primary));\n  }\n}\n\nhtml {\n  scroll-behavior: smooth;\n}\n\n* {\n  box-sizing: border-box;\n}\n\n@keyframes fade-in-up {\n  from { opacity: 0; transform: translateY(20px); }\n  to { opacity: 1; transform: translateY(0); }\n}\n\n@keyframes count-up {\n  from { opacity: 0; transform: scale(0.8); }\n  to { opacity: 1; transform: scale(1); }\n}\n\n@keyframes accordion-down {\n  from { height: 0; }\n  to { height: var(--radix-accordion-content-height); }\n}\n\n@keyframes accordion-up {\n  from { height: var(--radix-accordion-content-height); }\n  to { height: 0; }\n}\n\n.animate-fade-in-up {\n  animation: fade-in-up 0.6s ease-out forwards;\n}\n\n.animate-count-up {\n  animation: count-up 0.5s ease-out forwards;\n}\n\n.animate-accordion-down {\n  animation: accordion-down 0.2s ease-out;\n}\n\n.animate-accordion-up {\n  animation: accordion-up 0.2s ease-out;\n}","src/App.css":"#root {\n  min-height: 100vh;\n  background: hsl(var(--background));\n  color: hsl(var(--foreground));\n}","src/vite-env.d.ts":"/// <reference types=\"vite/client\" />","src/assets/.gitkeep":"","src/hooks/use-mobile.ts":"import { useEffect, useState } from \"react\";\n\nexport function useMobile(breakpoint = 768) {\n  const [isMobile, setIsMobile] = useState(false);\n\n  useEffect(() => {\n    const media = window.matchMedia(`(max-width: ${breakpoint - 1}px)`);\n    const update = () => setIsMobile(media.matches);\n    update();\n    media.addEventListener(\"change\", update);\n    return () => media.removeEventListener(\"change\", update);\n  }, [breakpoint]);\n\n  return isMobile;\n}","src/pages/Home.tsx":"import App from \"../App\";\n\nexport default function HomePage() {\n  return <App />;\n}","src/test/setup.ts":"import \"@testing-library/jest-dom\";","src/test/App.test.tsx":"import { render, screen } from \"@testing-library/react\";\nimport App from \"../App\";\n\ndescribe(\"App\", () => {\n  it(\"renders without crashing\", () => {\n    render(<App />);\n    expect(screen.getByRole(\"main\")).toBeInTheDocument();\n  });\n});","src/lib/utils.ts":"import { clsx, type ClassValue } from \"clsx\";\n\nexport function cn(...inputs: ClassValue[]) {\n  return clsx(inputs);\n}","src/components/ui/button.tsx":"import React from \"react\";\nimport { Slot } from \"@radix-ui/react-slot\";\nimport { cva, type VariantProps } from \"class-variance-authority\";\nimport { cn } from \"@/lib/utils\";\n\nconst buttonVariants = cva(\n  \"inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50 [&_svg]:pointer-events-none [&_svg]:size-4 [&_svg]:shrink-0\",\n  {\n    variants: {\n      variant: {\n        default: \"bg-primary text-primary-foreground hover:bg-primary/90\",\n        destructive: \"bg-destructive text-destructive-foreground hover:bg-destructive/90\",\n        outline: \"border border-input bg-background hover:bg-accent hover:text-accent-foreground\",\n        secondary: \"bg-secondary text-secondary-foreground hover:bg-secondary/80\",\n        ghost: \"hover:bg-accent hover:text-accent-foreground\",\n        link: \"text-primary underline-offset-4 hover:underline\",\n      },\n      size: {\n        default: \"h-10 px-4 py-2\",\n        sm: \"h-9 rounded-md px-3\",\n        lg: \"h-11 rounded-md px-8\",\n        icon: \"h-10 w-10\",\n      },\n    },\n    defaultVariants: {\n      variant: \"default\",\n      size: \"default\",\n    },\n  }\n);\n\ntype ButtonProps = React.ButtonHTMLAttributes<HTMLButtonElement> &\n  VariantProps<typeof buttonVariants> & {\n    asChild?: boolean;\n  };\n\nconst Button = React.forwardRef<HTMLButtonElement, ButtonProps>(\n  ({ className, variant, size, asChild = false, ...props }, ref) => {\n    const Comp = asChild ? Slot : \"button\";\n    return (\n      <Comp\n        className={cn(buttonVariants({ variant, size, className }))}\n        ref={ref}\n        {...props}\n      />\n    );\n  }\n);\nButton.displayName = \"Button\";\n\nexport { Button, buttonVariants };\nexport default Button;","src/components/ui/accordion.tsx":"import React from \"react\";\nimport * as AccordionPrimitive from \"@radix-ui/react-accordion\";\nimport { cn } from \"@/lib/utils\";\n\nconst Accordion = AccordionPrimitive.Root;\n\nconst AccordionItem = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement> & { value: string }>(\n  ({ className, ...props }, ref) => (\n    <AccordionPrimitive.Item ref={ref} className={cn(\"border-b\", className)} {...props} />\n  )\n);\nAccordionItem.displayName = \"AccordionItem\";\n\nconst AccordionTrigger = React.forwardRef<HTMLButtonElement, React.ButtonHTMLAttributes<HTMLButtonElement>>(\n  ({ className, children, ...props }, ref) => (\n    <AccordionPrimitive.Header className=\"flex\">\n      <AccordionPrimitive.Trigger\n        ref={ref}\n        className={cn(\n          \"flex flex-1 items-center justify-between py-4 font-medium transition-all [&[data-state=open]>svg]:rotate-180\",\n          className\n        )}\n        {...props}\n      >\n        {children}\n        <svg xmlns=\"http://www.w3.org/2000/svg\" width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\" className=\"shrink-0 transition-transform duration-200\"><path d=\"m6 9 6 6 6-6\" /></svg>\n      </AccordionPrimitive.Trigger>\n    </AccordionPrimitive.Header>\n  )\n);\nAccordionTrigger.displayName = \"AccordionTrigger\";\n\nconst AccordionContent = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, children, ...props }, ref) => (\n    <AccordionPrimitive.Content ref={ref} className=\"overflow-hidden text-sm\" {...props}>\n      <div className={cn(\"pb-4 pt-0\", className)}>{children}</div>\n    </AccordionPrimitive.Content>\n  )\n);\nAccordionContent.displayName = \"AccordionContent\";\n\nexport { Accordion, AccordionItem, AccordionTrigger, AccordionContent };","src/components/ui/tabs.tsx":"import React from \"react\";\nimport * as TabsPrimitive from \"@radix-ui/react-tabs\";\nimport { cn } from \"@/lib/utils\";\n\nconst Tabs = TabsPrimitive.Root;\n\nconst TabsList = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, ...props }, ref) => (\n    <TabsPrimitive.List\n      ref={ref}\n      className={cn(\n        \"inline-flex h-10 items-center justify-center rounded-lg bg-zinc-100 p-1 text-zinc-500\",\n        className\n      )}\n      {...props}\n    />\n  )\n);\nTabsList.displayName = \"TabsList\";\n\nconst TabsTrigger = React.forwardRef<HTMLButtonElement, React.ButtonHTMLAttributes<HTMLButtonElement> & { value: string }>(\n  ({ className, ...props }, ref) => (\n    <TabsPrimitive.Trigger\n      ref={ref}\n      className={cn(\n        \"inline-flex items-center justify-center whitespace-nowrap rounded-md px-3 py-1.5 text-sm font-medium transition-all\",\n        \"data-[state=active]:bg-white dat  className\n        )}\n        {...props}\n      >\n        {children}\n      </DialogPrimitive.Content>\n    </DialogPortal>\n  )\n);\nDialogContent.displayName = \"DialogContent\";\n\nconst DialogTitle = React.forwardRef<HTMLHeadingElement, React.HTMLAttributes<HTMLHeadingElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Title ref={ref} className={cn(\"text-lg font-semibold\", className)} {...props} />\n  )\n);\nDialogTitle.displayName = \"DialogTitle\";\n\nconst DialogDescription = React.forwardRef<HTMLParagraphElement, React.HTMLAttributes<HTMLParagraphElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Description ref={ref} className={cn(\"text-sm text-zinc-500\", className)} {...props} />\n  )\n);\nDialogDescription.displayName = \"DialogDescription\";\n\nexport { Dialog, DialogTrigger, DialogContent, DialogClose, DialogOverlay, DialogTitle, DialogDescription };","src/components/ui/sheet.tsx":"import React from \"react\";\nimport * as DialogPrimitive from \"@radix-ui/react-dialog\";\nimport { cn } from \"@/lib/utils\";\n\nconst Sheet = DialogPrimitive.Root;\nconst SheetTrigger = DialogPrimitive.Trigger;\nconst SheetClose = DialogPrimitive.Close;\n\nconst SheetOverlay = React.forwardRef<HTMLDivElement, React.HTMLAttributes<HTMLDivElement>>(\n  ({ className, ...props }, ref) => (\n    <DialogPrimitive.Overlay\n      ref={ref}\n      className={cn(\"fixed inset-0 z-50 bg-black/60 backdrop-blur-sm\", className)}\n      {...props}\n    />\n  )\n);\nSheetOverlay.displayName = \"SheetOverlay\";\n\ntype SheetContentProps = React.HTMLAttributes<HTMLDivElement> & {\n  side?: \"left\" | \"right\" | \"top\" | \"bottom\";\n};\n\nconst sideStyles: Record<string, string> = {\n  right: \"inset-y-0 right-0 h-full w-3/4 max-w-sm border-l translate-x-0\",\n  left: \"inset-y-0 left-0 h-full w-3/4 max-w-sm border-r translate-x-0\",\n  top: \"inset-x-0 top-0 border-b\",\n  bottom: \"inset-x-0 bottom-0 border-t\",\n};\n\nconst SheetContent = React.forwardRef<HTMLDivElement, SheetContentProps>(\n  ({ side = \"right\", className, children, ...props }, ref) => (\n    <DialogPrimitive.Portal>\n      <SheetOverlay />\n      <DialogPrimitive.Content\n        ref={ref}\n        className={cn(\n          \"fixed z-50 bg-white p-6 shadow-xl transition-transform duration-300\",\n          sideStyles[side],\n          className\n        )}\n        {...props}\n      >\n        {children}\n      </DialogPrimitive.Content>\n    </DialogPrimitive.Portal>\n  )\n);\nSheetContent.displayName = \"SheetContent\";\n\nexport { Sheet, SheetTrigger, SheetContent, SheetClose };","src/components/ui/input.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype InputProps = React.InputHTMLAttributes<HTMLInputElement> & {\n  label?: string;\n  error?: string;\n};\n\nexport default function Input({ label, error, className, id, ...props }: InputProps) {\n  const inputId = id || (label ? label.toLowerCase().replace(/\\s+/g, \"-\") : undefined);\n  return (\n    <div>\n      {label && (\n        <label htmlFor={inputId} className=\"block text-sm font-medium mb-1.5\">\n          {label}\n        </label>\n      )}\n      <input\n        id={inputId}\n        className={cn(\n          \"flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:cursor-not-allowed disabled:opacity-50\",\n          error && \"border-destructive focus-visible:ring-destructive\",\n          className\n        )}\n        {...props}\n      />\n      {error && <p className=\"mt-1 text-sm text-destructive\">{error}</p>}\n    </div>\n  );\n}","src/components/ui/textarea.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype TextareaProps = React.TextareaHTMLAttributes<HTMLTextAreaElement> & {\n  label?: string;\n};\n\nexport default function Textarea({ label, className, id, ...props }: TextareaProps) {\n  const inputId = id || (label ? label.toLowerCase().replace(/\\s+/g, \"-\") : undefined);\n  return (\n    <div>\n      {label && (\n        <label htmlFor={inputId} className=\"block text-sm font-medium mb-1.5\">\n          {label}\n        </label>\n      )}\n      <textarea\n        id={inputId}\n        rows={4}\n        className={cn(\n          \"w-full rounded-lg border px-4 py-2.5 text-base outline-none transition-colors resize-none\",\n          className\n        )}\n        {...props}\n      />\n    </div>\n  );\n}","src/components/ui/badge.tsx":"import React from \"react\";\nimport { cva, type VariantProps } from \"class-variance-authority\";\nimport { cn } from \"@/lib/utils\";\n\nconst badgeVariants = cva(\n  \"inline-flex items-center rounded-full font-medium\",\n  {\n    variants: {\n      size: {\n        sm: \"px-2 py-0.5 text-[10px]\",\n        md: \"px-2.5 py-0.5 text-xs\",\n        lg: \"px-3 py-1 text-sm\",\n      },\n    },\n    defaultVariants: {\n      size: \"md\",\n    },\n  }\n);\n\ntype BadgeProps = React.HTMLAttributes<HTMLSpanElement> &\n  VariantProps<typeof badgeVariants>;\n\nexport default function Badge({ className, size, ...props }: BadgeProps) {\n  return (\n    <span className={cn(badgeVariants({ size }), className)} {...props} />\n  );\n}\n\nexport { badgeVariants };","src/components/ui/card.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype CardProps = {\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Card({ className, children }: CardProps) {\n  return (\n    <div className={cn(\"surface-card rounded-[calc(var(--radius)+6px)] border bg-card text-card-foreground shadow-sm p-6\", className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/section.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SectionProps = {\n  id?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function Section({ id, className, children }: SectionProps) {\n  return (\n    <section id={id} className={cn(\"py-16 md:py-24\", className)}>\n      {children}\n    </section>\n  );\n}","src/components/ui/container.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype ContainerProps = {\n  size?: \"sm\" | \"md\" | \"lg\" | \"xl\" | \"full\";\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst maxWidths: Record<string, string> = {\n  sm: \"max-w-3xl\",\n  md: \"max-w-5xl\",\n  lg: \"max-w-6xl\",\n  xl: \"max-w-7xl\",\n  full: \"max-w-full\",\n};\n\nexport default function Container({ size = \"xl\", className, children }: ContainerProps) {\n  return (\n    <div className={cn(\"mx-auto px-4 sm:px-6 lg:px-8\", maxWidths[size], className)}>\n      {children}\n    </div>\n  );\n}","src/components/ui/heading.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype HeadingProps = {\n  as?: \"h1\" | \"h2\" | \"h3\" | \"h4\";\n  size?: \"display\" | \"h1\" | \"h2\" | \"h3\";\n  eyebrow?: string;\n  className?: string;\n  children: React.ReactNode;\n};\n\nconst sizeStyles: Record<string, string> = {\n  display: \"text-4xl sm:text-5xl md:text-6xl font-bold tracking-tight leading-[1.1]\",\n  h1: \"text-4xl md:text-5xl lg:text-6xl font-bold tracking-tight leading-tight\",\n  h2: \"text-3xl md:text-4xl font-semibold tracking-tight\",\n  h3: \"text-xl md:text-2xl font-semibold\",\n};\n\nexport default function Heading({\n  as: Tag = \"h2\",\n  size = \"h2\",\n  eyebrow,\n  className,\n  children,\n}: HeadingProps) {\n  return (\n    <div>\n      {eyebrow && (\n        <span className=\"block text-xs uppercase tracking-widest font-medium mb-3 opacity-60\">\n          {eyebrow}\n        </span>\n      )}\n      <Tag className={cn(sizeStyles[size], className)}>{children}</Tag>\n    </div>\n  );\n}","src/components/ui/separator.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype SeparatorProps = {\n  orientation?: \"horizontal\" | \"vertical\";\n  className?: string;\n};\n\nexport default function Separator({ orientation = \"horizontal\", className }: SeparatorProps) {\n  return (\n    <div\n      role=\"separator\"\n      className={cn(\n        \"shrink-0 bg-current opacity-10\",\n        orientation === \"horizontal\" ? \"h-px w-full\" : \"h-full w-px\",\n        className\n      )}\n    />\n  );\n}","src/components/ui/aspect-ratio.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype AspectRatioProps = {\n  ratio?: number;\n  className?: string;\n  children: React.ReactNode;\n};\n\nexport default function AspectRatio({ ratio = 16 / 9, className, children }: AspectRatioProps) {\n  return (\n    <div className={cn(\"relative w-full overflow-hidden\", className)} style={{ paddingBottom: (1 / ratio) * 100 + \"%\" }}>\n      <div className=\"absolute inset-0\">{children}</div>\n    </div>\n  );\n}","src/components/ui/testimonial.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype TestimonialProps = {\n  quote: string;\n  author: string;\n  role?: string;\n  avatar?: string;\n  className?: string;\n};\n\nexport default function Testimonial({ quote, author, role, avatar, className }: TestimonialProps) {\n  return (\n    <figure className={cn(\"space-y-4\", className)}>\n      <blockquote className=\"text-lg md:text-xl leading-relaxed italic\">\n        &ldquo;{quote}&rdquo;\n      </blockquote>\n      <figcaption className=\"flex items-center gap-3\">\n        {avatar && (\n          <img src={avatar} alt={author} className=\"w-10 h-10 rounded-full object-cover\" />\n        )}\n        <div>\n          <p className=\"font-medium text-sm\">{author}</p>\n          {role && <p className=\"text-xs opacity-60\">{role}</p>}\n        </div>\n      </figcaption>\n    </figure>\n  );\n}","src/components/ui/stats-band.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport { cn } from \"@/lib/utils\";\n\ntype Stat = {\n  value: string;\n  label: string;\n};\n\ntype StatsBandProps = {\n  stats: Stat[];\n  className?: string;\n};\n\nexport default function StatsBand({ stats, className }: StatsBandProps) {\n  return (\n    <Section className={cn(\"py-12\", className)}>\n      <Container>\n        <div className=\"grid grid-cols-2 md:grid-cols-4 gap-8 text-center\">\n          {stats.map((s) => (\n            <div key={s.label}>\n              <p className=\"text-3xl md:text-5xl font-bold\">{s.value}</p>\n              <p className=\"text-sm mt-1 opacity-60\">{s.label}</p>\n            </div>\n          ))}\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/ui/gallery.tsx":"import React from \"react\";\nimport { cn } from \"@/lib/utils\";\n\ntype GalleryImage = {\n  src: string;\n  alt: string;\n  span?: \"normal\" | \"wide\" | \"tall\";\n};\n\ntype GalleryProps = {\n  images: GalleryImage[];\n  className?: string;\n};\n\nconst spanClasses: Record<string, string> = {\n  normal: \"\",\n  wide: \"md:col-span-2\",\n  tall: \"md:row-span-2\",\n};\n\nexport default function Gallery({ images, className }: GalleryProps) {\n  return (\n    <div className={cn(\"grid grid-cols-2 md:grid-cols-3 gap-2 md:gap-4\", className)}>\n      {images.map((img, i) => (\n        <div key={i} className={cn(\"overflow-hidden rounded-lg\", spanClasses[img.span || \"normal\"])}>\n          <img\n            src={img.src}\n            alt={img.alt}\n            className=\"w-full h-full object-cover transition-transform duration-500 hover:scale-105\"\n          />\n        </div>\n      ))}\n    </div>\n  );\n}","src/components/ui/mobile-nav.tsx":"import React from \"react\";\nimport { Sheet, SheetTrigger, SheetContent, SheetClose } from \"@/components/ui/sheet\";\nimport Button from \"@/components/ui/button\";\nimport { cn } from \"@/lib/utils\";\n\ntype MobileNavProps = {\n  links: { label: string; href: string }[];\n  brandName: string;\n  ctaLabel?: string;\n  ctaHref?: string;\n  className?: string;\n};\n\nexport default function MobileNav({ links, brandName, ctaLabel, ctaHref, className }: MobileNavProps) {\n  return (\n    <Sheet>\n      <SheetTrigger asChild>\n        <button className={cn(\"md:hidden p-2\", className)} aria-label=\"Open menu\">\n          <svg width=\"24\" height=\"24\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" strokeWidth=\"2\" strokeLinecap=\"round\" strokeLinejoin=\"round\">\n            <line x1=\"3\" y1=\"6\" x2=\"21\" y2=\"6\" /><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\" /><line x1=\"3\" y1=\"18\" x2=\"21\" y2=\"18\" />\n          </svg>\n        </button>\n      </SheetTrigger>\n      <SheetContent side=\"right\" className=\"flex flex-col pt-16\">\n        <p className=\"text-lg font-semibold mb-8\">{brandName}</p>\n        <nav className=\"flex flex-col gap-4\">\n          {links.map((link) => (\n            <SheetClose key={link.href} asChild>\n              <a href={link.href} className=\"text-lg py-2 border-b border-zinc-100 hover:text-zinc-600 transition-colors\">\n                {link.label}\n              </a>\n            </SheetClose>\n          ))}\n        </nav>\n        {ctaLabel && ctaHref && (\n          <div className=\"mt-auto pt-8\">\n            <SheetClose asChild>\n              <Button asChild size=\"lg\" className=\"w-full\">\n                <a href={ctaHref}>{ctaLabel}</a>\n              </Button>\n            </SheetClose>\n          </div>\n        )}\n      </SheetContent>\n    </Sheet>\n  );\n}","src/App.tsx":"import React from 'react';\nimport Navbar from './components/Navbar';\nimport Hero from './components/Hero';\nimport ChefStory from './components/ChefStory';\nimport MenuHighlights from './components/MenuHighlights';\nimport Gallery from './components/Gallery';\nimport PressProof from './components/PressProof';\nimport Reservation from './components/Reservation';\nimport Location from './components/Location';\nimport Footer from './components/Footer';\n\nfunction App() {\n  return (\n    <main role=\"main\" className=\"min-h-screen bg-black text-stone-50\">\n      <Navbar />\n      <Hero />\n      <ChefStory />\n      <MenuHighlights />\n      <Gallery />\n      <PressProof />\n      <Reservation />\n      <Location />\n      <Footer />\n    </main>\n  );\n}\n\nexport default App;","src/components/Navbar.tsx":"import React from \"react\";\nimport Container from \"@/components/ui/container\";\nimport Button from \"@/components/ui/button\";\nimport MobileNav from \"@/components/ui/mobile-nav\";\n\nconst links = [\n  { label: \"Menu\", href: \"#menu\" },\n  { label: \"Chef\", href: \"#chef\" },\n  { label: \"Gallery\", href: \"#gallery\" },\n  { label: \"Press\", href: \"#press\" },\n  { label: \"Location\", href: \"#location\" },\n];\n\nexport default function Navbar() {\n  return (\n    <header className=\"fixed top-0 left-0 right-0 z-50 bg-black/95 backdrop-blur-sm border-b border-amber-600/20\">\n      <Container>\n        <div className=\"flex items-center justify-between h-16\">\n          <a href=\"#\" className=\"text-xl font-serif text-amber-400\">\n            Terroir\n          </a>\n          <nav className=\"hidden md:flex items-center gap-8\">\n            {links.map((link) => (\n              <a \n                key={link.href} \n                href={link.href} \n                className=\"text-sm text-stone-300 hover:text-amber-400 transition-colors duration-200\"\n              >\n                {link.label}\n              </a>\n            ))}\n            <Button size=\"sm\" className=\"bg-amber-600 text-black hover:bg-amber-500\">\n              Reserve\n            </Button>\n          </nav>\n          <MobileNav \n            links={links} \n            brandName=\"Terroir\" \n            ctaLabel=\"Reserve\" \n            ctaHref=\"#reservation\" \n          />\n        </div>\n      </Container>\n    </header>\n  );\n}","src/components/Hero.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport Heading from \"@/components/ui/heading\";\nimport Button from \"@/components/ui/button\";\nimport Badge from \"@/components/ui/badge\";\n\nexport default function Hero() {\n  return (\n    <Section className=\"min-h-screen flex items-center bg-black text-stone-50 relative overflow-hidden\">\n      <div className=\"absolute inset-0\">\n        <img\n          src=\"https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1920&h=1080&fit=crop&q=80\"\n          alt=\"Elegant fine dining restaurant interior with warm candlelight\"\n          className=\"w-full h-full object-cover opacity-40\"\n        />\n        <div className=\"absolute inset-0 bg-gradient-to-r from-black via-black/80 to-transparent\"></div>\n      </div>\n      \n      <Container className=\"relative z-10\">\n        <div className=\"grid lg:grid-cols-12 gap-8 items-center\">\n          <div className=\"lg:col-span-6 max-w-2xl\">\n            <div className=\"flex items-center gap-3 mb-6\">\n              <Badge className=\"bg-amber-600/20 text-amber-400 border border-amber-600/30\">\n                Est. 2019\n              </Badge>\n              <Badge className=\"bg-amber-600/20 text-amber-400 border border-amber-600/30\">\n                Michelin ⭐\n              </Badge>\n            </div>\n            \n            <Heading as=\"h1\" size=\"display\" className=\"text-stone-50 font-serif mb-6\">\n              A Symphony of Seasonal Flavors\n            </Heading>\n            \n            <p className=\"text-xl text-stone-300 leading-relaxed mb-8 max-w-lg\">\n              Contemporary French cuisine rooted in the finest local ingredients, \n              crafted with precision and served with warmth in the heart of the city.\n            </p>\n            \n            <div className=\"flex flex-col sm:flex-row gap-4 mb-12\">\n              <Button size=\"lg\" className=\"bg-amber-600 text-black hover:bg-amber-500\">\n                Reserve Your Table\n              </Button>\n              <Button size=\"lg\" variant=\"outline\" className=\"border-amber-600/50 text-amber-400 hover:bg-amber-600/10\">\n                View Tasting Menu\n              </Button>\n            </div>\n            \n            <div className=\"grid grid-cols-3 gap-8 pt-8 border-t border-amber-600/20\">\n              <div>\n                <p className=\"text-2xl font-serif text-amber-400 mb-1\">5★</p>\n                <p className=\"text-xs text-stone-400 uppercase tracking-widest\">Michelin Guide</p>\n              </div>\n              <div>\n                <p className=\"text-2xl font-serif text-amber-400 mb-1\">2019</p>\n                <p className=\"text-xs text-stone-400 uppercase tracking-widest\">James Beard</p>\n              </div>\n              <div>\n                <p className=\"text-2xl font-serif text-amber-400 mb-1\">47th</p>\n                <p className=\"text-xs text-stone-400 uppercase tracking-widest\">World's 50 Best</p>\n              </div>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/ChefStory.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport Heading from \"@/components/ui/heading\";\n\nexport default function ChefStory() {\n  return (\n    <Section className=\"bg-stone-950 text-stone-50 py-24\" id=\"chef\">\n      <Container>\n        <div className=\"grid lg:grid-cols-5 gap-12 items-start\">\n          <div className=\"lg:col-span-2\">\n            <img\n              src=\"https://images.unsplash.com/photo-1577219491135-ce391730fb2c?w=800&h=1000&fit=crop&q=80\"\n              alt=\"Chef working at the pass under warm kitchen light\"\n              className=\"rounded-xl object-cover w-full aspect-[3/4] shadow-2xl\"\n            />\n            <p className=\"mt-4 text-xs text-amber-400 uppercase tracking-[0.3em] text-center\">\n              Chef Elena Rousseau • Executive Chef & Owner\n            </p>\n          </div>\n          \n          <div className=\"lg:col-span-3 lg:pt-8\">\n            <Heading as=\"h2\" size=\"h2\" eyebrow=\"Our Philosophy\" className=\"text-stone-50 font-serif mb-8\">\n              Where Tradition Meets Innovation\n            </Heading>\n            \n            <div className=\"prose prose-lg prose-invert max-w-none\">\n              <p className=\"text-lg text-stone-300 leading-relaxed mb-6\">\n                My journey began in the markets of Lyon, where my grandmother taught me that great cooking \n                starts with understanding your ingredients. Every dish we create tells a story—of the \n                farmer who grew the vegetables, the seasons that shaped their flavor, and the techniques \n                passed down through generations.\n              </p>\n              \n              <blockquote className=\"border-l-4 border-amber-600 pl-6 my-8\">\n                <p className=\"text-2xl font-serif italic text-stone-200 leading-relaxed\">\n                  \"Cooking is an act of love—for the ingredient, for the craft, \n                  and for the guest who will experience that moment of pure joy.\"\n                </p>\n              </blockquote>\n              \n              <p className=\"text-stone-400 leading-relaxed\">\n                At Terroir, we celebrate the marriage of classical French technique with the vibrant \n                flavors of our local terroir. Each plate is a canvas where tradition and creativity \n                dance together, creating something both familiar and entirely new.\n              </p>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/MenuHighlights.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport Heading from \"@/components/ui/heading\";\nimport Card from \"@/components/ui/card\";\n\nconst menuCategories = [\n  {\n    title: \"Amuse-Bouche & Starters\",\n    items: [\n      { name: \"Oyster Velouté\", description: \"Kusshi oyster, champagne foam, caviar\", price: \"28\" },\n      { name: \"Foie Gras Terrine\", description: \"Sauternes gelée, toasted brioche, fig compote\", price: \"42\" },\n      { name: \"Hamachi Crudo\", description: \"Yuzu kosho, finger lime, micro shiso\", price: \"38\" }\n    ]\n  },\n  {\n    title: \"Mains\",\n    items: [\n      { name: \"Duck Breast Confit\", description: \"Five-spice, pickled cherries, jus gras\", price: \"58\" },\n      { name: \"Wagyu Tenderloin\", description: \"Bone marrow, roasted shallots, red wine jus\", price: \"85\" },\n      { name: \"John Dory\", description: \"Brown butter, capers, lemon confit\", price: \"52\" }\n    ]\n  },\n  {\n    title: \"Desserts\",\n    items: [\n      { name: \"Dark Chocolate Soufflé\", description: \"Valrhona chocolate, crème anglaise\", price: \"24\" },\n      { name: \"Tarte Tatin\", description: \"Caramelized apples, vanilla bean ice cream\", price: \"22\" },\n      { name: \"Cheese Selection\", description: \"Artisanal French cheeses, honeycomb\", price: \"26\" }\n    ]\n  }\n];\n\nexport default function MenuHighlights() {\n  return (\n    <Section className=\"bg-zinc-900 text-stone-50 py-24\" id=\"menu\">\n      <Container size=\"lg\">\n        <Heading as=\"h2\" size=\"h2\" eyebrow=\"The Menu\" className=\"text-stone-50 font-serif mb-16 text-center\">\n          Seasonal Selections\n        </Heading>\n        \n        <div className=\"space-y-16\">\n          {menuCategories.map((category) => (\n            <div key={category.title}>\n              <h3 className=\"text-xl font-serif text-amber-400 mb-8 text-center border-b border-amber-600/20 pb-4\">\n                {category.title}\n              </h3>\n              \n              <div className=\"space-y-1\">\n                {category.items.map((item, index) => (\n                  <div \n                    key={item.name}\n                    className=\"flex items-start justify-between py-4 border-b border-stone-800/50 last:border-b-0 hover:bg-stone-900/30 transition-colors duration-200 px-4 rounded-lg\"\n                  >\n                    <div className=\"flex-1 pr-4\">\n                      <h4 className=\"text-lg font-serif text-stone-100 mb-2\">\n                        {item.name}\n                      </h4>\n                      <p className=\"text-stone-400 text-sm leading-relaxed\">\n                        {item.description}\n                      </p>\n                    </div>\n                    <p className=\"text-lg text-amber-400 font-medium tabular-nums\">\n                      ${item.price}\n                    </p>\n                  </div>\n                ))}\n              </div>\n            </div>\n          ))}\n        </div>\n        \n        <Card className=\"mt-16 bg-gradient-to-r from-amber-600/10 to-amber-500/5 border border-amber-600/20 p-8\">\n          <div className=\"grid md:grid-cols-2 gap-8 items-center\">\n            <div>\n              <img\n                src=\"https://images.unsplash.com/photo-1565299624946-b28f40a0ca4b?w=800&h=600&fit=crop&q=80\"\n                alt=\"Artfully plated signature dish on dark surface\"\n                className=\"rounded-xl w-full aspect-[4/3] object-cover\"\n              />\n            </div>\n            <div>\n              <h3 className=\"text-2xl font-serif text-stone-100 mb-4\">\n                Chef's Tasting Menu\n              </h3>\n              <p className=\"text-stone-300 mb-6 leading-relaxed\">\n                An seven-course journey through our seasonal offerings, paired with \n                carefully selected wines from our cellar. Available Wednesday through Saturday.\n              </p>\n              <div className=\"flex items-center justify-between\">\n                <span className=\"text-3xl font-serif text-amber-400\">$125</span>\n                <span className=\"text-sm text-stone-400\">Wine pairing +$65</span>\n              </div>\n            </div>\n          </div>\n        </Card>\n      </Container>\n    </Section>\n  );\n}","src/components/Gallery.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport Heading from \"@/components/ui/heading\";\n\nconst galleryImages = [\n  {\n    src: \"https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800&h=600&fit=crop&q=80\",\n    alt: \"Upscale restaurant dining room at evening service\",\n    span: \"col-span-2 row-span-2\"\n  },\n  {\n    src: \"https://images.unsplash.com/photo-1470337458703-46a1888eb515?w=400&h=300&fit=crop&q=80\",\n    alt: \"Bartender crafting cocktail in upscale bar\",\n    span: \"col-span-1\"\n  },\n  {\n    src: \"https://images.unsplash.com/photo-1551632436-cbf8dd35adfa?w=400&h=300&fit=crop&q=80\",\n    alt: \"Restaurant kitchen during active service\",\n    span: \"col-span-1\"\n  },\n  {\n    src: \"https://images.unsplash.com/photo-1559339352-11d035aa65de?w=400&h=400&fit=crop&q=80\",\n    alt: \"Wine cellar with atmospheric lighting\",\n    span: \"col-span-1\"\n  },\n  {\n    src: \"https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?w=400&h=400&fit=crop&q=80\",\n    alt: \"Fine dining dessert with delicate garnish\",\n    span: \"col-span-1\"\n  }\n];\n\nexport default function Gallery() {\n  return (\n    <Section className=\"bg-black text-stone-50 py-24\" id=\"gallery\">\n      <Container>\n        <Heading as=\"h2\" size=\"h2\" eyebrow=\"The Experience\" className=\"text-stone-50 font-serif mb-12\">\n          Atmosphere & Artistry\n        </Heading>\n        \n        <div className=\"grid grid-cols-3 gap-4 auto-rows-[200px]\">\n          {galleryImages.map((image, index) => (\n            <div \n              key={index}\n              className={`${image.span} group relative overflow-hidden rounded-xl`}\n            >\n              <img\n                src={image.src}\n                alt={image.alt}\n                className=\"w-full h-full object-cover transition-transform duration-700 group-hover:scale-105\"\n              />\n              <div className=\"absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300\" />\n            </div>\n          ))}\n        </div>\n        \n        <div className=\"mt-16 text-center\">\n          <p className=\"text-lg text-stone-300 max-w-2xl mx-auto leading-relaxed\">\n            Every corner of Terroir has been designed to create an intimate dining experience. \n            From our open kitchen concept to the carefully curated wine cellar, each space \n            tells part of our culinary story.\n          </p>\n        </div>\n      </Container>\n    </Section>\n  );\n}","src/components/PressProof.tsx":"import React from \"react\";\nimport Section from \"@/components/ui/section\";\nimport Container from \"@/components/ui/container\";\nimport Separator from \"@/components/ui/separator\";\n\nconst pressQuotes = [\n  {\n    quote: \"Chef Rousseau has created something truly extraordinary—a restaurant that honors French tradition while boldly embracing innovation. Each dish is a masterpiece.\",\n    source: \"The New York Times\",\n    author: \"Pete Wells\"\n  },\n  {\n    quote: \"Terroir represents the pinnacle of contemporary dining. The attention to detail, from service to presentation, is simply flawless.\",\n    source: \"Food & Wine Magazine\",\n    author: \"Julia Moskin\"\n  },\n  {\n    quote: \"This is destination dining at its finest. Rousseau's visi
