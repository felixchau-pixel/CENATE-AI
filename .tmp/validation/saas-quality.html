 './components/Hero';\nimport ProductDemo from './components/ProductDemo';\nimport Capabilities from './components/Capabilities';\nimport Metrics from './components/Metrics';\nimport Testimonial from './components/Testimonial';\nimport Pricing from './components/Pricing';\nimport Footer from './components/Footer';\n\nfunction App() {\n  return (\n    <main role=\"main\" className=\"min-h-screen bg-background text-foreground\">\n      <Navbar />\n      <Hero />\n      <ProductDemo />\n      <Capabilities />\n      <Metrics />\n      <Testimonial />\n      <Pricing />\n<Footer />\n    </main>\n  );\n}\n\nexport default App;","src/components/Navbar.tsx":"import React from 'react';\nimport { Button } from '@/components/ui/button';\nimport MobileNav from '@/components/ui/mobile-nav';\n\nconst Navbar = () => {\n  const navLinks = [\n    { label: 'Product', href: '#product' },\n    { label: 'Pricing', href: '#pricing' },\n    { label: 'Resources', href: '#resources' },\n    { label: 'Company', href: '#company' }\n  ];\n\n  return (\n    <nav className=\"sticky top-0 z-50 w-full border-b border-border/50 bg-background/80 backdrop-blur-md\">\n      <div className=\"mx-auto max-w-7xl px-4 sm:px-6 lg:px-8\">\n        <div className=\"flex h-16 items-center justify-between\">\n          <div className=\"flex items-center\">\n            <a href=\"/\" className=\"flex items-center space-x-2\">\n              <div className=\"h-8 w-8 rounded-lg bg-primary flex items-center justify-center\">\n                <svg className=\"h-5 w-5 text-primary-foreground\" fill=\"currentColor\" viewBox=\"0 0 20 20\">\n                  <path d=\"M3 4a1 1 0 011-1h12a1 1 0 011 1v2a1 1 0 01-1 1H4a1 1 0 01-1-1V4zM3 10a1 1 0 011-1h6a1 1 0 011 1v6a1 1 0 01-1 1H4a1 1 0 01-1-1v-6zM14 9a1 1 0 00-1 1v6a1 1 0 001 1h2a1 1 0 001-1v-6a1 1 0 00-1-1h-2z\"/>\n                </svg>\n              </div>\n              <span className=\"text-lg font-heading font-semibold\">DataFlow AI</span>\n            </a>\n          </div>\n          \n          <div className=\"hidden md:block\">\n            <div className=\"ml-10 flex items-baseline space-x-8\">\n              {navLinks.map((link) => (\n                <a\n                  key={link.label}\n                  href={link.href}\n                  className=\"text-foreground/80 hover:text-foreground px-3 py-2 text-sm font-medium transition-colors\"\n                >\n                  {link.label}\n                </a>\n              ))}\n            </div>\n          </div>\n\n          <div className=\"hidden md:flex items-center space-x-4\">\n            <Button variant=\"ghost\" size=\"sm\">Sign In</Button>\n            <Button size=\"sm\">Get Started</Button>\n          </div>\n\n          <div className=\"md:hidden\">\n            <MobileNav \n              links={navLinks} \n              brandName=\"DataFlow AI\"\n              ctaLabel=\"Get Started\"\n              ctaHref=\"#conversion\"\n            />\n          </div>\n        </div>\n      </div>\n    </nav>\n  );\n};\n\nexport default Navbar;","src/components/Hero.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Button } from '@/components/ui/button';\nimport { projectImages } from '@/assets/generated-images';\n\nconst Hero = () => {\n  const stats = [\n    { value: '10,000+', label: 'Active Teams' },\n    { value: '99.9%', label: 'Uptime SLA' },\n    { value: '50ms', label: 'Avg Response' },\n    { value: 'SOC 2', label: 'Certified' }\n  ];\n\n  return (\n    <Section className=\"min-h-[85vh] bg-zinc-950 text-white relative overflow-hidden py-20 md:py-28\">\n      {/* Subtle grid texture */}\n      <div className=\"absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:32px_32px]\" />\n      \n      <Container>\n        <div className=\"grid lg:grid-cols-12 gap-12 items-center relative z-10\">\n          {/* Left column - 45% */}\n          <div className=\"lg:col-span-5 max-w-xl\">\n            <p className=\"text-xs uppercase tracking-[0.2em] text-primary font-semibold mb-4\">\n              Intelligent Data Pipelines\n            </p>\n            <Heading \n              as=\"h1\" \n              size=\"display\" \n              className=\"font-heading font-bold text-white leading-[1.1] tracking-tight\"\n            >\n              Transform data chaos into intelligent workflows\n            </Heading>\n            <p className=\"mt-6 text-lg text-zinc-300 max-w-lg leading-relaxed\">\n              Build, deploy, and scale data pipelines with AI-powered automation. Connect any source, transform in real-time, and deliver insights faster than ever.\n            </p>\n            <div className=\"mt-8 flex flex-col sm:flex-row gap-4\">\n              <Button size=\"lg\" className=\"bg-primary hover:bg-primary/90 text-primary-foreground\">\n                Start Free Trial\n              </Button>\n              <Button size=\"lg\" variant=\"outline\" className=\"border-zinc-600 text-zinc-300 hover:bg-zinc-800\">\n                Watch Demo\n              </Button>\n            </div>\n            \n            {/* Credibility rail */}\n            <div className=\"mt-12 pt-8 border-t border-zinc-800\">\n              <div className=\"grid grid-cols-4 gap-6 text-center\">\n                {stats.map((stat, index) => (\n                  <div key={index} className=\"animate-fade-up\" style={{ animationDelay: `${index * 100}ms` }}>\n                    <p className=\"text-lg font-heading font-bold text-primary\">{stat.value}</p>\n                    <p className=\"text-xs text-zinc-400 mt-1\">{stat.label}</p>\n                  </div>\n                ))}\n              </div>\n            </div>\n          </div>\n          \n          {/* Right column - 55% */}\n          <div className=\"lg:col-span-7 relative\">\n            <div className=\"relative bg-zinc-900/50 rounded-lg border border-zinc-700/50 p-1 backdrop-blur-sm\">\n              {/* Browser chrome */}\n              <div className=\"flex items-center gap-2 px-4 py-3 border-b border-zinc-700/50\">\n                <div className=\"flex gap-2\">\n                  <div className=\"w-3 h-3 rounded-full bg-red-500/80\"></div>\n                  <div className=\"w-3 h-3 rounded-full bg-yellow-500/80\"></div>\n                  <div className=\"w-3 h-3 rounded-full bg-green-500/80\"></div>\n                </div>\n                <div className=\"flex-1 bg-zinc-800/50 rounded px-3 py-1 mx-4\">\n                  <span className=\"text-xs text-zinc-400\">app.dataflow.ai/dashboard</span>\n                </div>\n              </div>\n              \n              {/* Product window */}\n              <div className=\"relative rounded-b-lg overflow-hidden\">\n                <img \n                  src={projectImages.hero}\n                  alt=\"DataFlow AI dashboard showing real-time data pipeline monitoring with active workflows, performance metrics, and transformation status\"\n                  className=\"w-full h-auto object-cover\"\n                />\n              </div>\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Hero;","src/components/ProductDemo.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { projectImages } from '@/assets/generated-images';\n\nconst ProductDemo = () => {\n  const callouts = [\n    { number: \"1\", text: \"Connect data sources with one click\", position: \"top-[15%] left-[20%]\" },\n    { number: \"2\", text: \"AI suggests optimal transformations\", position: \"top-[35%] right-[25%]\" },\n    { number: \"3\", text: \"Monitor pipeline health in real-time\", position: \"top-[55%] left-[15%]\" },\n    { number: \"4\", text: \"Deploy to production instantly\", position: \"bottom-[20%] right-[20%]\" },\n    { number: \"5\", text: \"Scale automatically with demand\", position: \"bottom-[10%] left-[30%]\" }\n  ];\n\n  return (\n    <Section className=\"bg-zinc-900 py-16 md:py-24\">\n      <Container>\n        <div className=\"text-left mb-16\">\n          <p className=\"text-xs uppercase tracking-[0.2em] text-primary font-semibold mb-4\">\n            Workflow in Action\n          </p>\n          <Heading size=\"h2\" className=\"text-white font-heading font-semibold\">\n            From raw data to insights in minutes\n          </Heading>\n          <p className=\"mt-4 text-lg text-zinc-400 max-w-2xl mx-auto\">\n            See how DataFlow AI transforms complex data engineering into simple, visual workflows\n          </p>\n        </div>\n\n        <div className=\"relative\">\n          {/* Background grid */}\n          <div className=\"absolute inset-0 bg-[linear-gradient(rgba(59,130,246,0.05)_1px,transparent_1px),linear-gradient(90deg,rgba(59,130,246,0.05)_1px,transparent_1px)] bg-[size:24px_24px]\" />\n          \n          {/* Main product screenshot */}\n          <div className=\"relative bg-zinc-800/50 rounded-xl border border-zinc-700/50 p-6\">\n            <div className=\"relative\">\n              <img \n                src={projectImages.support}\n                alt=\"DataFlow AI workflow editor showing drag-and-drop pipeline creation with data sources, transformations, and destinations connected by visual flow lines\"\n                className=\"w-full h-auto rounded-lg object-cover\"\n              />\n              \n              {/* Animated callout labels */}\n              {callouts.map((callout, index) => (\n                <div \n                  key={index}\n                  className={`absolute ${callout.position} animate-fade-in`}\n                  style={{ animationDelay: `${index * 200 + 300}ms` }}\n                >\n                  <div className=\"flex items-center gap-3 bg-primary/90 backdrop-blur-sm rounded-full px-4 py-2 shadow-lg\">\n                    <div className=\"w-6 h-6 rounded-full bg-white text-primary text-xs font-bold flex items-center justify-center\">\n                      {callout.number}\n                    </div>\n                    <span className=\"text-sm font-medium text-white whitespace-nowrap\">\n                      {callout.text}\n                    </span>\n                  </div>\n                  <div className=\"absolute top-1/2 left-6 w-3 h-3 bg-primary/90 rotate-45 transform -translate-y-1/2 -translate-x-1/2\" />\n                </div>\n              ))}\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default ProductDemo;","src/components/Capabilities.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { projectImages } from '@/assets/generated-images';\n\nconst Capabilities = () => {\n  const capabilities = [\n    {\n      icon: (\n        <svg className=\"h-6 w-6\" fill=\"none\" viewBox=\"0 0 24 24\" strokeWidth=\"2\" stroke=\"currentColor\">\n          <path strokeLinecap=\"round\" strokeLinejoin=\"round\" d=\"M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3\" />\n        </svg>\n      ),\n      title: \"Real-time Processing\",\n      description: \"Process millions of events per second with ultra-low latency streaming architecture\",\n      detail: \"< 10ms latency\"\n    },\n    {\n      icon: (\n        <svg className=\"h-6 w-6\" fill=\"none\" viewBox=\"0 0 24 24\" strokeWidth=\"2\" stroke=\"currentColor\">\n          <path strokeLinecap=\"round\" strokeLinejoin=\"round\" d=\"M9.75 3.104v5.714a2.25 2.25 0 01-.659 1.591L5 14.5M9.75 3.104c-.251.023-.501.05-.75.082m.75-.082a24.301 24.301 0 014.5 0m0 0v5.714c0 .597.237 1.17.659 1.591L19.8 15.3M14.25 3.104c.251.023.501.05.75.082M19.8 15.3l-1.57.393A9.065 9.065 0 0112 15a9.065 9.065 0 00-6.23-.693L5 14.5m14.8.8l1.402 1.402c1.232 1.232.65 3.318-1.067 3.611A48.309 48.309 0 0112 21c-2.773 0-5.491-.235-8.135-.687-1.718-.293-2.3-2.379-1.067-3.611L5 14.5\" />\n        </svg>\n      ),\n      title: \"AI-Powered Optimization\",\n      description: \"Machine learning automatically optimizes your pipelines for cost, performance, and reliability\",\n      detail: \"40% cost reduction\"\n    },\n    {\n      icon: (\n        <svg className=\"h-6 w-6\" fill=\"none\" viewBox=\"0 0 24 24\" strokeWidth=\"2\" stroke=\"currentColor\">\n          <path strokeLinecap=\"round\" strokeLinejoin=\"round\" d=\"M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.623 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z\" />\n        </svg>\n      ),\n      title: \"Enterprise Security\",\n      description: \"SOC 2 compliant with end-to-end encryption, audit logs, and role-based access control\",\n      detail: \"SOC 2 Type II\"\n    }\n  ];\n\n  return (\n    <Section className=\"bg-background py-16 md:py-20\">\n      <Container>\n        <div className=\"grid lg:grid-cols-3 gap-8\">\n          {/* Two large capabilities */}\n          <div className=\"lg:col-span-2 space-y-8\">\n            {capabilities.slice(0, 2).map((capability, index) => (\n              <div \n                key={index}\n                className={`flex items-start gap-6 p-8 rounded-2xl border transition-colors ${\n                  index === 0 ? 'bg-card border-border' : 'bg-secondary border-border/50'\n                }`}\n              >\n                <div className=\"flex-shrink-0 w-12 h-12 rounded-xl bg-primary/10 border border-primary/20 flex items-center justify-center text-primary\">\n                  {capability.icon}\n                </div>\n                <div className=\"flex-1\">\n                  <div className=\"flex items-center justify-between mb-3\">\n                    <h3 className=\"text-xl font-heading font-semibold text-foreground\">\n                      {capability.title}\n                    </h3>\n                    <span className=\"text-sm font-mono text-primary bg-primary/10 px-3 py-1 rounded-full\">\n                      {capability.detail}\n                    </span>\n                  </div>\n                  <p className=\"text-muted-foreground leading-relaxed\">\n                    {capability.description}\n                  </p>\n                </div>\n              </div>\n            ))}\n          </div>\n\n          {/* Right column with third capability and image */}\n          <div className=\"space-y-8\">\n            <div className=\"p-6 rounded-2xl bg-muted border border-border\">\n              <div className=\"w-10 h-10 rounded-lg bg-primary/10 border border-primary/20 flex items-center justify-center text-primary mb-4\">\n                {capabilities[2].icon}\n              </div>\n              <h3 className=\"text-lg font-heading font-semibold text-foreground mb-3\">\n                {capabilities[2].title}\n              </h3>\n              <p className=\"text-sm text-muted-foreground mb-4\">\n                {capabilities[2].description}\n              </p>\n              <span className=\"text-xs font-mono text-primary bg-primary/10 px-2 py-1 rounded\">\n                {capabilities[2].detail}\n              </span>\n            </div>\n\n            <div className=\"rounded-2xl overflow-hidden border border-border\">\n              <img \n                src={projectImages.gallery1}\n                alt=\"DataFlow AI security dashboard showing compliance monitoring, audit trails, and access control management\"\n                className=\"w-full h-48 object-cover\"\n              />\n            </div>\n          </div>\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Capabilities;","src/components/Metrics.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\n\nconst Metrics = () => {\n  const metrics = [\n    { value: '99.99%', label: 'Uptime SLA' },\n    { value: '50ms', label: 'Response Time' },\n    { value: '10K+', label: 'Active Teams' },\n    { value: '500+', label: 'Integrations' },\n    { value: 'SOC 2', label: 'Certified' }\n  ];\n\n  return (\n    <Section className=\"bg-zinc-950 py-12 md:py-16\">\n      <Container>\n        <div className=\"grid grid-cols-2 md:grid-cols-5 gap-8 text-left\">\n          {metrics.map((metric, index) => (\n            <div \n              key={index}\n              className=\"animate-fade-up\"\n              style={{ animationDelay: `${index * 100}ms` }}\n            >\n              <p className=\"text-4xl md:text-5xl lg:text-6xl font-heading font-bold text-white leading-none\">\n                {metric.value}\n              </p>\n              <p className=\"text-sm text-zinc-400 mt-2 font-medium uppercase tracking-wide\">\n                {metric.label}\n              </p>\n            </div>\n          ))}\n        </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Metrics;","src/components/Testimonial.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { projectImages } from \"@/assets/generated-images\";\n\nconst Testimonial = () => {\n  const logos = [\n    { name: 'TechFlow', width: 'w-24' },\n    { name: 'DataScale', width: 'w-20' },\n    { name: 'CloudOps', width: 'w-28' },\n    { name: 'StreamLabs', width: 'w-22' }\n  ];\n\n  return (\n    <Section className=\"bg-secondary/50 py-12 md:py-16\">\n      <Container>\n        {/* Logo wall */}\n        <div className=\"flex items-center justify-center gap-8 md:gap-12 mb-12 flex-wrap opacity-60\">\n          {logos.map((logo, index) => (\n            <div key={index} className={`${logo.width} h-8 bg-muted-foreground/20 rounded flex items-center justify-center`}>\n              <span className=\"text-xs font-medium text-muted-foreground\">{logo.name}</span>\n            </div>\n          ))}\n        </div>\n\n        {/* Main testimonial */}\n        <div className=\"max-w-4xl mx-auto text-left\">\n          <blockquote className=\"text-xl md:text-2xl lg:text-3xl font-heading leading-relaxed text-foreground mb-8\">\n            \"DataFlow AI transformed our data infrastructure completely. What used to take our team weeks to build and deploy now happens in hours. The AI-powered optimizations alone saved us 40% on our cloud costs while improving pipeline reliability.\"\n          </blockquote>\n          \n          <div className=\"flex items-center justify-center gap-6\">\n            <div className=\"w-16 h-16 rounded-full bg-gradient-to-br from-primary/20 to-primary/40 flex items-center justify-center\">\n              <span className=\"text-lg font-heading font-bold text-primary\">SK</span>\n            </div>\n            <div className=\"text-left\">\n              <p className=\"font-heading font-semibold text-foreground\">Sarah Kim</p>\n              <p className=\"text-sm text-muted-foreground\">VP of Engineering, TechFlow</p>\n              <div className=\"flex items-center gap-2 mt-1\">\n                <div className=\"w-6 h-6 bg-muted rounded flex items-center justify-center\">\n                  <span className=\"text-xs font-bold\">TF</span>\n                </div>\n                <span className=\"text-xs text-muted-foreground\">Series B • 200+ employees</span>\n              </div>\n            </div>\n          </div>\n        </div>\n      \n      <div className=\"mt-10\">\n        <div className=\"relative overflow-hidden rounded-[calc(var(--radius)+8px)] border bg-card/70 shadow-[var(--shadow-card)]\">\n          <img\n            src={projectImages.detail1}\n            alt=\"Live product visual\"\n            className=\"h-full w-full aspect-[4/3] min-h-[260px] object-cover\"\n          />\n          <div className=\"pointer-events-none absolute inset-x-0 bottom-0 bg-gradient-to-t from-background/80 via-background/15 to-transparent p-5\">\n            <div className=\"inline-flex rounded-full border border-border/70 bg-background/80 px-3 py-1 text-[10px] font-medium uppercase tracking-[0.2em] text-muted-foreground\">\n              Live product visual\n            </div>\n          </div>\n        </div>\n      </div>\n      </Container>\n    </Section>\n  );\n};\n\nexport default Testimonial;","src/components/Pricing.tsx":"import React from 'react';\nimport { Section } from '@/components/ui/section';\nimport { Container } from '@/components/ui/container';\nimport { Heading } from '@/components/ui/heading';\nimport { Button } from '@/components/ui/button';\nimport { Badge } from '@/components/ui/badge';\nimport { projectImages } from \"@/assets/generated-images\";\n\nconst Pricing = () => {\n  const essentialsFeatures = [\n    '100K events/month',\n    '5 data sources',\n    '10 transformations',\n    'Real-time monitoring',\n    'Email support'\n  ];\n\n  const proFeatures = [\n    'Unlimited events',\n    'Unlimited sources',\n    'Advanced transformations',\n    'AI optimization',\n    'Custom connectors',\n    '99.99% SLA',\n    'Priority support',\n    'Advanced analytics'\n  ];\n\n  const comparisonFeatures = [\n    { name: 'Events per month', essentials: '100K', pro: 'Unlimited' },\n    { name: 'Data sources', essentials: '5', pro: 'Unlimited' },\n    { name: 'Real-time processing', essentials: '✓', pro: '✓' },\n    { name: 'AI optimization', essentials: '—', pro: '✓' },\n    { name: 'Custom connectors', essentials: '—', pro: '✓' },\n    { name: 'SLA', essentials: '99.9%', pro: '99.99%' },\n    { name: 'Support', essentials: 'Email', pro: 'Priority' }\n  ];\n\n  return (\n    <Section className=\"bg-background py-16 md:py-24\" id=\"pricing\">\n      <Container>\n        <div className=\"text-center mb-16\">\n          <p className=\"text-xs uppercase tracking-[0.2em] text-primary font-semibold mb-4\">\n            Simple Pricing\n          </p>\n          <Heading size=\"h2\" className=\"font-heading font-semibold\">\n            Scale with confidence\n          </Heading>\n          <p className=\"mt-4 text-lg text-muted-foreground max-w-2xl mx-auto\">\n            Start free and upgrade as you grow. No hidden fees, no surprises.\n          </p>\n        </div>\n\n        {/* Two-tier comparison */}\n        <div className=\"grid lg:grid-cols-2 gap-8 mb-16\">\n          {/* Essentials - Compact */}\n          <div className=\"lg:col-span-1 p-6 rounded-2xl border border-border bg-card\">\n            <h3 className=\"text-lg font-heading font-semibold text-foreground mb-2\">\n              Essentials\n            </h3>\n            <p className=\"text-sm text-muted-foreground mb-6\">\n              Perfect for small teams getting started\n            </p>\n            <div className=\"mb-6\">\n              <span className=\"text-3xl font-heading font-bold text-foreground\">$0</span>\n              <span className=\"text-muted-foreground\">/month</span>\n            </div>\n            <Button variant=\"outline\" className=\"w-full mb-6\">\n              Start Free\n            </Button>\n            <div className=\"space-y-3\">\n              {essentialsFeatures.map((feature, index) => (\n                <div key={index} className=\"flex items-center gap-3 text-sm\">\n                  <svg className=\"h-4 w-4 text-primary flex-shrink-0\" fill=\"currentColor\" viewBox=\"0 0 20 20\">\n                    <path fillRule=\"evenodd\" d=\"M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z\" clipRule=\"evenodd\" />\n                  </svg>\n lassName=\"text-lg font-heading font-semibold text-foreground mb-6\">\n            Feature Comparison\n          </h3>\n          <div className=\"space-y-4\">\n            {comparisonFeatures.map((feature, index) => (\n              <div key={index} className=\"grid grid-cols-3 gap-4 py-3 border-b border-border/50 last:border-0\">\n                <span className=\"text-sm font-medium text-foreground\">{feature.name}</span>\n                <span className=\"text-sm text-muted-foreground text-center\">{feature.essentials}</span>\n                <span className=\"text-sm text-foreground text-center font-medium\">{feature.pro}</span>\n              </div>\n            ))}\n          </div>\n        </div>\n\n        {/* Enterprise */}\n        <div className=\"mt-12 p-8 bg-secondary/30 rounded-2xl border border-border/50\">\n          <div className=\"text-center max-w-2xl mx-auto\">\n            <h3 className=\"text-xl font-heading font-semibold text-foreground mb-3\">\n              Enterprise\n            </h3>\n            <p className=\"text-muted-foreground mb-6\">\n              Custom solutions for large-scale deployments with dedicated support and SLAs\n            </p>\n            <Button variant=\"outline\" size=\"lg\">\n              Contact Sales\n            </Button>\n          </div>\n        </div>\n      \n      <div className=\"mt-10\">\n        <div className=\"relative overflow-hidden rounded-[calc(var(--radius)+8px)] border bg-card/70 shadow-[var(--shadow-card)]\">\n          <img\n            src={projectImages.gallery3}\n            alt=\"Live product visual\"\n            className=\"h-full w-full aspect-[4/3] min-h-[260px] object-cover\"\n          />\n          <div className=\"pointer-events-none absolute inset-x-0 bottom-0 bg-gradient-to-t from-background/80 via-background/15 to-transparent p-5\">\n            <div className=\"inline-flex rounded-full border border-border/70 bg-background/80 px-3 py-1 text-[10px] font-medium uppercase t
